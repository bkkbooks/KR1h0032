body:
  text: 欽定四庫全書四書辨疑卷七元陳天祥撰論語子路第十三先之勞之注蘇氏曰凡民之行以身先之則不令而行凡民之事以身勞之則雖勤不怨解先之為凡民之行以身先之而先之兩字之閒無該民行之意義不可通解勞之為凡民之事以身勞之亦不知事為何事說者往往以為為政治民之事語録曰勞是為他勤勞纂疏引輔氏古人戴星而出戴星而入與夫以時循行阡陌躬行講武之說為證本以佐蘇氏之說其實意不相合蘇氏以凡民之事與凡民之行對說行既為民之行則事亦是民為之事非為政治民之事也然民為之事如耕種耘穫築場為圃剝棗條桑何所不有為政者豈能皆以己身親勞之哉況以身勞之亦只是先之之意與上文以身先之蓋重復也觀其文勢先之勞之四字之閒惟勞字是其主意通貫上下之文先之謂先己之勞勞之謂後勞其民也如古人戴星而出戴星而入此正先之之義所謂先己之勞是也已先有此勤政之勞然後以政勤勞其民民雖勞而不怨也言不可以若是其幾也注幾期也一言之閒未可以如此而必期其效幾與後幾字義同古注皆解為近今乃訓期試以期字與經文通讀言不可以若是其期也不成文理不知期為期甚也今言必期其效一期字豈能兼必效二字之意又經文本是兩句其幾也三字為一句注文亦是作兩句說學者往往以未可以如此而必期其效之十字併為一句非也既有而字界斷文勢又有後注豈不可以必期於興邦乎之一語為證其為兩句甚明上句言一言之閒未可以如此乃是說一言不可以有如此興邦之效也下句言而必期其效却是說一言必可以期興邦之效也語意顚倒殆不可曉所謂豈不可以必期於興邦子者此正可謂不知為君之難也果知其難方且戰戰兢兢懼其不逮豈敢決然期定謂其邦之必興乎知其為君之難由此以求興邦之道則其邦有可興之理然亦未敢必期其效也由是言之為君難之一言止可謂近於興邦也夫子答定公之言蓋謂一言不能至於如此然其言能近此也如人之言曰為君難為臣不易人君果能因此言而推知為君之難不敢自逸自恣知所自勉則人之此言豈不近於一言而興邦乎幾之為言近意甚明白下文喪邦之說亦同舊說與南軒滹南之說大意皆是如此近字之說如此平直易曉期字之說如此迂曲難通果欲搜竒求異以易曉者為非以難通者為是心不在公自昏其明吾末如之何也已狷者有所不為也注狷者知未及而守有餘有所不為者能為而不為也智未及者不能為而不為也夫狷者之為人踽踽獨行涼涼無親世俗指為孤僻古執者是也於可交之人亦有所不交可取之物亦有所不取易於退而難於進貪於止而吝於行此乃有所不為之謂也若論其極伯夷叔齊即其人也特其情好與衆不同非有關於智不智也果以智未及而不能為者為狷則天下之狷者多矣夫子何難於此哉不占而已矣注其義未詳楊氏曰君子於易茍玩其占則知無常之取羞矣其為無常也蓋亦不占而已矣意亦略通不占而已矣古今解者皆不能通注言其義未詳可謂本分然却再舉楊氏之說不免反以為纍略通二字若於該括衆事處言之如云略通某氏之學略通某書大義此皆可也今於一章經中單論一事是則為是非則為非豈容更有略通邪況已斷定其義未詳亦自不容别議也楊氏之說本無可取刪之為是君子和而不同小人同而不和注和者無乖戾之心同者有阿比之意和則固無乖戾之心只以無乖戾之心為和恐亦未盡若無中正之氣專以無乖戾為心亦與阿比之意相鄰和與同未易辨也中正而無乖戾然後為和凡在君父之側師長朋友之閒將順其美匡救其惡可者獻之否者替之結者解之離者合之此君子之和也而或巧媚隂柔隨時俯仰人曰可己亦曰可人曰否己亦曰否惟言莫違無唱不和此小人之同也晏子辨梁丘據非和以為君所謂可而有否焉臣獻其否以成其可君所謂否而有可焉臣獻其可以去其否是以政平而不干民無爭心今據不然君所謂可據亦曰可君所謂否據亦曰否據亦同也焉得為和此論辨析甚明冝引以證此章之義憲問第十四注胡氏曰此篇疑原憲所記王滹南曰胡氏徒見首章如原憲自稱者遂謂此篇悉憲所記此億度之說豈可必哉又疑里仁篇自吾道一貫至君子欲訥於言十章皆出曽子門人公冶長篇多出子貢之徒益無所據刪之可也豫謂滹南之論極當胡氏又以先進篇為閔子騫門人所記與前三說同病皆當刪去以戒後人之鑿貧而無怨難富而無驕易注處貧難處富易人之常情然人當勉其難而不可忽其易也注文只說處貧難處富易於怨驕略無干涉義不可通大抵處飢寒困苦之貧者不能無吁嗟怏悵之怨居贍足豐饒之富者鮮能無傲慢矜肆之驕此乃人之常情也能安於貧然後無怨貧之心不恃其富斯可無驕富之氣心顔子處貧之心則能貧而無怨矣富而無驕不足道也志子貢居富之志則能富而無驕矣貧而無怨未敢望焉察天下之貧者萬中實無一二無怨觀天下之富者十中須有二三無驕以此推之足以知無怨為難無驕為易也曰今之成人者何必然注復加曰字既答而復言也胡氏曰今之成人以下乃子路之言注文以為夫子再言胡氏以為子路之言蓋皆為曰字所誤故各說一端而無定論也若為既答而復言古今文字中皆無如此文理若為子路之言乃是面折孔子之非孔子再無一言以答之何也二說皆不可取此一節與上文只是一段話但無曰字則上下之義自通曰字衍曰未仁乎注闕曰字羡文如其仁如其仁注如其仁言誰如其仁者又再言以深許之注言誰如其仁一誰字該盡古今天下之人更無人如管仲之仁無乃許之太峻乎仲為霸者之佐始終事業不過以力假仁而已所假之仁非其固有之仁豈有人皆不如之理夫子向者言管仲之器小哉又謂僭不知禮今乃連稱誰如其仁誰如其仁聖人之言何其不恆如是邪況經之本文如其上亦無誰字之意王滹南曰如其云者幾近之謂也此解如其二字意近然此等字樣但可意會非訓解所能盡大抵如之為義蓋極似本真之謂如云如其父如其兄如其所傳如其所聞文字語話中似此用如其字者不少以此相方則如其仁之義乃可見管仲乃假仁之人非有仁者真實之仁然其所成之功亦與真實之仁所成者無異故曰如其仁也子貢曰管仲非仁者與桓公殺公子糾不能死又相之子曰管仲相桓公霸諸侯一匡天下民到於今受其賜微管仲吾其被髮左衽矣豈若匹夫匹婦之為諒也自經於溝瀆而莫之知也注程子曰桓公兄也子糾弟也仲私於所事輔之爭國非義也桓公殺之雖過而子糾之死實當仲始與之同謀遂與之同死可也知輔之爭為不義將自免以圖後功亦可也故聖人不責其死而稱其功若使桓弟而糾兄管仲所輔者正桓奪其國而殺之則管仲與桓不可同世之讎也若計其後功與其事桓聖人之言無乃害義之甚啓萬世反覆不忠之亂乎如唐之王圭魏徵不死建成之難而從太宗可謂害於義矣後雖有功何足贖哉愚謂管仲有功而無罪故聖人獨稱其功王魏先有罪而後有功則不以相掩可也程子專主桓公當立直指桓公為兄子糾為弟意謂為弟者不當爭國以此為子糾罪名特欲圎成管仲不死之理也却不知子糾管仲事為一體子糾有罪則管仲之罪亦不能逃試觀將自免以圗後功之說管仲既與子糾同謀輔其為惡及見事敗身死方才知其輔之爭為不義區區以求茍免甚可醜也似此為人豈有能成後功之理聖人稱許此等之人豈不害義之甚啓萬世反覆不忠之亂乎不惟管仲如此召忽亦是同惡之人其死乃是黨惡而死然子路子貢遞皆歸美孔子亦無異議足以知召忽非為黨惡也或謂自經溝瀆為指召忽王滹南辨曰其言匹夫匹婦之諒此自别指無名而徒死者耳意不在召忽也忽豈自經溝瀆之類哉此言足以解或人之疑召忽之死既當子糾則為無罪管仲輔之亦無不義挨排至此則桓兄糾弟云者虛其說矣史記亦無兄弟明說但先書子糾後書小白蓋序子糾為長也杜預韋昭等皆言子糾桓公之兄引此諸說為證則程子之說亦難獨是也子糾桓公皆襄公之庶弟各因畏禍分適他國無知既弒襄公國人復殺無知齊國大亂二人各以其黨舉兵內向先己無嫡庶之分又各在倉卒危亂之際安能必其只誰當立哉但桓公先入國人立之齊既有君子糾雖長亦是齊臣向因國亂無主故有如此之爭必欲責之以讓豈惟子糾當讓桓公桓公亦當讓於子糾使桓公能自審此則子糾不至見殺召忽亦不必死管仲不死又不須論正由子糾死非其罪召忽為義所激於是死之其死可謂無愧矣管仲則心忖子糾未正成君桓公亦僖公之子又有鮑叔牙素為知己故忍死以待其用此管仲之志也比之召忽不無等差惟是他日能有霸諸侯一匡天下非常之功生民受非常之賜孔子以是稱之耳然亦止是專稱其功終不言不死之理意亦可見向使仲於既免之後未及成功而死孔子必不專許其不死為是也然則臣事人者如召忽可也程子以王圭魏徵為諭責王魏不死建成之難亦為未當王魏之輔建成與管召輔子糾之事絶不相類是時髙祖為君王魏所居之職髙祖之所命也建成隂用邪謀死於非義輔導之官當自請其不能匡正之罪於有司無死私難之理程子引此本以申明不可同世之說意謂建成為兄王魏所輔者正此又膠於立嫡以長之常例專主建成當立也夫建成太宗之事又與餘者不同太宗以童稚之年運神武之略芟夷大亂制服羣雄使李氏化家為國致髙祖遂有天下近古以來實未嘗有髙祖不權事冝慮不及逺竟以尋常長幼之分處之於建成之下兄弟之不能相安必然之勢也建成難居太宗之右司馬溫公已嘗論之善乎宋王成器之言曰國家安則先嫡長國家危則先有功茍違其冝四海失望臣死不敢居平王之上𤣥宗暫平內難宋王已知難居其上而以先功為讓如太宗之功又當何如哉建成本庸鄙無堪徒以年長之故據有儲副之位彼見太宗功髙望重率土歸心忌嫉不得不深禍難不得不起建成取闔門之誅太宗負殺兄之惡皆髙祖處置違冝之所致也太宗固嘗辭太子之位以讓建成未嘗聞有爭奪之計惟建成內不自安百計千方期於必殺太宗於數年之閒幾死者屢矣王魏受君命輔導太子自合輔之以正道既知建成畜此禍心當如少保李綱竭忠力諫諫若不從即當棄官而去彼既不務為此反更徇私迎合惟勸早除秦王不顧有君親在上不恤其骨肉相殘構其兄弟交惡之心速其矢刃相加之禍此王魏所有之本罪其罪正在黨於建成不在不死建成之難也死於其難正為黨惡而死情罪益深死固當死但當就其自身合得本罪而死若不即死則逺遁山林終身不顯又其次也過此以往非所敢知注文與程子之說不可全言管仲為無過不可以王魏與管仲俱言有功大抵管仲之過比王魏所犯者特輕管仲之功比王魏所成者甚大夫子之言蓋以大功掩其小過也王滹南以為所慊者小所成者大孔子權其輕重而論之豫謂說者雖多惟此數語可為定論陳成子弒簡公孔子沐浴而朝告於哀公曰陳恆弒其君請討之注胡氏曰春秋之法弒君之賊人得而討之仲尼此舉先發後聞可也胡氏譏孔子處事不當别為畫䇿以示後人何其無忌憚之甚也夫以孔子之聖明加之沐浴齊戒而後言事豈有思慮不及胡氏者哉弒君之賊人人固皆得以誅之然齊國之君被弒而魯見有君在上孔子豈有不請於君擅自發兵征討之理已先不有其君欲正他人弒君之罪不亦難乎況魯國兵權果在何人而責孔子不先發邪後人果用胡氏之言擅為如此之事則其僭逆之罰必不免矣明哲君子冝審思之古之學者為己今之學者為人注程子曰為己欲得之於己也為人欲見知於人也欲得之於己此為為己之公欲見知於人此為為己之私兩句皆是為己為人之義不可通也蓋為己務欲治己也為人務欲治人也但學治己則治人之用斯在專學治人則治己之本斯亡若於正心修己以善自治之道不用力焉而乃專學為師教人之藝專學為官治人之能不明己德而務新民舍其田而藝人之田凡如此者皆為人之學也君子耻其言而過其行注耻者不敢盡之意過者欲有餘之辭注文以耻其言與過其行分為兩意解耻字為不敢盡之意解過字為欲有餘之辭聖人之言恐不如此之迂曲也且言不過行有何可耻行取得中豈容過餘過中之行君子不為過猶不及聖人之明論也注文本因而字故為此說本分言之止是耻其言過於行舊說君子言行相顧若言過其行謂有言而行不副君子所耻南軒曰言過其行則為無實之言是可耻也耻言之過行則其篤行可知矣二論意同必如此說義乃可通而字蓋之字之誤丘何為是栖栖者與注栖栖猶依依也注文解栖栖為依依舊疏與南軒皆解為皇皇蓋依依倚而安之之貌皇皇行無定所之貌微生畝本譏孔子之周流不止惟皇皇之說為是疾固也注疾惡也固執一而不通也聖人之於逹尊禮恭而言直如此其警之亦深矣注文蓋謂孔子指微生畝為執一不通也微生畝謂孔子近佞孔子復謂畝為執一不通此與閭閻之閒互相譏罵者何異畝雖自恃年齒之尊言有倨傲孔子亦當存長長之義而以周流憂世之本誠答之何必復以如此不遜之言立相還報邪南軒曰包注固謂世之固陋此解是栖栖猶皇皇也佞口給也疾猶病也微生畝謂夫子皇皇厯說類夫尚口者夫子以為非敢為佞病夫世之固陋云爾豫謂南軒之說有溫厚寬和之意無損聖人之德今從之子曰作者七人矣注李氏曰作起也言起而隱去者今七人矣李氏以作為起乃是起者七人不知起為如何起也繼言起而隱去一起字豈能兼隱去之義若與上文通言賢者避世其次避地其次避色其次避言作者七人矣如此則義乃為備作猶為也為此數事者今七人矣王滹南曰作者七人雖不見主名其文勢似與上文為一章子曰字疑衍豫謂古注本通是一章注文分之之意正為作者上有子曰字也滹南所疑者誠是子曰二字當為衍文果哉末之難矣注果哉歎其果於忘世也末無也依此訓釋解為果哉忘世無之難矣不成文理此句文實未詳闕之可也衛靈公第十五君子固窮小人窮斯濫矣注何氏曰濫溢也言君子固有窮時不若小人窮則放溢為非程子曰固窮者固守其窮亦通注文取何氏之說語録曰固守其窮古人多如此說但以上文觀之則聖人一時答問之辭未遽及此蓋子路方問君子亦有窮乎聖人答之曰君子固是有窮時但不如小人窮則濫爾以固字答上文有字文勢乃相應豫謂既有此說却不冝再引程子之說謂之亦通也又固守其窮分明是程子之說古注中實未嘗有語録言古人多如此說亦非公論由知德者鮮矣注自第一章至此疑皆一時之言此章蓋為愠見發也第一章衛靈公問陳一節孔子在衛子路愠見一節孔子在陳衛與陳相去數百里兩節非一時甚明第二與此第三章果在何時無文可考今乃通指為一時之言未敢信也王滹南曰中間有告子貢多學一貫之一章既已閒斷安得通為一時之事哉蓋孔子世家載此而一貫語上加子貢作色四字所以生學者之疑嗚呼解經不守本文而信傳記不根之說亦見其好異而喜鑿矣事其大夫之賢者友其士之仁者注賢以事言仁以德言人之所以處己所以接物者無非事也事合善道然後為德仁德在身然後稱賢無無事之德無無德之賢今推注文之說賢如何單以事言而無關於德仁如何單以德言而無關於事賢與仁如何分事與德如何辨皆不可曉試從此說分仁賢為兩意論之事其大夫之賢者則仁者不在所事矣友其士之仁者則賢者不在所友矣人或以此為問不知答者復有何說也經文於大夫言賢於士言仁此特變文耳言賢則仁在其中言仁則賢在其中賢者仁者義本不殊不可強有分别也人無逺慮必有近憂注蘇氏曰人之所履者容足之外皆為無用之地而不可廢也故慮不在千里之外則患在几席之下矣蘇氏說地理逺近義有未安君子以正心修身為本近思約守事來則應未聞所慮必須長在千里之外也存心於千里之外以備几席之閒咫尺之患計亦踈矣逺久逺也但凡作事不為將來久逺之慮必有日近傾敗之憂也子貢問曰有一言而可以終身行之者乎子曰其恕乎己所不欲勿施於人注推己及物其施不窮故可以終身行之推己及物指恕而言以恕為其施不窮可以終身行之豈仁義其施有窮不可以終身行之邪仁包五常義即次之仁義之功用尤大於恕夫子舉終身可行之道不言仁義專以恕言恐無此理子貢問有一言而可以終身行之者乎蓋問只一言便可為終身法則而行亦有如此之言乎分明止是以言為問本求夫子要妙之言主意不在所言之事也此與一言而可以興邦有諸語意相類夫子所答其恕乎者蓋謂如此之言其以恕言則有之己所不欲勿施於人是之謂一言可以終身行之之言也此乃就恕上取出一言終身可行之言以答子貢非指恕為終身可行也答子貢所求之言須要一言之閒能成一事之理試於仁義禮智孝弟忠信諸處求之皆無如此簡當之言夫子從恕上取出此語只一言便成一箇圎全義理使人人終身行之雖至千萬世其言無弊非聖人孰能如此吾之於人也誰毁誰譽如有所譽者其有所試矣注毁者稱人之惡而損其真譽者揚人之善而過其實夫子無是也然或有所譽者則必嘗有以試之知其將然矣毁譽止是稱揚人之善惡本無損真過實之私但用之不公遂有此病公毁公譽自不如此若稱惡必至於損真然後為毁揚善必至於過實然後為譽則稱其真有之惡揚其實有之善遂不謂之毁譽乎下文如有所譽之譽乃夫子既試之後稱其實有之善而亦謂之譽則譽之為義本無過實之私豈不甚明注又變易其說以為知其將然意轉迂回不可曉矣蓋試者試驗其見行之事見善有實然後譽之亦只是譽其見有之善而已若於見有之善置而不問却專揚其無可照證將然之善我輩尚不如此況聖人乎毁止當解為言人之惡譽止當解為稱人之善夫子之言蓋謂我於誰有意偏毁於誰有意偏譽如有所譽者乃是曽經試驗見善有實然後譽之也南軒曰毁者指其過譽者揚其美誰毁誰譽謂吾於人初無毁譽之意也而有所譽者必有所試因其有是實而稱之此說為是斯民也三代之所以直道而行也注直道無私曲也言吾之所以無所毁譽者蓋以此民即三代之時所以善其善惡其惡而無所私曲之民故我今亦不得枉其是非之實也尹氏曰孔子之於人也豈有意於毁譽之哉其所以譽之者蓋試而知其美故也斯民也三代所以直道而行豈得容私於其閒哉此一節與上文本不可通說注文先指毁譽為稱惡損真揚善過實之私於此乃言無所私曲不枉是非之實蓋以誰毁誰譽與直道而行互相遷就必欲使之通為一意也毁譽之說前已辨之既毁譽無損真過實之私則誰毁誰譽與此一節無復相關此其不可通之一也直道而行止是民之自身不為邪惡之行循其淳善之直道而行善其善惡其惡却是剖判他人之善惡曲直乃其在民上而治人者所為非其為民者所行之道此其不可通之二也凡知為人之理者枉人之心自不當有何必問其民之有無私曲哉必須彼先無所私曲然後己才不得枉其是非之實彼若有所私曲己遂得以枉之邪聖人之心正不如此此其不可通之三也既以兩節解為一章經之全文皆當通論今於前一節中惟取誰毁誰譽一句之意與此一段相合為說其於如有所譽其有所試矣之兩句略無干涉此其不可通之四也尹氏之說惟解上文則可於此一節亦不可通蓋自斯民以下本自是一章言今之此民亦三代之民耳在三代之時皆能不為邪惡之事循其淳善之直道而行也蓋傷今民不如古民之直非天之降才爾殊皆其風化使然故有此歎南軒曰春秋之時風俗雖不美然民無古今之異三代之所以直道而行者亦斯民也此為得之南軒此解與解上文之說本亦分為兩意故兩說皆當然猶懷疑不斷其下却欲牽合為一不免反以為纍惜哉王滹南曰記者以此屬於聖人無毁譽之下義終齟齬疑是兩章豫謂南軒滹南所見本同須作兩章義乃可通此章首無主名蓋闕文也吾猶及史之闕文也有馬者借人乘之今亡己夫注楊氏曰史闕文馬借人此二事孔子猶及見之今亡己夫悼時之益偷也愚謂此必有為而言蓋雖細故而時變之大者可知胡氏曰此章義疑不可強解今亡己夫中原古注本已作矣今亡矣夫於文為順然此章義實難曉不可強解胡氏之說誠是前二說真強解也小不忍則亂大謀注小不忍如婦人之仁匹夫之勇皆是婦人之仁慈而無斷匹夫之勇敢而輕發二者皆足以亂大謀然夫子之言必居於一無一言兼包兩意之理此必有為而言今不可考但繼上文巧言之意為說則婦人之仁為近知及之仁不能守之雖得之必失之注知足以知此理而私欲閒之則無以有之於身矣注言知足以知此理理字與下文不莊以涖之則民不敬義不可通知及仁守以位言也人於公卿大夫等位其才智各有能至之者或能至於大夫或能至於公卿然無仁義之道以守之雖己得之終必不久而失之也君子不可小知而可大受也注知我之知也受彼所受也蓋君子於細事未必可觀而材德足以任重果如此說君子不可小知乃是斷定凡為君子者於小事皆無可知之善也豈通論乎古人於一言一行細事之閒察知人之賢者多矣人有君子材德於事之大處亦可知事之小處亦可知顧我之識見何如耳君子在下而我不知者正由我之識見有所未至非彼君子無可知也若彼之為人果於細事之閒不顧道理所行實無可知之善雖有能成大事之才亦未足以為君子也只以語法論之受既為彼所受知却為我之知亦甚迂曲知與受皆當一順言之知亦君子之知受亦君子之受蓋君子不為小察而其所務者大如書算小能米鹽細務及一切纎巧技藝不必多能此所謂不可小知也如託孤寄命致君澤民等事足任其重此所謂而可大受也當仁不讓於師注仁者人所自有而自為之非有爭也何遜之有當仁不讓非為仁為人所自有非有爭而不讓也蓋其為仁之理自不容讓如孝於父母先讓師孝然後自孝孺子將入於井先讓師救然後救之皆無此理君子殺身成仁豈可以殺身為讓哉此其不讓之義雖師亦不容讓也季氏第十六注洪氏曰此篇或以為齊論洪氏率爾一言略無慿據注文遽信從之假如復有引或人之說指子罕篇為齊論鄉黨篇為古論或更顚倒篇次升其後者於前降其前者於後亦當從之邪何晏集解敘分辨魯齊古三論語本末甚詳言齊論語二十二篇有問王知道多於魯論二篇古論亦無此二篇分堯曰下章子張問以為一篇有兩子張凡二十一篇漢末大司農鄭𤣥就魯論篇章考之齊古為之注由此推之齊論異於魯論者問王知道兩篇而已古論異於魯論者重復子張一篇之名而已餘者二十篇則三論語皆同季氏一篇亦皆同有豈容齊獨有之哉果如洪氏之說古論當是二十篇魯論則十九篇也自古以來未嘗聞有如此之說鄭𤣥合併之後亦未嘗再有更改不知或人何從得此洪氏乃指或人為據正為道聽塗說刪之可也則將焉用彼相矣注相瞽者之相瞽者之相蓋取上篇相師之相為說也相本訓助訓扶元是扶持輔佐之義非因先有孔子相師之言然後始有此訓也凡其言動之間相與扶持輔佐之者通謂之相如舜之相堯禹之相舜伊尹相湯周公相武王豈皆瞽者之相邪舊說相謂輔相言其輔相人者當持其主之傾危扶其主之顛躓若其不能何用彼相只從此說豈不本分不患寡而患不均不患貧而患不安注寡謂民少貧謂財乏均謂各得其分安謂上下相安是時季氏據國而魯公無民則不均矣寡字之意普指國家資用諸物而言土地人民皆在其中不可專言民少也寡與貧意本無别寡即貧也貧即寡也均謂貧富均勻也貴賤上下各依其分上無餘富下無餘貧雖或貧寡而上下均勻人自安和不覺其貧故曰均無貧也杜甫所謂無富貧亦足正得此意彼無道之世至於以酒為池懸肉為林而民有飢色野有餓莩此其不均之甚者也季氏富於周公而民疲於聚斂冉求輩又欲取顓臾以附益之故夫子責之如此不均云者意不專在魯公無民也若謂季氏據國魯公無民是為大逆豈可但言不均而已哉四書辨疑卷七
