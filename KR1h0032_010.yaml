body:
  text: 欽定四庫全書四書辨疑卷十元陳天祥撰孟子公孫丒上曰管仲曾西之所不為也註曰孟子言也自子誠齊人也下連此句皆孟子之言此處不當又有孟子𤼵語之辭曰本衍字無疑地不改辟矣民不改聚矣註闕改字學者各以意說未有定論改改變也盖言田野開闢民人生聚與夏后殷周盛時無異地今不改變三代盛時之開闢民今不改變三代盛時之生聚也速於置郵而傳命註置驛也郵馹也篇韻諸說驛皆訓驛馬馹皆訓驛傳驛馬驛傳義本不殊驛傳亦驛馬也今以置為驛郵為馹置郵二字皆為驛馬置郵傳命乃是驛馬驛馬傳命不成文理况玉篇网部諸字凢從四者皆是止而不動之義與驛馹等字從馬而義主馳驅者不同南北玉篇江南廣韻置字止訓安置設立嘗見漢書中有訓驛處然於事多難合中原廣韻韻略與毛晃韻畧俱兼訓驛盖以漢書為據也毛晃云漢書烏孫傳有便宜因騎置以聞師古曰即今驛馬也此以騎置二字一衮說為驛馬義已不眀又國家設置驛馬通報逺近事情邊方奏事理合乗騎何必更言因驛馬以聞邪觀因字之意若指朝廷使者而言有便宜因其使者以聞於上則可說也然以騎置為使者稱呼亦無可據不知何謂毛氏又釋傳字云古者以車駕馬乗詣京師謂之傳車又云凡四馬髙足者為置傳中足者為馳傳下足者為乗傳此盖以置傳為驛傳意又指置為驛也夫所謂驛傳者乃其驛馬傳車諸傳之緫稱也今單指置傳為驛傳其言馳傳乗傳者遂不謂之驛傳乎以此觀毛氏所引諸置字義皆不安况置郵之置既有郵字相配為言與漢書中置字又難同論惟從玉篇及江南廣韻之訓為是郵字又未嘗有訓馹者字既從邑乃其停止人之處所也江南廣韻中原韻畧皆訓境上舍中原廣韻毛晃韻畧南北玉篇皆訓境上行書舍此訓為近郵只是傳舍廣韻釋傳字云驛馬曰傳此以郵為驛傳之舍也今之傳舍曰舘驛亦曰馬站又曰馬鋪歩遞之舍曰急遞鋪中原多事之際至曽三十里置一馬鋪急逓鋪大槩十里一鋪為常道路相望通謂之郵亭然急遞鋪始於近代孟子時猶未有也速於置郵而傳命置止是設置郵乃傳舍驛郵也盖言徳之流行速於設置驛郵以傳朝廷之命令也我四十不動心註四十彊仕君子道眀徳立之時孔子四十而不惑亦不動心之謂果如此說聖賢之不動心必須四十然後能之顔淵猶為未能也告子之不動心既先於孟子則是在四十以前此又當作何說也四十彊而仕止是言其年方彊壯可以入仕之時耳道明徳立能不動心非皆必在此時也孔子自言三十而立乃是心已立定不動之道已了非直事事不惑然後為不動也我四十不動心本言自已實然之事非指年例而言也此句經文本不須用註不動心有道乎註程子曰心有主則能不動矣孟子言不動心自有許多話說非只心有主三字能盡况人心所主有善有不善若其心主於不善豈有不動之理此䖏止是公孫丒所問之言說者但當解其本文不動心之道且合儘與孟子說孟施舍註孟姓施𤼵語聲舍名也此說本因舍豈能為必勝之語單稱舍字故以施為𤼵語聲也然於姓與名中間插一字為𤼵語聲不成語矣語錄指舟之僑孟之反尹公之他之之字為例亦恐未當近世如顔之推宋之問之徒用之字為名為字者多矣之僑之反之類正與此同之雖助辭亦不可於姓名中間作𤼵語讀况施字乎惟以施舍為名則不牽强舍豈能為必勝哉舍字上本合有施字盖傳寫之脫漏也雖褐寛博吾不惴焉註惴恐懼之也舊註解惴為小懼今言恐懼之皆未免為牽强詩云惴惴其慄惴止是畏懼之意準此解為雖褐寛博吾不畏焉亦不可通王滹南謂不字有誤予因疑為亦字盖言自反而不直雖褐寛博吾亦畏之也不得於言勿求於心不得於心勿求於氣註告子謂於言有所不達則當舍置其言而不必反求其理於心於心有所不安則當力制其心而不必更求其助於氣不得不得於理也言有所不達心有所不安是皆不得理而然也舍置不達之言正是心從理之功力制不安之心正是氣為助之驗舍置便是心力制便是氣不求理於心豈能舍置不求助於氣如何力制既言舍置其言却說不必求其理於心既言力制其心却說不必求其助於氣豈不悖哉不得於言勿求於心盖謂言有不得於理事已𤼵見於外不可求其理於心改其已然之失改則動其心矣不得於心勿求於氣盖謂心有不得於理事未𤼵見於外不可求其助於氣成其未然之非成則亦動其心矣告子之不動心用此道也故孟子言不得於心勿求於氣而不助成心之非可也不得於言勿求於心而不改其言之失不可也心之非不可助言之失必當改心與言皆合義然後可以不動矣夫志至焉氣次焉註若論其極則志固心之所之而為氣之將帥然氣亦人之所以充滿於身而為志之卒徒者也故志固為至極而氣即次之此以至為極就其極字為說也然極字地位非志之所宜居也志雖氣之將帥義又志之君主也若志不遵義自䖏其極出入專恣帥氣而行未有所行不亂能使其心自然不動者也至字止當訓至到之至南軒曰志之所至氣次之而至此說為當持其志無暴其氣註人固當敬守其志然亦不可不致養其氣盖其内外本末交相培養此則孟子之心所以未嘗必其不動而自然不動之大畧也註文只是朦朧說過終未嘗明其如何為持其志如何為無暴其氣中間節制其宜者果何物也夫志不當使之自專以妄動遵義而動皆合宜是之謂持其志也氣不可使之自恣而妄𤼵循理而𤼵皆中節是之謂無暴其氣也節制者惟義而已此其内外本末交相培養之道也志壹則動氣氣壹則動志也今夫蹶者趨者是氣也而反動其心註壹專一也蹶顚躓也趨走也孟子言志之所向專一則氣固從之然氣之所在專一則志亦反為之動如人顛躓趨走則氣專在是而反動其心所以既持其志而又必無暴其氣也壹雖訓專乃專輒自用之意動者臲卼不安之意盖志與氣皆不可自有所專俱當聼命於義志則秉義命以帥其氣氣則承志之所至次之以接於物則内外相應𤼵皆中節各不違宜無所虧失故氣充而無餒心安而不動也若志不遵義而專壹自恣所行既亂氣必不得自寧氣不循理而專壹自恣所行既亂志亦不能自靖故曰志壹則動氣氣壹則動志也至於顛躓趨走之際氣又非專在是也正由素無所養不能順序循理而輕率妄𤼵故其舉錯失常以至於此既已顚躓其氣愈亂氣亂則心自不安也我知言註知言者盡心知性於凡天下之言無不有以究極其理而識其是非得失之所以然也雖能究知天下之言識其是非得失而於己之行事却不相關未見心之不動之理盖知言者知其言之詖淫邪遁之病不使有之於己則言公事直心無愧怍而不動矣其為氣也配義與道無是餒也註配者合而有助之意義者人心之裁制道者天理之自然言人能養成此氣則其氣合乎道義而為之助使其行之勇決無所疑憚若無此氣則其一時所為雖未必不出於道義則亦不免於疑懼而不足以有為矣浩然之氣集義所生須有是義則有是氣若無是義則無是氣但見氣須以義為主未見義須以氣為助配有助之意此過論也所謂若無此氣則其一時所為雖未必不出於道義則亦不免於疑懼而不足以有為者此論窒礙尤多果無氣則其義已不存如何所為却出於道義所為果出於道義則其自反而縮雖千萬人徃矣又豈有疑懼不足有為者哉一時所為暫行遽止有始無終止是專以顧䕶私欲而已便謂出於道義恐亦未當夫道本無物可指統而言之乃其事物相交所由道路之總稱義乃道中之物也分而言之事事物物各有其道義亦自有義之道若以道義兼言則可義與道對言則不可經言配義與道與字界在義道之間乃是配義而又配道義與道何可分邪註文分義為人心之裁制分道為天理之自然此又不察義亦無非天理之自然與道亦無可分之理也然其氣合乎道義之一句中撤去與字不用而以義道兼言亦由見與字有窒故也又觀前後經文前言以直養而無害後言是集義所生皆說以義養氣之事惟此中間一節却說氣助義道與前後意義亦不相合配止當訓合與當作為其為氣也配義為道無是餒也如此讀之義乃可通恐經文與字為誤不然終無可通之理必有事焉而勿正心勿忘勿助長也註必有事焉而勿正趙氏程子以七字為句近世或并下文心字讀之者亦通必有事焉有所事也如有事於顓臾之有事正預期也春秋傳曰戰不正勝是也如作正心義亦同此與大學之所謂正心者語意自不同也此言養氣者必以集義為事而勿預期其效其或未充則但當勿忘其所有事而不可作為以助其長乃集義養氣之節度也若依近世之說改心字属上文勿正心三字不成文理王滹南曰或以心字属上句或以属下句以文勢觀之語皆不安中間或有脫誤未可為㫁然之說也此論甚善勿正勿忘之間難容更有心字勿忘上只當有一亦字心字盖亦字之誤註文解正字為預期語錄曰正則有所待盖必之之意既以正為期待又以期待為必之之意遷就甚矣必期二字義實不同必是必定不移之意期是期望未定之意如言期於必取期於必得須有必字乃為定意單用期字與必同說非也戰不正勝若解為戰不期勝連春秋傳也說不通正勝乃必勝之意如楚子玉所謂今日必無晉矣者是也不正勝者謂其不可有準定必勝之意也至於期望之心何可無也孔子行三軍亦必好謀而成者是與未嘗不望有成也由是言之以正為期誤亦明矣註又言養氣者必以集義為事乃是專為養氣而集義也君子行義知此義為巳所當為而為之日徃月來義乃自集以漸至於事皆合宜則俯仰無所愧怍浩然之氣自成義不可有意於集氣不可專意於養惟能真實行義則義自有集氣自有養是之謂善養氣者也彼専為養氣而集義者其心本不在義特欲假此義為養氣之資所集之義非真實之義也義既無實氣亦豈能浩然哉又解勿正為勿預期其效正不可為期辨已在前既以集義為事郤不期望其成效世間豈有為其事而不望其事之成者乎又解勿忘為勿忘其所有事勿助長為不可作為不知所有事果是何事作為果是如何作為皆不可曉必有事焉而勿正亦勿忘勿助長也者事指義所成之事功而言盖言行義則必有所成之事功在焉然其心當正在行義不可正在事功亦不可忘此事功於氣無所顧藉又不可欲其事功之速成急假無實之義以張其氣如助苗之長也義根本也氣枝葉也義實則氣充義虚則氣餒假虚義以張其氣是猶㧞根本以長枝葉也根本㧞則枝葉槁矣故曰非徒無益而又害之也予嘗推衍此論義極該廣非但養氣而已凡其巳所當為之善為之於已皆有及物之事功随之明明徳則有新民之事功随之正心修身則有治國平天下之事功随之然其心當正在明已明徳正心修身不當正在新民治國平天下之事功亦不當忘此事功而無及物之心也正便有助長之意勿正則自不至於助長矣前古聖賢凡說道義必與成物之事功兼言君子篤於親其下便說民興於仁慎終追逺其下便說民徳歸厚人人親其親長其長其下便說天下平如此之類不能徧舉其心雖不正在事功亦未嘗忘其事功也董仲舒言明其道不計其功此乃勿正而忘之也惟孟子勿正勿忘之言妙盡其理非後人所能及也此一節與上段文不相接必有事焉上疑有脫簡今不可考曰我於辭命則不能也然則夫子既聖矣乎註公孫丒言數子各有所長而孔子兼之然猶自謂不能於辭命今孟子乃自謂我能知言又善養氣則是兼言語徳行而有之然則豈不既聖矣乎孟子本言我知言非謂我能言也今因我知言之一語遂以為兼言語而有之非也此段疑有闕文不可强解人皆有不忍人之心註天地以生物為心而所生之物因各得夫天地生物之心以為心所以人皆有不忍人之心也若言所生之物各得天地生物之心以為心則犬豕馬牛虎狼蛇蠍皆當有不忍之心此物何嘗有此哉孟子止言人能如此非謂物物皆然也人皆有不忍人之心下文既有乍見孺子將入於井之說註文於此未宜多論惻隠之心仁之端也羞惡之心義之端也辭讓之心禮之端也是非之心智之端也註惻隱羞惡辭讓是非情也仁義禮智性也端端緒也絲之端緒即絲也麻之端緒即麻也仁之端便是仁義之端便是義今乃分仁義禮智為性分仁義禮智之端惻隱羞惡辭讓是非之心為情豈有一體而為兩物者哉語錄論乃若其情則可以為善矣與此說互相首尾亦以四端為情又說情既𤼵則有善不善盖不知惻隱羞惡辭讓是非之心未嘗渉於不善也情有善不善若指喜怒哀懼愛惡欲七情而言則可歸之四端則不可四端本只是仁義禮智不可别指為情也後篇惻隱之心仁也羞惡之心義也恭敬之心禮也是非之心智也有此明文豈容别議莫之禦而不仁是不智也註仁道之大如此而自不為之豈非不智之甚乎莫之禦三字註文無明說禦止遏之也盖言為仁由已莫之或有止遏之者而自不為之是不智也此與謂夫莫之禁而弗為者語意相類取諸人以為善是與人為善者也註與猶許也助也取彼之善而為之於我則彼益勸於為善矣此說過於用巧而失之狹其功止可及於知識之間而已不識不知者所遺多矣恐非孟子賛稱舜徳之本指也若只言與人同為善則理平意足氣象又廣大亦甚自然夫與人同為善誠難事也茍非大中至正之人莫有能者竊嘗驗之天下之人見人有技媢嫉憎惡違之使不通擠之使不保如此以便己私者比比皆然誠能克去己私以至公無我為心人之有技若已有之人之彦聖其心好之夫然後可以與人同為善矣視其規規然取彼之善為之於己以勸彼善者相去豈不甚逺哉南軒曰取諸人是與人同為善也此最本分孟子曰伯夷隘柳下惠不恭註闕孟子曰衍文公孫丑下天時不如地利註天時謂時日支干孤虚王相之屬也近世以時日支干湊為動作吉凶之說者不可勝數皆上古所未有也以此為天時恐非賢哲所宜談者至若彼邦離叛此國輯睦彼嵗饑饉此年豐熟彼軍疾疫此衆康寧又如舟師遇春水騎兵得秋風渉險而無雨雪襲擊而逢隂晦敵國之所謂天時者皆此類也南軒曰用兵乗機得其時也夫環而攻之必有得天時者矣然而不勝者是天時不如地利也註言四面攻圍曠日持乆必有值天時之善者曠日持乆乃是地利之功不可與四面攻圍一衮解為天時之善也說者宜云四面攻圍必有值天時之善者然而曠日持乆師老卒墯而不能勝者由其城池險固易守難攻是為天時不如地利也域民不以封疆之界註域界限也註與經文通讀則是界限民不以封疆之界界字重複不成文理域與下句固字威字相對為文皆是動作從已字樣域惟訓䖏為是盖言聚䖏其民不必以封疆之界限禁之也是或一道也註是或别有一種道理是或别有一種道理此是猜想揣度之言曽子既言我以吾仁我以吾義則所指之道亦已明矣孟子之言不應如此猜度也盖言曽子所言非不義也今我此事亦或與曽子所言同是一箇道理也故繼言天下有達尊三盖以齊王之爵比晉楚之富貴已之齒徳比曽子之仁義所以明其一道之無異也或者謙遜之意盖不欲直比曽子也子之持㦸之士一日而三失伍則去之否乎註去之殺之也若以殺之為問子之失伍也亦多矣乃是指孔距心亦可殺之也孟子之言何其踈戇如是邪前篇見不可焉然後去之見可殺焉然後殺之去與殺自有分别去之止是逐去不用非殺之也不得不可以為恱無財不可以為恱得之為有財註不得謂法制所不當得得之為有財言得之而又為有財也或曰為當作而不得之意止是謂其無財非有關於法制也經既眀言自天子達於庶人豈有不當得之法制哉註文為見兩言不可以為恱疑其重複故以法制之說與無財分之為二也試於常話中體認語意類此者每每有之雖兩言之而無財一句乃是故重前句自解其不得之由耳先言不得不可以為恱後乃再言只是無財故不可以為恱也後又總言得之為有財則其自解不得之意止在於無財豈不甚眀不可於經文之外増加法制為說也註又解得之為有財引或曰之說改為字為而字讀經文為得之而有財則益牽强不成文理矣且比化者無使土親膚於人心獨無恔乎註比必二反比猶為也化者死者也恔快也言為死者不使土親近其肌膚於人子之心豈不快然無所恨乎棺槨為死者護其肌膚雖愚夫愚婦共皆知之孟子何必諄諄言此邪充虞本以木若以美然為問孟子所答之言必須說出棺槨敦厚欲其耐乆不致速有朽壞之意則與元問相合而註文但說設置棺槨之常意於木之美惡厚薄略不相關則是未嘗答其所問也是豈經之本意哉舊說棺槨敦厚比親體之變化無令土親膚南軒曰比及其化不使土親其膚二家之解雖其文有小異大意則同皆以比為比及化為變化其理誠是然於上下之文猶未盡通也且姑且也者字乃普該衆人之辭盖言七寸棺槨自古以來人皆用之雖共知其親之體終皆不免朽壞且於比變化者不使土近其肌膚於人為子之心誰獨無此快恱乎吾聞之也君子不以天下儉其親註送終之禮所當得為而不自盡是為天下愛惜此物而薄於吾親也人有吝物之心亦皆止是為已今言為天下愛惜此物不知持此物於天下與誰也又况一人送終之物大都㡬何而為天下愛惜邪奪之於其親施之於天下不惟君子不為雖小人亦無此事不以天下儉其親盖言君子作事立法不欲使天下之人儉薄於其親也有仕於此而子恱之不告於王而私與之吾子之祿爵夫士也亦無王命註仕為官也士即從仕之人也從仕為官也士乃未為官者也解士為從仕之人誤矣經中觀亦字文勢仕士本是一箇字仕當作士傳寫之差也季孫曰異哉子叔疑註季孫子叔疑不知何時人盖子叔疑者嘗不用而使其子弟為卿季孫譏其既不得於此而又欲求得於彼舊註以季孫子叔為孟子弟子季孫不喜孟子之意故言異哉子叔亦疑之今以子叔疑三字為一人亦無考據子叔疑既已不用却得使其子與弟並為卿相此又不可曉也大抵此章自季孫曰之下文多未詳不可强解泄柳申詳無人乎繆公之側則不能安其身註泄柳申詳繆公尊之不如子思然二子義不茍容非有賢者在其君之左右維持調護之則亦不能安其身矣義不茍容者道合則留不合則去二子在魯君則不顧於己已則盼盼然望人於君之左右維持調䕶求區區一身之安此非茍容而何此段經文本與上文繆公尊禮子思之說相對為言上文註云繆公尊禮子思常使人伺候道達誠意於其側乃能安而留之也此說誠是所謂伺候者伺候子思之顔情也準此以解本段之義泄柳申詳亦是常使人候伺繆公顔情道達誠意於其側以安其身也然則人君以此禮賢則可人臣以此事君則不可註文亦是見此一節義有不安故宛轉其意特加賢者二字指君側之人為賢人以成二子義不茍容之說然經中本無賢字意脉彼其在君之側候伺顔情道達人之誠意通布腹心者盖亦只是左右親信與人媒合就事之人非皆可謂賢者也夫中正特立之士雖因賢者薦達至於行事之際可否進退有義存焉亦不直須常有賢者維持調䕶恃以為安也况泄柳又非中行之士推閉門不内之心乃其狷介之有甚焉者也君自造門欲就見之猶不可得豈有望其君側之人維持調䕶之理又以一章之文勢言之至其結意䖏止言慮而不及子思於泄柳申詳未嘗再有干渉亦難通解竊嘗撤去泄柳以下十七字讀之昔者魯繆公無人乎子思之側則不能安子思子為長者慮而不及子思如此則語意通順而無㚄礙十七字義實未詳王庶幾改之註所改必指一事而言然今不可考矣孟子去齊盖為道之不行非由一二事偶不如意悻悻然去之也若專望齊王止改一事意亦狹矣王庶幾改之者普言王之素習果能悛改而有自新之志猶可足用為善也其所責望於王者大矣不可單指一事而言也王由足用為善註楊氏曰齊王天資朴實如好勇好貨好色好世俗之樂皆以直告而不隠於孟子故足以為善直告不隱固為朴實只朴實亦恐未至於足用為善也况好勇好貨好色好世俗之樂有因不得已而言者有因慚怒而言者意皆自謂不能行先王之道此不㡬於自暴自棄乎指此為足用為善義無可取孟子平昔許齊宣王之意惟在不殺觳觫之牛所謂是心足以王矣者是也足用為善意正在此非指朴實而言也吾何為不豫哉註孟子雖若有不豫然者而實未嘗不豫也上文彼一時此一時之語正是自明其不豫之心在此時不得不有也今言實未嘗不豫於經文前後意已差别而註文兩句又自有窒果以實未嘗不豫為真則其雖若有不豫然者為假矣假者固不必論而真者於理亦非也見天下無有治期生民困於虐政而恬然不以為意仁人之心固如是乎觀孟子夫天未欲平治天下之言乃是憂先王之道不行生民之困無已不豫之心盖為此也吾何為不豫哉為當讀為去聲言我之不豫正為此耳我為何事不豫哉言其非為己也四書辨疑卷十
