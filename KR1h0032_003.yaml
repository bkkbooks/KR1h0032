body:
  text: 欽定四庫全書四書辨疑卷三元陳天祥撰語論八佾第三孔子謂季氏八佾舞於庭是可忍也孰不可忍也注季氏以大夫而僭用天子之樂孔子言其此事尚忍為之則何事不可忍為或曰忍容忍也蓋深疾之之辭范氏曰孔子為政先正禮樂則季氏之罪不容誅矣訓忍為容便有攘袂切齒之狀聖人氣象恐不如此若謂夫子容忍不過此言既出其勢豈容自己須當有所區處言罷却便無事何也又下章責三家之言如此平易而此章如此躁忿夫子之性情何其不恆如此邪范氏所論尤為過當僭竊天子之樂非獨季氏為然孟孫叔孫亦以雍徹皆坦然為之略無忌憚蓋由周道既衰綱常壞亂下之僭上習以為常有王者作亦須教之不改然後誅之聖人為心必無預期誅之之理或曰與范氏之説皆不可取謝氏曰君子於所不當為不敢須臾處不忍故也而季氏忍此矣則雖弒父與君亦何憚而不為乎南軒曰季氏以陪臣而僭用天子之舞目睹其數而安焉於焉而忍為則亦何往而不忍也二論與注文前説為當禮與其奢也寧儉喪與其易也寧戚注禮貴得中奢易則過於文儉戚則不及而質二者皆未合禮然凡物之理必先有質而後有文則質乃禮之本也夫子一聞林放之問遽稱曰大哉問於其所答冝無不盡既而但言禮與其奢也寧險喪與其易也寧戚答其大哉之問止此兩句而己寧儉寧戚又是謂此差勝於彼之辭終未嘗竭其兩端了了明明指定何者為禮之本注文直以儉戚當之義實未安此章疑有脫簡不可強解夷狄之有君不如諸夏之亡也注亡古無字程子曰夷狄且有君長不如諸夏之僭亂反無上下之分也尹氏曰孔子傷時之亂而歎之也亡非實亡雖有之不能盡其道爾程子説有君亡君大意皆是尹氏單説亡君不説有君南軒諸人之説解亡君皆非實為亡君解有君皆是實為有君亡字之説皆是有字之説皆非有與亡今通言之如言不有其父不有其君有字當準此義為説有君者有其君者也如言有無父之心有無君之心亡字當準此義為説亡君者亡其君者也蓋謂夷狄尊奉君命而有上下之分是為有其君矣諸夏蔑棄君命而無上下之分是為亡其君矣此夫子傷時亂而歎之也又如字作似字説意為易見或問禘之説子曰不知也知其説者之於天下也其如示諸斯乎指其掌注先王報本追逺之意莫深於禘非仁孝誠敬之至不足以與此非或人之所及也而不王不禘之法又魯之所當諱者故以不知答之弟子記夫子言此而自指其掌言其明且易也蓋知禘之説則理無不明誠無不格而天下不難治矣注文解不知之意前言非或人所及後言又魯之所當諱者故以不知答之於夫子不知也之一語中一併安排兩意亦由所見之不一也以理推之惟魯之所當諱者一説為是又觀所解指其掌之一節於魯所當諱故以不知答之之下繼言夫子言此而自指其掌言其明且易也此以指其掌為言禘之易知也此外若無别説則易知之意定矣其下再説蓋知禘之説而天下不難治此又以指其掌為言天下易治也一易字之意而以兩圖為説亦甚未安注文本意蓋於中庸見其明乎郊社之禮禘嘗之義治國其如示諸掌乎文與此章頗有同處故於明且易之下又言天下不難治也殊不審兩經之文雖有數字相類而其義實不同中庸一章普言以孝為治之易禘嘗二字乃是於宗廟祀先之禮中舉其大槩耳非如此章專言禘之一事也如云修其祖廟陳其宗器設其裳衣薦其時食又云事死如事生事亡如事存蓋以為慎終追逺則民德歸厚故言治國如示諸掌非虛語也今言知禘之説則理無不明誠無不格而天下不難治以公論評之僅知禘之一説便能明盡事物之理才知其説未嘗持守奉行便能無不感格皆無此理況自三代而下以及於今知禘之説者蓋不少也未聞皆能平治天下如示手掌之易也由此觀之則其所謂天下不難治者蓋亦無據之空言耳大抵此章發源於魯之禘祭魯以諸侯而用天子之大祭非禮甚矣故夫子於自灌以往皆不欲觀或人見有是言因問其説夫子以魯之僭竊不可斥言故先答以不知而後告以知之不難之意乃言知其禘之説者達之於天下其如示諸手掌之易見也始於禘自既灌而往盡於指其掌之句終上下一意如線本是一章不可分之為二也二三子何患於喪乎天下之無道也久矣天將以夫子為木鐸注喪謂失位去國木鐸金口木舌施政教時所振以警衆者也言亂極當治天必將使夫子得位設教不久失位也或曰木鐸所以徇干道路言天使夫子失位周流四方以行其教如木鐸之徇干道路也前説言天使夫子得位後説言天使夫子失位二説之不同如此皆以為是何也且夫子刪詩書正禮樂贊周易作春秋及與門弟子諸人答問之格言流傳以教後世其道與日月並明與天地同久豈得位當時周流四方所能致哉得位設教蓋所以體其木鐸之施教所振而言也周流四方又所以象其木鐸之徇於道路而言也二者之意皆不廣逺形容夫子之道業不出當代而已恐非善知聖人者木鐸之諭本以取其發聲為義蓋言二三子何患夫子之無位乎天下失教無道久矣天將以夫子振揚斯文為鳴道之木鐸發洪音於天下傳聖教於無窮也南軒曰天固將使夫子振斯文以覺方來也此説亦取木鐸之發聲為義居上不寬為禮不敬臨喪不哀吾何以觀之哉注居上主於愛人故以寬為本為禮以敬為本臨喪以哀為本既無其本則以何者而觀其所行之得失乎不正責見有之過却欲别觀他處得失亦迂闊矣居上褊隘而不寬為禮傲惰而不敬臨喪無哀戚之情今人中似此者甚多見其情態者無不惡之夫子之言亦只是惡其見有之不寬不敬不哀而不欲觀非謂無此三本無以觀其他所行之得失也里仁第四知者利仁注利猶貪也蓋深知篤好而必欲得之也注文主意蓋以智本性之所有而為道中之用不可使有功利之意故宛轉其説化利字為深知篤好終不正言利之本真亦過髙之論也謝氏曰知者謂之有所見則可謂之有所得則不可此説分判得見與得有理然須有得然後能好好然後得益有進篤好則得之深而居之安矣好仁者無以尚之蓋謂此也若以篤好為利仁則利與安無所分别仁智之道不可辨也蓋仁者志不專在仁之功效自然安而處之故曰安仁智者志在於仁之功效知有利益而為之故曰利仁仁者安仁知者利仁蓋亦言其仁智之本體如此非謂仁智之用分道而行如水火之不可相合仁者不能有智智者不能有仁也聖人教人二者未嘗有所偏也言處己義皆在於安仁言成物義皆在於利仁如君子篤於親則民興於仁未有仁而遺其親者也未有義而後其君者也若此類者皆取仁義及物之功而言此則利仁之事蓋不以利為利以仁為利也南軒曰利仁者知仁之為美擇而為之故曰利也語録答舜由仁義而行之問曰利仁豈是不好底知仁之為利而行之此説却公與南軒之説無異富與貴是人之所欲也不以其道得之不處也貧與賤是人之所惡也不以其道得之不去也注不以其道得之謂不當得而得之然於富貴則不處於貧賤則不去注文無詳説是非皆不大顯無多辨也南軒曰正而獲伸者理之常此以其道而得富貴者也不正而詘亦理之常此以其道而得貧賤者也然世有反是而得富貴貧賤者矣所謂不以其道也枉道而得富貴己則守義而不處在己者正不幸而得貧賤己則安於命而不去此説比注文為詳學者多宗之然似是而非者足以惑衆故不得不辨此章本論君子處己之道以其道不以其道皆於各人見行事上以義言之見行之事合義是為以其道也見行之事不合義是為不以其道也今南軒所論却是一槩指定正人只富貴便是以其道只貧賤便是不以其道不正之人只貧賤便是以其道只富貴便是不以其道與各人見行之事合義不合義了不相關是豈經之本意邪經所言者本論人之所行是與不是以其道是謂人以其道不以其道是謂人不以其道南軒之説乃論天之所行是與不是以其道是謂天以其道不以其道是謂天不以其道天本無私何嘗不以其道哉惟枉道而得富貴己則守義而不處之一節意若在於人事者然已先枉道不正豈有却能守義而不處其富貴者乎南軒本擬中庸大德必得其位必得其祿之説而言然中庸但言事之當然未嘗兼論時世也孔子豈非大德乎而其位不過諸侯之大夫年不過中壽而已蓋亦時運氣數使之然也夫善惡邪正詘伸有時進退行藏可否有義明治之世君子道長小人道消正而獲伸不正而詘固理之常昏亂之世小人道長君子道消不正獲伸正而受詘亦理之常今以枉道而得富貴與其在己者正而得貧賤者皆為反理之常非通論也若枉道不正之人於至明至治之世獲伸而得富貴善終者無是理也堯朝四凶終見殛竄周室管蔡不免誅戮豈非驗歟正直有道之人於明治之世不伸而得貧賤者蓋亦有由而然若隱居不求其伸貧賤乃性中所得即非不以其道若有故不得其伸貧賤乃命中所得亦非不以其道皆非反理之常惟正人亂世富貴邪人亂世貧賤似為反常然正人於昏亂之世實無志願可伸安於富貴之理亂世安於富貴非正人也邪人之於亂世當其志欲得伸可以必取富貴之時而乃反得貧賤者亦由羣邪相聚互相擠排自取之耳謂反常理又不可也然則富貴於義有不取貧賤在天有不免由此觀之不以其道之富貴誠有之矣不以其道之貧賤未之有也説者先須立定得字之義不可直言得富貴得貧賤也得謂有所得也有所得然後處富貴有所得然後去貧賤所得者得其處富貴去貧賤之資也富以祿言貴以位言得祿則處富而去貧得位則處貴而去賤富貴雖人之所欲若所得之祿位不義則郤之而不受寧捨富貴而不處貧賤雖人之所惡若所得之祿位不義則郤之而不受寧守貧賤而不去此之謂也君子去仁惡乎成名注言君子所以為君子以其仁也若貪富貴而厭貧賤則是自離其仁而無君子之實矣何以成其名乎前段論富貴貧賤去就之道自此以下至顚沛必於是止是言君子不可須臾去仁彼專論義此專説仁前後兩段各不相關自漢儒通作一章注文因之故不免有所遷就而為貪富貴厭貧賤之説本段經文意不及此後注又言取舍之分明然後存養之功密以理言之未有在內不先存養而在外先能明於取舍者南軒曰君子之所以為君子者以其不已於仁也去仁則何自而成君子之名哉此説本分與前段富貴貧賤之意不復相關蓋亦見兩段經文難為一意故不用諸家之説也然無顯斷猶與上段連作一章前後兩意愈難通説豫謂君子以下二十七字當自為一章仍取南軒之説為正好仁者無以尚之惡不仁者其為仁矣注好仁者真知仁之可好故天下之物無以加之惡不仁者真知不仁之可惡故其所以為仁者必能絶去不仁之事而不使少有及於其身真知仁之可好者才是知其仁為可好猶未實曽好之也真知不仁之可惡者才是知其不仁為可惡猶未實曽惡之也二者義皆未足又無以尚之本言善無可加也而注文解為天下之物無以加之此蓋疑其與好之者不如樂之者相窒而有回避之意也蓋好與樂大同而小有異樂則至矣好則有淺有深好之者不如樂之者以其好有淺深而言也好仁者無以尚之以其篤好而言也大抵樂則好好則樂未有不樂而能好不好而能樂者好仁至於篤好則得之深而安樂之矣故曰無以尚之言其善無再加也何有關於天下之物哉又以故其所以為仁者七字略過其為仁矣之一句而無明説亦似有礙於學者為字與上篇其為仁之本與之為同蓋言惡不仁者其亦為仁之人矣不仁之事不使有之於其身也南軒曰好仁者非深造者不能故曰無以尚之其次則惡不仁惡不仁是亦為仁者也此為依平之説蓋有之矣我未之見也注蓋疑詞有之謂有用力而力不足者蓋人之氣質不同故疑亦容或有此昏弱之甚欲進而不能者但我偶未之見耳蓋不敢終以為易而又嘆人之莫肯用力於仁也神識至於昏弱之甚乃其氣質極偏天性之光明無可容之地是為下愚不移之人渠亦豈能有欲進之志哉果有自強欲進之志不可謂之昏弱之甚也上文我未見力不足者所以明其仁實易為警其不肯為者也彼昏弱之甚誠不能而非不為者宜乎不在夫子所警也所謂疑亦容或有此又言不敢終以為易者皆以蓋有之言謂是實亦有此也前已言無後却言有前言至易後言非易何其言之不一也蓋仁本在己不必他求我欲仁斯仁至矣心肯為之誠不難及故夫子言其易為而無力不足者此確論也復言蓋有之矣我未之見也非為反其前言而謂實亦有此也此等語意常話中往往有之先言我未嘗見有如此之事後乃再言世間管也曽有此事我實未嘗見也此正決定必無之辭夫子之言亦猶是也人之過也各於其黨觀過斯知仁矣注程子曰人之過也各於其類君子常失於厚小人常失於薄君子過於愛小人過於忍尹氏曰於此觀之則人之仁不仁可知矣吳氏曰後漢吳祐謂掾以親故受汙辱之名所謂觀過知仁是也經文止言斯知仁矣未嘗言知不仁也程子尹氏仁與不仁皆兩言之若知其失於厚過於愛者為仁以此為斯知仁矣固猶有説至於知其失於薄過於忍者為不仁則斯知仁矣無可説也且人之誤有過犯但非故為者皆當原知其情豈直仁人有過方始知之邪蓋知仁云者乃是自知仁之道理仁字不可説在他人觀人之過必須審其事之從由分别善惡黨類察見本然之情使無枉濫斯為知其仁之理矣此以觀過者為知仁非謂知其有過者之仁也吳氏所引吳祐之事正當以吳祐為知仁理之人不可謂知其掾為仁人也如唐之陳敬瑄為西川節度使使其麾下討賊俘虜來者皆村居平民敬瑄更不循問來歷無論男女老幼皆殺之正由處心無良不知仁理故其所為殘暴至此惟髙仁厚乃能審知賊黨同惡之人止是阡能羅渾擎等數人而已餘皆蚩蚩之民豈有禍國之心不過為賊誘脅而來惟能審此而處置得宜故出師六日五賊皆平所誅才六人耳餘衆數萬皆歡呼鼓舞各歸本業如仁厚當時之用心可謂各於其黨觀過斯為知仁理之人矣士志於道而恥惡衣惡食者未足與議也注心欲求道而以口體之奉不若人為恥其識趣卑陋甚矣何足與議道哉志於道乃是專心致志於道心欲求道却是恰才有心將欲求道二者淺深不同志於二字與志于學之志于無異吾十有五而志于學注云志乎此則念念在此而為之不厭矣此説誠是今解志於道為心欲求道二説己自不同又後篇志於道據於德若準今説亦解志於道為心欲求道則與據德依仁亦不倫矣解此章者冝曰士當專志在道而或以衣食粗惡為恥者乃是志不在道而役乎外不足與議於道也君子懷德小人懷土君子懷刑小人懷惠注懷思念也懷德謂存其固有之善懷土謂溺其所處之安懷刑謂畏法懷惠謂貪利既以懷為思念而於通解處却不全用思念之意四懷字之説意各不同四者之事亦不相類懷德解為存其固有之善懷刑解為畏法存是存在畏是畏懼皆與思念意不相干所謂固有之善者蓋以德為自己之德也四者之中土刑惠皆在己身之外惟此却為已所固有之物事不相類所謂畏法者蓋以刑為刑罰之刑也四者之中德土惠皆在人心所欲惟此却為人所畏避之物意亦不倫德不可説為自己之德刑與德皆當歸之於國家德與德之流行之德同蓋謂國家之仁政也刑與刑于四海之刑同蓋謂國家之法則也土謂國土惠謂恩惠此章本論君子小人志趣不同君子之心普及於衆小人之志專在於己也君子懷德思念養民之仁政也小人懷土思念便己之國土也君子懷刑思念齊民之法則也小人懷惠思念私己之恩惠也吾道一以貫之注聖人之心渾然一理而泛應曲當用各不同一字乃一章之總要而注文略之但散漫言其泛應曲當用各不同不知一果何謂也吾道一以貫之者一指理而云爾蓋言吾所行之道惟一理以貫之也道者事物相通之道路也天下事物猶錢也道猶錢竅也理猶錢索也理之貫道猶索之貫於錢竅也錢雖散處各有從索之竅事物雖殊各有合理之道父子有親君臣有義長幼有序夫婦有别朋友有信至於親親而仁民仁民而愛物事事物物差等不齊千蹊萬徑各有攸往一一推之皆天理所在理所不在則窒而不通必不可行若楊朱為我墨翟兼愛者是也吾儒之道未有不循自然之理者此所謂一理以貫之也夫子之道忠怒而已矣注盡己之謂忠推己之謂恕而已矣者竭盡無餘之詞也夫子之一理渾然而泛應曲當譬則天地之至誠無息萬物各得其所自此之外更無餘法蓋至誠無息者道之體也萬殊之所以一本也萬物各得其所者道之用也一本之所以萬殊也注文以忠恕為貫道之實所論本宗程子之説而又增廣其意也忠者天道恕者人道忠者無妄恕者所以行乎忠也忠體也恕用也此程子之説也注文再衍為天地之至誠無息萬物各得其所又繼之以萬殊之所以一本一本之所以萬殊之説初不知正指何事而言觀其大意蓋以天地之至誠無息與萬殊一本為忠萬物各得其所與一本萬殊為恕比於程子之説可謂逺之又逺矣程子以忠為天道蓋擬中庸誠者天之道為説意謂忠便是誠也蓋不察忠之與誠大同小異不可與誠同為天道也忠本盡公事上之義若言君忠於臣父忠於子斷為不可誠則上下交通無處無之在人則有忠在天則惟誠天惟一誠而已何嘗更聞有忠邪忠則止於人為非有關於天道也又所謂忠體恕用者蓋以忠為恕之體恕為忠之用也夫盡己之實心無私隱謂之忠推己不欲勿施於人謂之恕忠自是忠恕自是恕豈有互為體用之理注又不説忠是恕之體再指忠為道之體不説恕是忠之用再指恕為道之用與程子之説已自不同況忠恕但能違道不逺今便以忠為道之體不亦躐等之甚乎且仁包五常忠亦在仁所包之內今既獨為道之體仁則反為忠所包矣豈不悖哉程子又言維天之命於穆不已忠也乾道變化各正性命恕也又有説川流不息萬物散殊者復有説賢人之忠恕聖人之忠恕者衆説紛紛張大如此旁牽曲引無所不至必欲使忠恕合而為一以成一貫之説然忠恕兩物宛然如舊終不可使之為一也夫聖人經世理人之道在生民日用事物之間皆循自然之天理而行道必循理理以貫道忠與恕豈能通貫天下之道哉東坡以為一以貫之難言也非門人之所及故告之以忠恕又楊龜山遊定夫親受説於程子亦不免其為疑皆以忠恕為姑應門人之語王滹南辨惑惟取東坡楊遊之説為正豫與滹南意同蓋當時問者必非曽門髙第弟子曽子以其未可以語一貫之詳故以違道不逺之忠恕答之也向若有如子思者問之則其所答不止於此也然其而已矣三字涉於太峻使後人專執忠恕為一直謂貫道者更無餘法轉致後人迷惑愈甚由此三字故也只就違道不逺之四字觀之便可見忠恕不能貫道貫道者惟理而已德不孤必有鄰注鄰猶親也德不孤立必以類應故有德者必有其類從之如居之有鄰也注文本取坤卦文言敬義立而德不孤之義為説大意固亦相類然經中有必字義不可通有德者固有類應相從之道惟明治之世為可必也若昏亂之世乃小人類進之時君子則各自韜晦逺遁以避其害却無類從不孤之理必字於此不可解矣鄰字解為類從亦為勉強德不孤必有鄰蓋言人之德業不能獨成必有有德者居相鄰近輔導之也魯無君子者斯焉取斯義與此同四書辨疑卷三
