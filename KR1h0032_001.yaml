body:
  text: 欽定四庫全書四書辨疑卷一元陳天祥撰大學在親民注程子曰親當作新程子為見親字義不可通又傳中所引湯銘康誥等文皆是日新新民之說以此知親字為誤故改為新此誰不知或問中問曰程子之改親為新也何所据子之從之又何所考而必其然邪且以已意輕改經文恐非傳疑之義奈何此等問答之言皆冗長虛語本不須用大抵解經以言簡理直為貴使正義不為游辭所亂學者不為繁文所迷然後經可通而道可明也安而后能慮注慮謂處事精詳處字意差慮是審詳思慮處是判決區處凡事於未行之前須是先有思慮審詳其事當作如何處置思慮既定然後判決區處慮在處前處在慮後慮與處之次第如此慮只解為審詳事冝乃為得中慮而后能得注得謂得其所止得其所止似有未盡與知止之義未易辨也蓋得謂得其所止之事理也傳文以仁敬孝慈信之五事為君臣父子交國人所止之善然天下之事物莫不各有當止之善傳文特舉其大要耳或問中論曰仁或流於姑息敬或墮於阿諛孝或陷父慈或敗子信或為尾生白公之為此本申明得字之義其說甚善蓋此等雖亦知其當止之善實猶未得所止之事理也若能審詳如何是君之仁如何是臣之敬如何是父之慈如何是子之孝如何是交國人可為之信須有如此思慮然後可以得其事之正理是之謂慮而后能得也物有本末事有終始注明德為本新民為末知止為始能得為終本始所先末終所後此結上文兩節之意注文專言結上文本末始終之意然下文自格物致知至治國平天下其本末始終之次第尤詳又有修身為本其本亂而末治者否矣之明文則此段物有本末事有終始之言非為專結上文蓋所以承上文而起下文也顧諟天之明命注顧謂常目在之諟古是字諟此也或曰審也尚書舊注諟是也孔頴達疏云諟與是古今之字異故變文為是也注文古是字之說蓋出於此果如孔疏所言則是古無是字而後人增之也然文字之古者莫若尚書如慢遊是好傲虐是作之是字豈後人所增者哉又今之江南中原玉篇諸韻諟字皆訓理也正也諦也審也未有說為古是字而訓此者惟從或曰之說解諟為審則為理順顧謂顧諟常目在之諟謂審念常心在之言常顧視審念天之明命以此謹畏之誠奉承上下神祗也湯之盤銘注盤沐浴之盤解盤為沐浴之盤此舊說也沐為沐髮浴為浴身髮與身無同器沐浴之理即欲迂曲說為兩盤實無可據兩盤之文或問中有一說云亦如人之一日沐浴日日沐浴又無日不沐浴此說亦為少思驗之天下之人未有無夏無冬日日須沐須浴者又盤乃淺器中間亦難容人沐浴也況古人刻銘於器以自警刀劒取其剛斷几案取其平正義皆象其本器而言惟此沐浴之盤所取潔淨之義不在本盤却在沐浴之人理亦未是銘之全文世久無傳盤果何盤不可考也參詳天下之物常須潔淨者惟飲食之器為然此盤亦只是飲食之間所用之盤說者宜云盤所以盛進飲食諸物必須日日滌拭去其垢穢常令鮮潔明淨以諭人須日日清潔其心不致為物欲所昏使其明德常明常新也作新民注鼓之舞之之謂作言振起自新之民解作字為振起義固不差解新民為自新之民理却未是觀康誥之文首言文王克明德至此乃以新民為結語止當與大學之道在明明德在新民之新民同說新乃已與新之非民自新也蔡氏書傳解作新民為作新斯民又曰此言明德之終也大學言明德亦舉新民以終之又陳大猷亦解為作新天下之民二家書傳俱成於注文之後蔡沉又文公之門人皆不以自新之民為是蓋公論也學者冝從之周雖舊邦其命維新注周國雖舊至文王能新其德以及於民而始受天命也能新其德以及於民此言文王之德化惟新也始受天命却是言文王所受有天下之天命惟新也一惟新分為兩意詩之本意果何如也文公詩傳中德與天命亦說不通孟子集注一向只說受天命有天下則自文王始略不言文王之德與此注意亦不同豫於孟子中有說可就觀之免重復也如切如磋者道學也如琢如磨者自修也注切以刀鋸琢以椎鑿皆裁物使成形質也磋以鑢鐋磨以沙石皆治物使其滑澤也治骨角者既切而復磋之治玉石者既琢而復磨之皆言其治之有序而益致其精也注文止是解詩於傳文所言學與自修無相干涉不知切磋如何為學琢磨如何為自修也或問中答問者曰骨角脉理可尋而切磋之功易所謂始條理之事也玉石渾全堅確而琢磨之功難所謂終條理之事也參詳此說數者之中惟治玉為難琢石磨石何難之有又所謂始條理之事終條理之事者此亦只是姑應門人之語若於學問自修果有可通之理則已取之為注矣注中既無意亦可見夫欲治骨角玉石為器必先切琢以成其質再加磋磨之功然後可為完器矣諭如立身為人必先學問以致其知繼有自修之行然後可為完人矣切琢以諭學問也磋磨以諭自修也經文當作如切如琢者道學也如磋如磨者自修也如此讀之於義為是磋琢二字傳寫之差也詩云於戲前王不忘君子賢其賢而親其親小人樂其樂而利其利此以沒世不忘也注前王謂文武也君子謂後賢後王小人謂後民也此言前王所以新民者止於至善能使天下後世無一物不得其所所以既沒世而人思慕之愈久而不忘也謂前王為文武君子為後賢後王小人為後民於總解處皆說不通文武之事業載在典籍後世之人惟務學知道者能思慕之年代久逺之後王後民如幽厲等無道之君田野間無知之民於文王武王之新民之事未嘗愈久而不忘也蓋前王只是當時沒世之王如孟子所謂舊君世人所謂先帝者是也君子小人亦只是當時之人君子以位言小人以民言居位者得以進舉其才德之賢是謂賢其賢也得以周贍其骨肉之親是謂親其親也為民者得以稱遂其溫飽之樂是謂樂其樂也得以保有其衣食之利是謂利其利也君子小人皆得各如其志是皆當時明王之德惠使然王身雖沒恩澤在人無貴無賤皆不能忘也聽訟吾猶人也必也使無訟乎無情者不得盡其辭大畏民志此謂知本注情實也聖人能使無實之人不敢盡其虛誕之辭蓋我之明德既明自然有以畏服民之心志故訟不待聽而自無也使民無訟非教化不能教化乃新民之事也明德新民二者不可相離若伹明已德未嘗有新民事效便能使民皆自畏服不敢興訟斷無此理文王之德亦既明矣而虞芮之人來訟之初未嘗有不敢之心也直至身入文王大化中見其耕者讓畔幼者讓長然後心始畏服慚退而罷由此言之明德之後須有新民之化使人人以孝弟禮義為心則自無貪競爭訟之事風俗既已如此雖有無實之人在其禮讓溫良之衆人中間亦自不敢肆意妄為盡其虛誕之辭其勢然也此乃大畏民志之謂知本謂知為治之本也此謂知之至也注此句之上别有闕文此特其結語耳注謂此句上有闕文此說誠是然又自添所闕傳文一章却為過分前人解經亦嘗有補正三五字之闕者以其餘文全在意脉可通而有補之之理也然亦但言某處冝有某字不過如此而已今乃全用已意創添一百二十七字以代曽子之言便為正傳似與不似且置勿論但以今人而作古書與前聖前賢經傳竝列於義似亦未安若準此為例則尚書亡逸四十餘篇後人皆得添補長學者不厚之風所繫甚大以文公之識量不免有此惜哉宜姑置之只講注文可也是故君子有大道必忠信以得之驕泰以失之注君子以位言之道謂居其位而修已治人之術發已自盡為忠循物無違謂信注文不肯通說但零解字義而已解道謂修已治人之術與下文義不相合忠信以得之驕泰以失之此言外交之道所得所失物皆在外非有關於修已也傳有錯簡其辨在後自殷之未喪師及惟命不于常以下皆是說得國失國之事理緣由得國由其得衆失國由其失衆善則得衆不善則失衆繼又厯言退不善進善人以明為善得衆之實前後意脉如線穿珠此一節乃其結語也君子以位言大道猶言大道理也得謂得衆得國失謂失衆失國是故二字乃承上起下之辭蓋好人所惡之惡人惡人所好之善人則其喪師失國之菑害必及其身是故在位之人得與失皆有自然之大道理存焉得衆以得國者必因忠信以得之失衆以失國者必因驕泰以失之自古以來未嘗聞有因忠信而失衆失國因驕泰而得衆得國者此乃自然之大道理也又所謂發已自盡為忠循物無違謂信者與論語集注盡已謂忠以實謂信之語意不同既已自盡無隱亦不須更言發已也循物無違四字意更難認以辭觀之止可說為循其物之性情而不與之相違此與中庸注文解率性處意正相類豈可以此為信哉纂疏所引文集又自轉與注文為注今厭其煩而不辨也忠信二字豫於論語中有辨或問又曰忠信者盡已之心而不違於物潔矩之本也注文改易論語集注之意於此可見蓋欲宛轉以就潔矩為說也夫潔矩以忖已度人為義推已不欲不加於人恕也忠與信何嘗有忖度之義哉信果為潔矩之本則恕當出自於信信為恕之本恕為信之末於理安乎況傳中明有此之謂潔矩之道之一句結其上文潔矩之意已了其下再引南山有臺之詩至辟則為天下僇矣乃是反潔矩之意以終其說此已下不復重說潔矩也忠信以得之止是言忠信為得衆得國之由何嘗有關潔矩之意哉或問乃以全章傳文自首至尾盡為潔矩秦誓一篇亦為潔矩孟獻子寧有盜臣之說亦為潔矩又引董仲舒與齒去角之說亦為潔矩遷就之甚皆不可取傳有三義節次甚明說見下段彼為善之小人之使為國家注彼為善之此句上下疑有闕文誤字注文兩說一謂有闕文一謂有誤字謂有誤字者為是觀上文與其有聚斂之臣寧有盜臣及國不以利為利長國家而務財用者必自小人等語皆言治國不可專任聚斂財利之小人彼字指上文聚斂之臣務財用之小人而言善字乃利字之誤也解者不可以彼為善之四字為句自彼至家十一字通為一句改善字為利字讀之語意自圓此章傳文義有三節首論潔矩正已之道次論得國失國之由次論理財本末自是故君子先愼乎德至亦悖而出七十六字與生財有大道文正相接直至章末通是一段專論理財後人失傳而却序在失衆則失國之下以致前後文理皆有隔礙今試改正全録其文上下通讀是否可見所謂平天下在治其國者上老老而民興孝上長長而民興弟上恤孤而民不倍是以君子有潔矩之道也所惡於上毋以使下所惡於下毋以事上所惡於前毋以先後所惡於後毋以從前所惡於右毋以交於左所惡於左毋以交於右此之謂潔矩之道詩云樂只君子民之父母民之所好好之民之所惡惡之此之謂民之父母詩云節彼南山維石巖巖赫赫師尹民具爾瞻有國者不可以不愼辟則為天下僇矣以上論潔矩正已之道此已下論得衆得國失衆失國之事理詩云殷之未喪師克配上帝儀監于殷峻命不易道得衆則得國失衆則失國康誥曰惟命不于常道善則得之不善則失之矣楚書曰楚國無以為寶惟善以為寶舅犯曰亡人無以為寶仁親以為寶秦誓曰若有一個臣斷斷兮無他技其心休休焉其如有容焉人之有技若已有之人之彥聖其心好之不啻若自其口出實能容之以能保我子孫黎民尚亦有利哉人之有技媢疾以惡之人之彥聖而違之俾不通實不能容以不能保我子孫黎民亦曰殆哉惟仁人放流之迸諸四夷不與同中國此謂唯仁人為能愛人能惡人見賢而不能舉舉而不能先命也見不善而不能退退而不能逺過也好人之所惡惡人之所好是謂拂人之性菑必逮夫身是故君子有大道必忠信以得之驕泰以失之是故君子先慎乎德有德此有人有人此有土有土此有財有財此有用德者本也財者末也外本內末爭民施奪是故財聚則民散財散則民聚是故言悖而出者亦悖而入貨悖而入者亦悖而出生財有大道生之者衆食之者寡為之者疾用之者舒則財恆足矣仁者以財發身不仁者以身發財未有上好仁而下不好義者也未有好義其事不終者也未有府庫財非其財者也孟獻子曰畜馬乘不察於雞豚伐冰之家不畜牛羊百乘之家不畜聚斂之臣與其有聚斂之臣寧有盜臣此謂國不以利為利以義為利也長國家而務財用者必自小人矣彼為利之小人之使為國家菑害並至雖有善者亦無如之何矣此謂國不以利為利以義為利也四書辨疑卷一
