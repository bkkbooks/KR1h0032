body:
  text: 欽定四庫全書四書辨疑卷六元陳天祥撰論語鄉黨第十朝與下大夫言侃侃如也與上大夫言誾誾如也注許氏説文侃侃剛直也誾誾和恱而諍也侃誾二字各有兩訓玉篇諸韻皆同侃字一訓和樂貌又訓強直誾字一訓中正之貌又訓和然須觀其用處各有所冝朝廷官府之間待下冝寬容事上冝嚴謹以強直待下則幾於不容以和樂事上則幾於不謹今與下大夫言則用剛直與上大夫言則用和恱於上下之交誠為未順又諍之為義乃極諫也必須遇有違理害義之重事不得已而用之尋常語話間豈容有諍邪若從此説閔子侍側誾誾如也亦是有諍於孔子也冉有子貢侃侃如也亦是以剛直待孔子也是豈聖門弟子尊師之道哉舊説侃侃和樂之貌誾誾中正之貌南軒引侯氏之説曰誾誾中正而敬也侃侃和樂而敬也二説意同今從之不時不食注五榖不成果實未熟之類此數者皆足以傷人故不食注言此數者蓋謂食饐而餲魚餒肉敗色惡臭惡失飪不時也數者之中惟失飪生硬之物食之難化或能傷人色惡臭惡餒敗之類此皆壞爛之物本無難化傷人之理正由氣味可惡勉強食之或至有傷傷自己之所惡而來非由物之能傷也夫子於食饐至失飪凡此數者止是為其味不堪食故不食也至於五榖不成果實未熟自不可食此何必言不時不食者一日三食不依其時則不食也南軒曰不時非食時也割不正不食不得其醬不食注食肉用醬各有所冝不得則不食惡其不備也二者無害於人但不以嗜味而茍食耳經文上句言食肉下句言凡食須醬不止在於食肉也醬不取其味但欲備數於前然後方食不知何義注文本不欲聖人有嗜味之心故為此説非中常之論也不得其醬不食止是欲其調味得冝而食之也南軒曰不得其醬調味之不得其冝也惟酒無量不及亂注酒以為人合歡故不為量但以醉為節而不及於亂耳酒之本性無他惟能使人神志迷亂而已飲之至於迷亂失常然後為醉今言以醉為節而不及於亂豈有不亂而醉者乎聖人亦無以醉為節之理程子曰不及亂者非惟不使亂志雖血氣亦不可使亂但浹洽而已可也此説意是不撤薑食注薑通神明去穢惡故不撤本草經諸藥皆有益人之用通神明去穢惡者固不少也然獨不撤薑食者蓋亦取其味之可喜故不撤也注文本謂聖人無嗜味之心故於夫子飲食之間凡有惡而不食喜而食之者皆宛轉其説不使有關於味之美惡魚餒而肉敗不食則謂為其傷人也不得其醬不食則謂惡其不備也不撤薑食則謂薑通神明去穢惡也於其本然惡欲之誠使皆晦而不顯以為聖人無意於味也是豈人之情也哉夫天下之人口之於味皆不待學而能知莫非自然而然雖有至道盛德亦不能使之不知不覺漠然而絶其所欲也聖人亦與人同但無欲之之甚耳至於擇其味之美惡可食者食不可食者不食庸何傷乎必須甘苦無擇鮮美臭惡一例食之然後乃為聖人其惑人也甚矣故不得不辨食不語寢不言注答述曰語自言曰言若從注文之説語與言既分兩等則食寢所慎亦各不同食則止是不語却合有言寢則止是不言却合有語若以答述自言一通論之當食之時人問則不與酬答不問則却當自言當寢之時不問則不先自言須問則乃與酬答然其先問者却是自言邢昺疏直言曰言答述曰語許氏説文直言曰言論難曰語注文與二説言雖相倣意各有差自言直言已不同答述論難亦不同廣韻訓語字雖引説文亦不全用其説止訓為論訓言字則曰言語也玉篇訓言曰言辭也訓語曰言説也舊韻略雜取諸説毛晃韻略專以説文為據本分言之惟廣韻玉篇以言為言辭以語為言説者最不穿鑿當取為正此章本無深意食不語止是口中有物故不多語寢不言止是心欲安靜故不多言語即是言言即是語不可強有分别也王滹南曰此何可分只是變文耳鄉人儺朝服而立於阼階注儺所以逐疫儺雖古禮而近於戲亦必朝服而臨之者無所不用其誠敬也或曰恐其驚先祖五祀之神欲其依己而安也鄉間無儺久矣我輩未之見也嘗聞故老所傳元旦閭巷小兒數十為羣皆以五綵纒杖唱和儺詞巡門以驅疫鬼謂之驅儺注所謂近於戲者必此類也夫子加誠敬於此亦無義理或曰之説謂安先祖神靈義有可取康子饋藥拜而受之曰丘未達不敢嘗注范氏曰凡賜食必嘗以拜藥未達不敢嘗受而不飲則虛人之賜故告之如此楊氏曰必告之直也君賜食蓋熟食也故可先嘗賜腥則亦不嘗矣夫藥性有萬殊服食之法製造不一尤無未熟先嘗之理又無迫使面嘗之命何必告之如是邪且康子以善意饋藥既已受之亦當善其辭意以答之今乃自以曲防疑人之心告其來使阻定不服其藥虛人之賜孰甚於此康子聞之非慚即怒便如康子寬厚能容而已之為人是何道理楊氏以必告為直聖人之直恐不如此王滹南曰當是退而謂人之辭記者簡其文故一曰字而足耳此説理當學者往往疑其稱名謂非所以告門人者抑亦未之思也如云吾無行而不與二三子者是丘也由之瑟奚為於丘之門丘也幸茍有過人必知之對門人稱名若是者多矣何獨疑於此哉惟從滹南之説為是廄焚子退朝曰傷人乎不問馬注非不愛馬然恐傷人之意多故未暇問蓋貴人賤畜理當如此未暇問乃是心欲問而無暇以及之也理當如此却是理不當問也一説而分兩意理皆不通問人之言止是傷人乎三字而已言訖問馬有何未暇雖曰貴人賤畜馬亦有生之物焚燒之苦亦當愍之今曰貴人賤畜理當如此其實豈有如此之理王滹南曰蓋其己見故不必問初豈有深意哉特弟子私疑而記之耳本不須著此三字此説決盡古今之疑先進第十一南容三復白圭注南容一日三復此言一日二字意昏語録云不是一旦讀此乃是日日讀之玩味此詩注文一日之意於此可見一日謂日日也南容之學餘皆無所用心日日專誦此詩無乃太約乎黃氏曰三復謂每誦至此必再三反復以識之非謂一次三復亦非謂一日三次誦之也此説於文為順然此章義本不通夫子專為三復白圭便以兄之子妻之恐無此理豫於公冶長篇已有其辨王滹南以為弟子附會此説誠是回也視豫猶父也豫不得視猶子也注歎不如葬鯉之得冝以責門人也門人厚葬顔回非禮也而顔路聽之孔子以其制不在已故有豫不得視猶子也之歎本無葬鯉得冝之意南軒曰豫不得視之猶子以有顔路故也季路問事鬼神子曰未能事人焉能事鬼敢問死曰未知生焉知死注問事鬼神蓋求所以奉祭祀之意而死者人之所必有不可不知皆切問也然非誠敬足以事人則必不能事神非原始而知所以生則必不能反終而知所以死蓋幽明始終初無二理但學之有序不可躐等故夫子告之如此程子曰晝夜者死生之道也知生之道則知死之道或言不告子路不知此乃所以深告之也注文本宗程子之説而又推而廣之也程子以晝夜諭生死晝諭生夜諭死此乃生死常理人人之所共知者注言原始而知所以生却是説受胎成形初為父母所生之生反終而知所以死又是説預知所死之由也不惟所論過深與程子之説亦自不同所謂死者人之所必有不可不知皆切問也又言幽明無二理但學之有序不可躐等此又迂逺之甚也夫二帝三王周公仲尼之道切於生民日用須臾不可離者載之經典詳且備矣而皆不出於三綱五常人倫彞則之間而已未聞教人幽明次序必須知死也必欲於常行日用人道之外推窮幽冥之中不急之務求知所以死者之由縱能知之亦何所用今以季路為切問誠未見其為切也夫子正為所問迂闊不切於實用故言未能事人焉能事鬼未知生焉知死知生謂知處生之道非謂徒知其生如原始知所以生晝夜如生死之生也蓋言事人之道尚且未能又焉能務事鬼神乎生當為者尚且未知又焉用求知其死乎此正教之使盡人事所當為者非所以教事鬼神告其知死也王滹南曰蓋以子路不能切問近思以盡人事之實而妄意幽逺實拒之而不告也此説本分注文解務民之義敬鬼神而逺之云專用力於人道之所冝而不惑於鬼神之不可知知者之事也語録曰鬼神自是第二著那箇無形影是難理會底未消去理會且就日用緊切處做工夫子曰未能事人焉能事鬼未知生焉知死此説盡了豫謂此二説所論却公足以自證今注之誤不踐迹亦不入於室注善人質美而未學者也程子曰踐迹如言循途守轍善人雖不踐舊迹而自不為惡然亦不能入聖人之室也善人不能入室蓋亦就其資稟而言非有關於學不學也今言質美而未學善人亦豈皆不學乎又循途守轍人所常談蓋言守死法而不知變通也程子以踐迹為循途守轍不踐迹乃是不循途守轍而能不拘死法達乎事權變通之道也果如此則有可以入室之理不可謂不入於室也大抵善人之體惟能以柔謹自守而無行義達道之資雖至為邦百年才可以勝殘去殺終不能致雍熙之化者正由循途守轍不能從冝適變所以不入於室也所謂雖不踐舊迹者蓋又指古之遺訓所以法則後人者是為舊迹也若不踐履此迹則是不循規矩違理妄行豈得謂之善人哉夫中庸之道雖不離於舊迹亦不拘於舊迹須能從冝適變乃得其中善人雖不得中道然於舊迹亦不可直言不踐也只以文理觀之上文既言不踐舊迹其下止可言故不入於室亦字乃是反上句之意與舊字全不相應若言不踐惡人之迹亦不入聖人之室則亦字之文為是然經中本無惡字意脈創加其文亦是曲説不踐迹三字義實難明不可強解論篤是與君子者乎色莊者乎注但以其言論篤實而與之則未知其為君子者乎色莊者乎言不可以言貌取人也君子不以言舉人謂不專信其言聽言未得其實而又必觀其行也不知言無以知人也正患不能辨其言之真偽耳果知其言虛偽不情則當待為小人而不取果知其言篤實無妄則當待為君子而取之今既明知言論篤實而乃又有色莊之疑語言虛偽者既不取言論篤實者亦不取則天下之言皆不足信聖人教人以知言亦為無用之虛語矣況言論出於口顔色在於面言色兩處各不相關今疑口中言論篤實恐是面上顔色莊嚴亦不可曉此與上章不踐迹文皆未詳不敢妄説從之者與注意二子既非大臣則從季氏之所為而已注文中既言子然季氏子弟其人豈肯自以季氏之所為為問夫子亦無指説季氏之惡以答季氏子弟之理蓋子然聞夫子具臣之言意謂具臣為旅進旅退隨衆之人故以從之者與為問者字須當細看從之者謂是從人之人非謂專從季氏也夫子弒父與君之言亦是泛言或有欲為如此之惡者仲由冉求亦不肯從子然所問夫子所答皆非專指季氏而言也顔淵第十二四海之內皆兄弟也注蓋子夏欲以寬牛之憂而為此不得已之辭讀者不以辭害意可也胡氏曰子夏四海之內皆兄弟之言特以廣司馬牛之意意圎而語滯者也惟聖人則無此病矣且子夏知此而以哭子喪明則以蔽於愛而昧於理是以不能踐其言爾兄弟同本連枝天倫至親無他人相混之理子夏四海皆兄弟之言正與墨氏之兼愛相類胡氏謂有語滯之病其説誠是然既以其言為有病矣而又譏其不能踐其言必使子夏絶父子之情而以寬牛之言自寬曰四海之內皆父子也君子何患乎無父子以此自處然後為能踐其言也比之前病不又甚歟惟刪去踐言一節則為無纍足食足兵民信之矣注言倉廩實武備修然後教化行而民信於我不離叛也言必以實之謂信信之在已不可須臾離也已不失信人自信之豈待倉廪實武備修方才有信哉果如注文之説須是有食有兵然後有信無食無兵則無信也然夫子於不得已而去兵去食惟欲存信此何説也又教化教民為善也教民為善亦須自有為善之實而民信服然後教化可行堯舜教天下以仁而民從之以其先有可信之實也若桀紂教天下以仁民必不從以其先無可信之實也由此觀之民信於我亦不直在教化既行之後也舊疏云民信則服命從化此説為是夫子答子貢之問止是舉其為政之急務三者之中又有緩急不得已而去其緩者非有先後之分也民無信不立注民無食必死然死者人之所不免無信則雖生而無以自立不若死之為安故寧死而不失信於民使民亦寧死而不失信於我也又曰以人情而言則兵食足而後吾之信可以孚於民以民德而言則信本人之所固有非兵食所得而先也一章中兩信字本是一意注文解民信之矣則云民信於我此以信為國家之信也解民無信不立則云民無食必死然死者人之所不免無信則雖生而無以自立此却説信為民之信立亦民之自立也又曰寧死而不失信於民使民亦寧死而不失信於我前一句信在國後一句信在民後又分人情民德二説云以人情而言則兵食足而後吾之信可以孚於民此説信亦在國也繼云以民德而言則信本人之所固有非兵食所得而先此説信又在民矣不惟信字交互無定而兵食與信先後之説自亦不一聖人本旨果安在哉王滹南曰民信之者為民所信也民無信者不為民信也為政至於不為民信則號令日輕紀綱日弛賞不足以勸罰不足以懲委靡頽墮每事不立矣故寧去食不可失信此説二信字皆為國家之信立亦國事之立也文直理明無可疑矣君子質而已矣何以文為注棘子成疾時人文勝故為此言棘子成之言直以文為絶不可用特發此言以觸子貢意本不在時人也説見下文惜乎夫子之説君子也駟不及舌注言子成之言乃君子之意然言出於舌則駟馬不能追又惜其失言也注文本謂棘子成疾時人文勝故以君子之意稱之此可謂不察人之瞋喜也君子質而已矣何以文為正與史𢎞肇所謂安用毛錐子語意無異故對子貢發如此之言非疾時人文勝乃是疾孔子所教子貢之徒文勝也子貢正謂妄意譏毁聖人之教故傷歎而警之也惜乎乃傷歎之辭説猶論也蓋言可惜乎子之所以論君子也此言既出駟馬不能追及其舌而返之也此與一言以為知一言以為不知之意同蓋所以深警其非未嘗稱有君子之意也文猶質也質猶文也虎豹之鞟猶犬羊之鞟注言文質等耳不可相無若必盡去其文而獨存其質則君子小人無以辨矣單讀此注辭與義皆通然與經文不能相合若以猶為須文須質也質須文也此之謂不可相無而猶字未嘗訓須也所謂若必盡去其文而獨存其質者此亦經中所無正為經文無此一節所以不能通也此段疑有闕誤不可強説愛之欲其生惡之欲其死既欲其生又欲其死是惑也注愛惡人之常情然人之生死有命非可得而欲之也以愛惡而欲其生死則惑矣既欲其生又欲其死惑之甚也愛惡與欲生欲死之心有私有公其心固有不可有者亦有不可無者不當一槩論也順於己則愛逆於己則惡此其愛惡之私也善可愛者愛惡可惡者惡此為愛惡之公矣惡可惡如盜跖陽虎黨於己則欲其生善可愛如后稷臯陶忤於己則欲其死此其欲生欲死之私也善誠可愛者永以望其生惡至當死者然後欲其死此為欲生欲死之公矣出於私者不可有出於公者不可無注文一槩言其欲人生死之心皆不當有有則皆以為惑若從此説於至善之人亦不當欲其生於至惡之人亦不當欲其死然則詩稱萬壽無疆書言時日曷喪孔子之慟哭顔淵周公之必誅管叔皆為用心之非歟過髙之論不本人情吾儒教中誠不冝有既又二字止是説在一人蓋於一人之身既曾欲其生又復欲其死也其人向者順於己己則愛而欲其生其人復有逆於己己則惡而欲其死於彼一人之身欲生欲死反覆無定而不自知何者為是是為惑也辨惑之道惟在自能省此而已片言可以折獄者其由也與注片言半言折斷也子路忠信明決故言出而人信服之不待其辭之畢也明決二字是忠信二字非忠信固能令人信服然非可以折獄也舜與周公忠信至矣猶不能使四凶管蔡聞半言而自服其罪子路雖賢豈能過於舜與周公哉凡其所謂片言隻字者皆其言辭簡少之稱折猶挫折也如云折其鋭氣面折其非是也折之使服非信服也片言可以折獄者其由也與蓋言能以一二言折其罪人虛偽之辭使之無所逃其情惟子路為然也尹材曰子路言簡而中理故片言可使罪人服此説為是子路無宿諾注宿留也尹氏曰一言而折獄者信在言前人自信之故也不留所以全其信也信非可以折獄前已辨之無宿諾者蓋言子路重然諾不輕許人既已許諾隨即行之無有停留也此當自作一章與前節片言可以折獄無相干涉舊疏云或分此别為一章今合之以此觀之則片言可以折獄與此元是二章邢昺輩合而為一也林少頴又連下文聽訟吾猶人也通為一章其説益牽強不通王滹南曰片言可以折獄至必使無訟此自三章不相干涉但記者以類相附耳聽訟吾猶人也必也使無訟乎注范氏曰聽訟者治其末塞其流也正其本清其源則無訟矣范氏正本清源之論大意不差只是有可説無可行不知果行何事是為正本清源而能使民無訟也蓋聽訟在於審察之明無訟乃是教化之功民不知教則近於禽獸不仁不義何所不為既陷於罪然後以聽察之明剖析其是非真偽雖得其已然之情豈能致雍熙之治哉故聖人為政不以聽訟之明為貴但在教民從善使以孝弟禮義為心則自無爭訟此乃正本清源之謂也然則聽訟亦為政之急務而不可忽但非為政之本耳樊遲問仁子曰愛人問知子曰知人樊遲未達注曽氏曰遲之意蓋以愛欲其周而知有所擇故疑二者之相悖爾惟仁者能好人能惡人仁則亦有愛惡之擇也樊遲問仁孔子答以愛人非謂不擇善惡普皆愛之也蓋仁者以愛人為本耳至於遇有一直一枉亦不直須枉直皆舉然後為愛也由是觀之愛人知人本不相悖樊遲何為而疑之哉曽氏意謂仁智二事遲皆未達然下文質之於子夏但言問智之事而不及於問仁則所謂未達者止是未達知人之理耳與愛人本不相干舊疏云樊遲未曉達知人之意故孔子復解之此説本是下文南軒滹南之説與此意同舉直錯諸枉能使枉者直注舉直錯枉者知也使枉者直則仁矣如此則二者不惟不相悖而反相為用矣二者本不相悖前已辨之舉直錯諸枉此是智之用能使枉者直此是智之功注文以上句為智分下句為仁誤矣須是自已行仁然後可為仁人若但能審其舉錯為之激勸使他人改枉為直止可為智未足為仁王滹南曰此一段皆論知人之智耳與問仁之意全不相關故南軒解能使枉者直則曰知人之功用如此解不仁者逺則曰此可見知人之為大文理甚明而龜山晦菴無垢之徒皆以為兼仁智而言其意含楜了不可曉豈以樊遲屢疑子夏深歎且有逺不仁之説故委曲求之而至於是與竊所不取此説參考詳備無有不當學者冝從之子貢問友子曰忠告而善道之不可則止無自辱焉注友所以輔仁故盡其心以告之善其説以道之善其説以道之語意不明不知如何是善其説道是如何道語録曰須又教道得善始得以此知注文道字乃教道也朋友有過既盡心以告之而又加之以教道須至於善而後已此正犯數斯疏矣之戒施之於朋友之間必不能行蓋道猶言也善道之者善其辭色以言之也朋友有過固當盡心無隱竭忠以告之然其告之之際須當心平氣和善其辭色以為言不從則止無得峻數以取自辱也四書辨疑卷六
