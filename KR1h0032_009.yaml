body:
  text: 欽定四庫全書四書辨疑卷九元陳天祥撰孟子梁惠王上王亦曰仁義而已矣何必曰利注重言之以結上文兩節之意此果為孟子重言亦字下須更有一當字文乃可通然於事理終亦不安蓋是責梁惠王亦當如己所言而言此世俗所謂我相話者是也大賢氣象正不如此若只解為梁惠王語文與事理俱順而注文不取者其意必謂開納仁義之言乃賢君之事非梁惠王所能及也蓋不察其本情此乃辭窮理屈不得已而面從之言非誠心也舊疏云惠王悟孟子之言為是而以己言為非故亦以此應之此正犯注文不取之意其實梁惠王何嘗能悟此哉其說歸之梁惠王者是也其所以歸之者非也冝曰惠王心實未以為然特以辭屈面從之也不日成之注不日不終日也不終日三字意昏學者猜為兩說一說不終一日而成一說官無督責之嚴民之役作每不至於終日也未知注文果主何說若言不終一日而成非有司督責嚴急必不至此不可謂之勿亟也況臺沼之功實無不終一日可成之理經之營之亦是緩慢之辭非有急迫速成之意若謂民之役作每不至於終日却無庶民子來之勤意二說義皆不通不日二字人所常言如唐太宗謂真珠可汗不日瓜剖之李德裕謂上黨不日有變蓋皆言其日限不逺也不日成之者猶言不多日而成之也王好戰請以戰喻注闕願比死者一灑之糜爛其民而戰之此皆惠王好戰之事也夫以移民粟重惜民命仁也好戰殘民不仁也二者不容兼有猶水火之不可並處也今梁惠內實好戰外邀仁聲汲汲然望其民之多於鄰國原其本情蓋欲誘集衆力以為戰鬬之資其為不仁也甚矣孟子首以王好戰為對者蓋所以明其窮兵嗜殺暴棄民衆與鄰國無異移民移粟非有仁愛之實心也下文五十步百步之喻正謂此也填然鼓之注填鼓音也填本訓塞訓滿若直截解為鼓音似為未當蓋鼓音滿軍中之意也舊疏云鼓音充塞盈滿於戰陳之際此說義完不違農時榖不可勝食也數罟不入汙池魚鱉不可勝食也斧斤以時入山林材木不可勝用也注此皆為治之初法制未備且因天地自然之利而撙節愛養之事也然飲食宫室所以養生祭祀棺橔所以送死皆民所急而不可無者今皆有以資之則人無所恨矣注文不明似有不肯盡信孟子之意夫禁數罟斧斤不為暴殄戒徭役不奪農時以王政言之蓋萬世不易之常法今皆以為為治之初且因天地自然之利而為之則既治之後當遂不可用邪恐無此理五畝之宅樹之以桑五十者可以衣帛矣雞豚狗彘之畜無失其時七十者可以食肉矣注五十始衰非帛不暖未五十者不得衣也七十非肉不飽未七十者不得食也經言五十七十亦是大約言其衰老之年四十以後年近五十六十以後年近七十皆在其中未嘗額定必須年至五十方才衣帛必須年至七十方才食肉也今言未五十者不得衣未七十者不得食假使桑蠶饒足雞豚蕃息而全家數口之中未有五十七十之老者則四十九歲以下亦有得衣帛者六十九歲以下亦有得食肉者豈有限定不得之理說者但言年近五十者可以衣帛年近七十者可以食肉義理自足不得衣不得食之兩句姑置之可也黎民不飢不寒注黎黑也黎民黑髮之人猶秦言黔首也少壯之人雖不得衣帛食肉然亦不至於飢寒也此以黑髮為少壯之人所以别其五十七十之老者也然以黎民比黔首文理不同黔有首字相配為言則語意自圎黎民中閒本無髮字訓黎為黑是為黑民欲為黑髮之民文不全矣黎本訓衆又訓黑所用各有不同詩書稱黎民者先儒皆解為衆民不聞有異近世始有黑髮黔首之說文公詩傳東萊讀詩記解民靡有黎亦皆訓黎為黑說為黑首之民此更難道單一黎字又在一句之末其下别無字義黎既訓黑止可解為民靡有黑不知黑為何物也此乃服前一字之義何其不思之甚邪餘皆勿論此黎字亦止當訓衆蓋言五十七十者衣帛食肉其餘衆民亦不飢寒衆字之義與老者自有分别不必直言黑髮也狗彘食人食而不知檢塗有餓莩而不知發人死則曰非我也歲也是何異於刺人而殺之曰非我也兵也注惠王不能制民之産又使狗彘得以食人之食則與先王制度品節之意異矣至於民飢而死猶不知發則其所移特民間之粟而已乃以民不加多歸罪於歲凶孟子於此蓋反上文兩節之意為說初以不知發而歸罪於歲者諷喻梁惠王當自責己復引刺人而歸罪於兵者轉以喻罪歲之喻凡兩曲折皆假設比方之言今乃直認為梁惠王真實事迹誤矣如曰非我也歲也非我也兵也世閒未嘗真有此等事亦未嘗真有此樣人蓋其比況之閒自有如此抑揚之理正在以意逆志以求之耳況其所喻之情狀與彼梁惠王所行事迹亦甚易辨一則移民粟以致衆將內之於戰陳之閒雖糜爛之而不悔一則坐視其民飢餓至死而不救曰彼嵗為之何預我事彼為強橫有作為之不仁此為弛縱無顧藉之不仁既已為彼必不作此併以加之非通論也又言所移特民間之粟者此蓋見其移粟與不知發相窒故為此說以避之耳然亦自有本分說處不必如此迂曲之甚也蓋梁惠王移粟之意止是欲張聲譽邀結人心非有恤民之實念故孟子以不知發為諷其閒或更虛為形迹而實無所給或所給薄少而無補於衆是皆不可得知今直以為民閒之粟何所據邪所謂乃以民不加多歸罪於嵗凶者此又指梁惠王為其民因嵗凶飢餓致死而不加多也意又悖矣彼以告孟子之意蓋以移民移粟為己盛德冝為逺人所歸户增多於鄰國也既而恨其竟不加多止是怨恨鄰國之民不來歸己何關於嵗之豐凶哉下文斯天下之民至焉是為明證王無罪歲斯天下之民至焉注不罪歲則必能自反而益修其政天下之民至焉此又說孟子欲使梁惠王真不罪歲誤益甚矣王無罪歲者請王不以罪嵗之心為心也非謂實不罪歲也不以罪嵗之心為心不專責人而自責己則必能改修善政施實德於民則天下之民至焉而民多於鄰國也以此觀前節恨其民不加多之意果不在於歲凶也明矣願比死者一灑之注比必二反比猶為也言欲為死者雪其恥也夫東敗南辱西又喪地皆惠王之恥經既明言寡人恥之止當順本文為說今言為死者雪恥戰以君命戰死以國事死彼何恥哉比當讀為上聲比猶比方倣效之也蓋將不顧其生願效前之戰死者與敵決戰以此幸勝而雪其恥也無以則王乎注以已通用無已必欲言之而不止也王謂王天下之道以既為已王又當讀為去聲從而讀之文皆不順止當各從本字無以無以言也桓文之事既無以言則言王道可乎是乃仁術也注術謂法之巧者蓋殺牛既所不忍釁鐘又不可廢於此無以處之則此心雖發而終不得施矣然見牛則此心已發而不可遏未見羊則其理未形而無所妨故以羊易牛則二者得以兩全而無害此所以為仁之術也齊宣王偶見觳觫之牛與其乍見孺子將入井時心本相似卒然為不忍之慈所迫惟是急欲救免其死而已此心於此時恐不暇如此安排若顧念釁鐘而用如此之巧乃是人欲之私非本然不忍之善心也今以一術字之故周折至此孟子之意果如是乎曰定不然也此於經文自有明說見其生不忍見其死只此便是仁術大抵不忍之心易以及人難以及物或有施及於禽獸者必須因有見聞而後發不見不聞者此心無自而及之也故雖上善之人不見觳觫之狀者未嘗不忍見其死不聞哀鳴之聲者未嘗不忍食其肉齊宣改用未見之羊亦此理也何巧之有哉術訓方術又訓邑中道今亦止當訓道蓋謂仁心接物之道路也見牛觳觫可愍之狀則此心有路以及牛未見羊之可愍之狀則此心無路以及羊心之來路必須經由目之所見其理自有如此曲折象其邑中之道而言故謂之仁術孟子之言曲盡仁心妙用之理學者須靜思之然後可得今之儒者止是注解前人之言未聞有能自說如此一言者欲以解經之文而與孟子為比難矣哉是以君子逺庖厨也注其所以必逺庖厨者亦以預養是心而廣為仁之術也是以二字乃是因上起下之辭此句續上文為義本言不忍之心自然不欲以近庖厨也今加必字又曰預養却是力行自修之道與本然不忍之善心不同況仁乃已所固有我欲仁斯仁至矣復將廣何術而為之乎若言養是心以廣仁術則可謂廣為仁之術則不可然則養仁心廣仁術亦豈專於逺庖廚而已哉為長者折枝注以長者之命折草木之枝言不難也以折枝為易為之事此學者共能知之然須說到與長者二字相合處方是今言折草木之枝止是單取折之之易此於長者有何干涉果長者之命於此有必用之理有則方可折無則乃不可然後此說可通不然為長者三字於文為贅當時何若便不說此三字直言折草木之枝語人曰我不能顧不順快邪又何須長者之命哉經文既言為長者折枝則折枝之義屬於長者其為不可相離之物其明上下語脉須有關連豈容一句之內而有如此支離不相照管之理只以語法律之不言草枝木枝但云折枝不成語矣況草木之枝亦有堅脆大小之不同脆而小者折之固易若樹木之枝既堅且大者伐之而匪斧不克豈可一槩言其易折哉舊說為長者按摩手節此以枝為肢體之肢字義本是然所謂按摩手節者事却迂僻亦不可取為長者屈折肢體止是卑幼之於尊長常用易為之禮貌耳如斂手屈膝折腰之類皆其事長上之禮也說者冝云枝與肢通用折枝謂斂折肢體如斂手折腰為長者作禮也此與徐行後長者意正相類皆言不難為也刑于寡妻注寡妻寡德之妻謙辭也謙辭之說是非甚不難辨妻乃文王之妻詩是國人所作豈容有此謙辭哉況寡人為寡德之人乃人君自謙之辭以此稱妻未見其例或曰邦人稱邦君之妻曰寡小君亦謙辭也豈非例歟豫應之曰此惟稱諸異邦則可稱於國中則不可謂為寡德之小君則可謂為寡德之妻則不可毛氏詩注寡妻適妻也意則當矣但辭語太簡說不分明鄭氏箋寡妻寡有之妻言其賢也此亦迂說斷不可取刑于寡妻至于兄弟以御于家邦分明說文王之化自近以及逺自寡以及衆此寡字止是單寡非衆之意雖貴為天子富有四海之內亦惟正后一人為妻妻惟一人故以單寡稱孔頴逹正義適妻惟一故言寡此說為當蓋亦毛氏之意也權然後知輕重度然後知長短物皆然心為甚王請度之注言物之輕重長短人所難齊必以權度度之而後可見若心之應物則其輕重長短之難齊而不可不度以本然之權度又有甚於物者今王恩及禽獸而功不至於百姓是其愛物之心重且長而仁民之心輕且短失其當然之序而不自知也故上文既發其端而於此請王度之也前注言推恩次第必由親親推之然後及於仁民又推其餘然後及於愛物皆由近以及逺自易以及難其說當矣繼云今王反之則必有故矣故復推本而再問之此蓋指今恩足以及禽獸而功不至於百姓是謂反之也引下注與本經支離自此為始蓋以不殺釁鐘之牛謂是恩偏禽獸以此為愛物重長之說誤亦甚矣至於野有餓莩廄有肥馬之類薄棄民人厚恤禽獸此其為愛物之私也計彼齊宣所為類此者蓋亦不少但此捨牛一事特出於一時之不忍乃是人之固有之仁偶因遇物發見於外此天理之至公與彼私愛之心自是兩岐非難辨也孟子既言是心足以王矣則此心為至公之心本非有愛物重長之私豈不甚明孟子全章曲折引喻皆是譏其不能推廣此心何嘗以此心為不善謂其有反之之意哉今恩足以及禽獸而功不至於百姓者獨何與者言王之此心能自推而廣之雖於異類難及之禽獸其恩亦足可以及之也今於同類易及之百姓其功效猶且不至者乃是不曽推廣此心也獨何與者偏何如也猶俗言偏爭甚也蓋上文先言不推恩無以保妻子以彼校此均是不善推恩彼此無異故言獨何與也此與吾力足以舉百鈞一段文勢相同試引證之其說自見又足以二字乃是預期事效之辭今恩足以及禽獸此但言其恩之可及非言已及也如謂推恩足以保四海非謂已保四海也知此則知孟子之言本不謂齊宣之恩已曽實有惟以及物不以及人之異也由此觀之齊宣於觳觫之牛既無偏私之心孟子之言又未嘗謂其有反之之意所謂重長輕短之心果安在哉語意關緊處正在足以二字注文却特刪去不用直言今王恩及禽獸而功不至於百姓易無為有以就重長輕短之說違本經之義逺矣孟子請度一節本以結上文之意也權度所以喻心也物皆然心為甚者言以物度物皆有如此可準之則故曰物皆然也物雖皆有如此之則如稱尺於度量之閒終亦不能無毫忽之差以心度心無不同者凡已所欲即人之所欲凡已所惡亦人之所惡其則又準於彼故曰心為甚也施諸己而不願亦勿施於人民之所好好之民之所惡惡之老吾老以及人之老幼吾幼以及人之幼舉此加彼推已及人是皆潔矩之道所謂度也上文言之備矣王請度之者請王如此度之也抑王興甲兵危士臣構怨於諸侯然後快於心與注孟子以王愛民之心所以輕且短者必其以是三者為快也然三事實非人心之所快有甚於觳觫之牛者故指以問王欲其以此而度之也孟子前言推已及人之事此言危衆快已之事蓋反前說故以問王欲觀所答之意耳本與上文請度之事無相干涉以此為度甚無依據然其必須辨者前已辨之餘亦不須盡舉也梁惠王下王變乎色曰寡人非能好先王之樂也直好世俗之樂耳注變色者慚其好之不正也注文以變色為慚舊說為恚怒其實慚怒兼有之慚者慚已所好之不正而為孟子所知怒者怒莊暴不為已隱輒以告孟子也寡人非能好先王之樂也直好世俗之樂耳者此又拒孟子之言恐其言先王之樂以正已之不正也餘見下說曰王之好樂甚則齊其庶幾乎今之樂猶古之樂也注范氏曰孟子切於救民故因齊王之好樂開導其善心深勸其與民同樂而謂今樂猶古樂其實今樂古樂何可同也但與民同樂之意則無古今之異耳若必欲以禮樂治天下當如孔子之言必用韶舞必放鄭聲蓋孔子之言為邦之正道孟子之言救時之急務所以不同此蓋謂孟子勸齊宣王以其所好世俗之樂與民同樂是謂救時之急務也彼世俗之樂即鄭衛之聲也范氏謂孔子必放鄭聲孟子則不同亦是以孟子所言今之樂為鄭聲也此聲之為物也荒靡淫泆易以惑人故好之者衆孔子疾惡必放之者為其深有害於世也孔子惡其害世孟子取以救時斷無此理孟子一書無非救時之急務而皆本於正道枉尺直尋固所不為未嘗見有輒與孔子不同枉道以從時好者況世俗所好淫邪之鄭聲雖區區之齊宣王尚知慚其不正今乃反以為孟子所先之切務是何期孟子之淺也孟子初答莊暴王之好樂齊國庶幾之言本欲為王言先王之樂使知為治之本耳及見其有慚怒之色又言寡人非能好先王之樂則前欲言者為其所拒而不能進故就其言以誘之使其心順氣和以聽己之所言而已王之好樂甚則齊其庶幾乎者此特引下句之意與其所以答莊暴者言辭雖同其所言之意則異矣今之樂猶古之樂者此是繼上句以解齊宣慚怒之氣蓋皆將就引誘之辭非實謂古今樂同而有勸用今樂之意也今王與百姓同樂則王矣注好樂而能與百姓同之則天下之民歸之矣此又指孟子勸齊宣王以所好之樂與百姓同之是為同樂也孟子問齊宣衆樂獨樂多樂少樂非是勸其與衆多之民同觀所好之樂而已也此特引喻使知廣與衆民同樂之實耳孟子與齊梁之君言其與民偕樂同樂者非獨此也皆以省刑罰薄稅斂樹藝畜養不奪其時使老者衣帛食肉黎民不飢不寒頒白者不負戴於道路父子兄弟無離散之悲是謂與民同樂也上注言行仁政使民各得其所大意本是至此却說好樂能與百姓同之則天下之民歸之矣若無仁政善治之實但與百姓朝暮同觀所好之樂恐終無同樂之期亦無天下之民歸之之理好樂同者未見其是文王之囿方七十里注古者四時之田皆於農隙以講武事注文蓋取左傳臧僖伯諫隱公之言為說也四時惟冬為農隙冬狩講武必然之道餘三時農本無隙四時田獵雖各有名未必春須搜夏須苖秋須獮也此蓋或時有之因以為名耳如宵田曰燎豈必夜夜須獵邪皆於農隙講武恐未然也今也不然注今謂晏子時也今字之意本指景公輩而言改晏子為景公則是睊睊胥讒民乃作慝注睊睊側目貌胥相也讒謗也慝怨惡也言民不勝其勞而起謗怨也注文初亦訓睊睊為側目胥為相然於通解處却皆置而不說又於民乃作慝一句亦不再言民字誤皆不淺試皆依其訓釋復使睊睊與胥字民字預在說中取經文相對通為一讀乃是民不勝其勞而側目相謗民乃作怨也語意差互殆不可曉舊說在位者側目相視更相讒惡下民化之而作慝惡也此說本是蓋昏亂之世賢人退隱姦貪掊克者在位聲利富貴之閒互相攘奪而為側目相視交互相讒乃其常態蚩蚩之民何嘗有此就使不勝其勞而起謗怨止是同辭歸怨於上而為蹙頞相告而已自相謗怨無此事理又況民乃作慝一句既有民字别其文勢則上句睊睊胥讒非民明矣又訓讒為謗亦似未當讒之與謗雖皆務為發人過惡要之自是兩事謗則揚人之所有讒乃構人之所無謗每成於下怨讒必因其上疑謗冝多黨讒喜獨行謗為顯毁讒主暗傷其為兩事甚明合而為一未見其是以慝為怨亦非惟君所行也注言先王之法今時之弊二者惟在君所行耳此謂晏子欲使景公自擇可否而行也是豈人臣忠諫之道哉上句既言先王無流連荒亡之事便是直欲景公亦不為此豈有任其自擇之意惟君所行一句蓋言君欲為此則是先王所不為者惟君行之也下文畜君何尤止為此句言直有犯故特明其畜止君欲非為過也信如注文所說既無犯顔可尤之言則尤字之義定指何事而言也畜君何尤注尤過也言晏子能畜止其君之欲冝為君之所尤然其心則何過哉能字意悖既能畜止君欲如何却冝為君所尢已稱其能又言心何過哉上下語脉都不相應必須先有可尤之言然後明其心本無過語意乃圎冝云此以晏子惟君所行之言切直有犯冝為君之所尤然其心則何過哉與前注之誤可兼通矣所謂故國者非謂有喬木之謂也有世臣之謂也王無親臣矣注世臣纍世勳舊之臣與國同休戚者也親臣君所親信之臣與君同休戚者也世臣親臣分為兩意文辭義理俱不可通名雖有二其實一也然須說世臣在宣王之後則當時親臣便是後來世臣之祖所謂一也若說世臣在宣王之前以為祖宗以來勳舊之臣與宣王時親臣不得不分注文正指祖宗以來勳舊而言故與親臣分之為二準此以觀經文說世臣處止是有世臣之謂也一句而已下句却便别說親臣世臣之說下無結意親臣之說上無來意自此而下不復有關世臣之意孟子之言何其首尾不相照管而無倫序如此邪所謂世臣與國同休戚親臣與君同休戚者蓋是世臣不必忠於君親臣不必忠於國此又迂曲甚矣豈有忠於國而遺其君忠於君而遺其國者哉況親臣止同其君一身休戚國之休戚略不關心乃是姦回諛佞之人所謂事是君則為容恱者也孟子何必諄諄然專勸宣王畜養此輩邪解經者須要先識主意然後解其文辭則不亂矣此章主意本為宣王薄遇臣下輕用誅黜而言故國世臣乃是推明後事以警宣王非有關於既往也所謂故國者有世臣之謂也者言其世祚長逺而為故國者由其有親信大臣子孫相繼世為輔弼之臣也王無親臣者言王用人不擇賢否輕為黜退果於誅殺昨者進用之人今皆不知其何故而不在所以人心不固而無親信可為世世輔弼之臣也後乃厯言國人皆曰賢皆曰不可皆曰可殺察見其實然後用之去之殺之者皆所以教宣王改其素習慎用誅黜愛養賢能與相親厚以收將來世臣之用則社稷永安而為故國如此然後可以為民父母也昔者所進今日不知其亡也注昨日所進用之人今日有亡去而不知者國君進用使居顯位有官守職事之人一旦挈家亡去恐無朝廷不知之理此章大意說已在前亡不在也蓋言進用之人動遭誅黜今皆不知何故而不存在也今有璞玉於此雖萬鎰注鎰二十兩也國語以二十四兩為鎰先儒皆宗其說趙歧注中惟見解此鎰字為二十兩孫奭正義已嘗引國語及鄭𤣥之說以正之謂趙注誤為二十兩豫謂孫奭正其二十兩之差是也謂此為趙注之誤却為未當後篇王餽兼金一百而不受趙歧注云一百百鎰也一鎰二十四兩也以此證之二十兩非趙注之誤乃後人傳寫之差二十下脫一四字耳注文不取二十四兩與衆同者而乃專取二十兩與衆異者不知何謂說者又多以萬鎰為璞玉斤兩之數是亦不然萬鎰之重計該一萬五千斤未聞璞玉能有如此之大者也趙注以為言其衆多蓋謂以衆多之玉積纍至萬鎰之重也此說更無斟量且其衆玉相雜大小必不能齊或斤或兩湊合成一萬五千斤之重計其箇數之多將有三五萬數孟子以璞玉為一國之喻但指一玉而言足矣安用如許之多邪鎰字雖以斤兩數目為義亦只是金之兩數玉之良否不在斤兩輕重鎰非玉之斤兩之數也萬鎰乃是玉之價直其價可直萬鎰之金也必使玉人雕琢之注玉人玉工也不敢自治而付之能者愛之甚也不敢自治乃是自能琢玉但不敢耳凡其有玉付之玉工者豈皆自能雕琢玉哉玉之主人但能與玉工一同詮量度其玉材作何器物如此而已至於琢磨雕鏤手效其成則在匠者蓋所以喻其君人之道理當務在任賢而已非謂不敢自為也若大旱之望雲霓也注霓虹也雲合則雨虹見則止虹霓晚見於東則晴早見於西則雨此世俗之所共知者詩云朝隮於西崇朝其雨然則虹不專主於止雨也甚明果虹霓專為止雨之物大旱之際何苦望於此哉后來其蘇注蘇復生也他國之民皆以湯為我君而待其來使已得蘇息也蘇與穌通用穌有三訓息也舒恱也死而更生也息者疲困而得休息所謂蘇息也更生者既死而再生所謂復生也既言復生又言蘇息義不一矣平易言之兩義中蘇息為是不誅則疾視其長上之死而不救注民怨其上故疾視其死而不救也穆公既知民怨其上必須審察致怨之由罪其有司之弛慢殘下也今穆公略不言有司之過專欲誅殺其民者蓋由不知民之平昔所畜之怨也孟子正為穆公不知故告之如此注文不當以疾字歸之於民乃是穆公疾惡其民之薄於上也南軒曰鄒穆公疾民視其長上之死而不救此為得之與民守之效死而民弗去注國君死社稷故致死以守國至於民亦為之死守而不去則非有以深得其心者不能也民亦為之死守之說言其既往之驗則可孟子本教滕文公方來之事豈可便以此語許之邪況效死守國止當責在文公經言效死而民弗去其責之之辭不在文公却專在民且孟子方與文公對語而曰民弗去者不知此語却與何人酬答也民字本衍冝準下章效死勿去為正行或使之止或尼之注言人之行必有人使之者其止必有人尼之者然其所以行所以止則固有天命而非此人所能使亦非此人所能尼也然則我之不遇豈臧倉之所能為也諦觀人之行止亦有非人使而自行非人尼而自止者其閒蓋有事物使然非皆必在於人人亦在其中矣事物所使事物所尼皆天也說者冝云人之行必有事物使之者其止必有事物尼之者然其所以行所以止固有天命而皆非人自能也我之不遇魯侯豈臧倉之所能為哉行止非人所能也注闕中原古注本行止非人之所能也有之字則文備蓋自宋氏南遷之後南方本傳寫之差耳四書辨疑卷九
