body:
  text: 欽定四庫全書四書辨疑卷五元陳天祥撰論語泰伯第八泰伯其可謂至德也已矣三以天下讓民無得而稱焉注大王之時商道寖衰而周日彊大季歷又生子昌有聖德大王因有翦商之志而泰伯不從大王遂欲傳位季歷以及昌泰伯知之即與仲雍逃之荆蠻於是大王乃立季歷又曰蓋其心即夷齊叩馬之心而事之難處有甚焉者冝夫子之歎息而贊美之也泰伯不從事見春秋傳注文中絶不見有泰伯讓位之義尋繹所說從由太王乃是恃已之彊而欲翦商為泰伯不從遂欲傳位季歷以及昌也泰伯亦是知其父有黜已之意不得已而逃之荆蠻也由是言之王季之立即非泰伯之本心不可稱之為讓也史記言太王欲立季歷以及昌亦無為泰伯不從翦商之說雖然只言欲立季厯以及昌理亦未是既云昌有聖德則必有天定自然之命泰伯又是至德之人讓位之事亦必自能以太王之賢豈不知此何必曲為如此廢立逆理亂常以濟區區之私欲哉注言蓋其心即夷齊叩馬之心冝夫子之贊美者意謂孔子稱泰伯不欲翦商為至德也此蓋不察經之本文但稱三以天下讓為至德何嘗有稱不欲翦商之意哉且太王之時商猶未有罪惡貫盈如紂之君太王不問有無可伐之理但因已之國勢彊大及其孫有聖德遽欲翦滅天下之主非仁人也又為世子不從即欲奪其位與餘者雖中才之人亦所不為而謂太王為之乎況文王猶方百里起則文王以前周亦未嘗彊大也太王為狄人所侵遷之於岐山之下以小避大免患而已而又容有翦商之志乎詩稱實始翦商者本言周之興起以至斷商而有天下原其所致之由實自太王修德保民為始蓋以王業所自而言非謂太王實始親為翦商之計也書亦明言至于太王肇基王迹蔡沈解云詩曰居岐之陽實始翦商太王雖未始有翦商之志然太王始得民心王業之成實基於此蔡沉乃文公之髙第弟子而此說與語録中伯豐等所問意見皆同此可見當時同門之人終不以注文為是者亦不少也且更置此勿論就如注文所言才有其志事猶未行父子之閒何遽相違以至於此太王果為此事欲廢其子泰伯果為此事棄父而去可謂父不父子不子何至德之有哉推其事情只是泰伯見商道寖衰憫生民之困知文王聖德足使天下被其澤故欲讓其位於王季以及文王太王却是重長幼之序不許泰伯之請如此則泰伯之逃為有理矣纂疏引語録之說曰泰伯只見太王有翦商之志自是不合他意便掉了去又言到此顧恤不得父子之情嗚呼人倫所重莫重於父以子事父不合他意便掉了去是無天也以此為教將如後世何注文又言泰伯不從事見春秋傳今案春秋左氏傳雖有泰伯不從之一語初不知不從何事下句言是以不嗣正是不從太王不許讓位之命非謂不從翦商也若本分解經都無許事捨聖經明文不從而却傍取傳記疑似之言執以為是呶呶如此甚不可也舊疏云此章論泰伯讓位之德也季歷賢又生聖子文王昌昌必有天下故泰伯三以天下讓於王季其讓隱故民無得而稱言之者故所以為至德而孔子美之也明道曰泰伯知王季之賢必能成王業故為天下而三遜之言其公也伊川曰泰伯之遜非為其弟也為天下也三說皆無太王欲立季歷之事直以讓位歸之泰伯可謂不失本經之意然二程說泰伯專讓王季意不在於文王却為未盡南軒曰泰伯知文王有聖德天之所命當使天下被其澤故致國於王季為文王也故曰以天下讓言其至公之心為天下而讓也惟其事情深逺故民無得而稱而聖人獨知其為至德也此比三說尤為詳備深得聖人之㫖學者冝宗之三以天下讓注三讓謂固遜也以三為固未曉其義纂疏引或問之說云古人辭遜以三為節一辭為禮辭再辭為固辭三辭為終辭古注但言三遜而不解其目也參詳此說凡有辭讓須限三次已不情實所謂再辭為固辭三辭為終辭者與三遜謂固遜之說又不相合舊疏引鄭𤣥之說云太王疾泰伯適吳採藥太王殁而不返季厯為喪主一讓也季歷赴之不來奔喪二讓也免喪之後斷髮文身三讓也明道曰不立一也逃之二也文身三也二說與注文之說俱各不同皆不免為牽強曲說蓋三讓亦只是三次辭讓必是太王有不忍之心季厯有不安之意泰伯既讓三次終見不從故棄其位而去必欲致國於文王也推其父子兄弟仁賢之心其實不過如此何必強立三者之目哉君子篤於親則民興於仁故舊不遺則民不偷注吳氏曰君子以下當自為一章乃曾子之言也愚案此一節與上文不相蒙而與首篇慎終追逺之意相類吳說近是前一節四句中四事以禮守身之道也此一節四句中兩事以德化民之道也兩節之文勢事理皆不相類吳氏分此一節自作一章實為愜當繼又以為曾子之言却為過慮此固自是一章而無言者姓名蓋闕文也果誰所言斷不可知吳氏為見與慎終追逺章語意相似故有此說蓋臆度也聖賢言論豈無㫖意偶同者乎注文所引正是吳說受病之源曽子有疾召門弟子曰啓豫足啓豫手注程子曰君子曰終小人曰死君子保其身以沒為終其事也君子曰終小人曰死此檀弓所記子張臨終語申詳之言而程子取之注文又引用之恐皆未當也死乃生之對死生人所常言凡言死者豈皆小人邪書言舜陟方乃死孔子謂顏淵不幸短命死矣若謂小人曰死則舜與顔淵皆為小人矣朝聞道夕死可矣可以死可以無死若皆以為小人之事可乎子張之言非定論也以能問於不能以多問於寡有若無實若虛犯而不校昔者吾友嘗從事於斯矣注友馬氏以為顔淵是也顏子之心惟知義理之無窮不見物我之有閒故能如此經文止言吾友未嘗明有所指姓名馬氏何從而知為顏淵乎若謂曽子之所推如此非顏子無以當之但言疑謂顏淵可也誠無直截指為顏淵之理馬氏之說蓋不可取士不可以不𢎞毅任重而道逺注洪寬廣毅強忍也非洪不能勝重非毅無以致逺注文改𢎞為洪未知何據以待别考訓毅為強忍義亦未安強忍非人之美行毅字不冝以此為訓寬廣強忍亦不可並行𢎞本訓大毅本訓果止當各從本訓注又言非洪不能勝重非毅無以致逺將本經一句之文分為兩節𢎞與毅各為一意乃是變經文為士不可以不𢎞不可以不毅也單言不可以不毅義猶可解單言不可以不𢎞不知𢎞為𢎞甚也毛晃韻𢎞大之也此訓義最詳備𢎞毅二字相合為文只是一意如云人能𢎞道𢎞與道亦是通作一意而言𢎞毅與𢎞道文理正同士不可以不𢎞毅蓋言學道之士不可不𢎞大其果決勇為之毅能𢎞此毅則能勝其仁為已任之重致其死而後巳之逺也如有周公之才之美使驕且吝其餘不足觀也已注驕矜夸吝鄙嗇也程子曰驕氣盈吝氣歉愚謂驕吝雖有盈歉之殊然其勢常相因蓋驕者吝之枝葉吝者驕之本根故常驗之天下之人未有驕而不吝吝而不驕者也程子說驕氣盈吝氣歉其說誠是盈與歉勢正相反無遞互相因之理而注文以為雖有盈歉之殊然其勢常相因又謂驕為枝葉吝為本根皆是硬說誠未見有自然之理也驕與吝元是兩種實非同體之物今以吝鄙慳嗇為本根却生驕矜奢侈之枝葉豈通論乎吝與出納之吝之吝字義同蓋矜已傲物謂之驕慳利嗇財謂之吝驕則從於奢吝則從於儉此皆眼前事不難辨也注言驗之天下之人未有驕而不吝吝而不驕者此言正是未嘗真實驗之於人也石崇王愷之驕矜未嘗聞其有吝也王戎和嶠之吝嗇未嘗聞其有驕也雖然人之氣禀萬有不同驕吝之中又有差等非可一例言之也試於天下人中以實驗之大抵驕而不吝吝而不驕者多驕吝兼有者少既已矜已傲物而又慳利嗇財此之謂使驕且吝比之一於驕一於吝者尤為可鄙其餘雖有才美皆不足觀也已不在其位不謀其政注程子曰不在其位則不任其事也若君大夫問而告者則有矣南軒曰謀政云者已往謀之也若有從吾謀者則亦有時而可以告之矣此與程子之說於事理皆通然與經文却不相合經中本無分别君大夫已往從吾之文王滹南曰又有不待從吾謀不必君大夫之問而亦可以謀者蓋難以言盡也然則聖人之意果何如曰此必有為之言豈當世之人有侵官犯分而不知止者故聖人譏之或身欲有為而世不用因以自解與是皆不可知要之非決定之論也此說盡之矣不須别論學如不及猶恐失之注言人之為學既如有所不及矣而其心猶竦然惟恐其或失之警學者當如是也程子曰學如不及猶恐失之不得放過才說姑待明日便不可也一章之義注文渾說在學之既得之後程子渾說在學之未得之前注文專主於溫故程子專主於知新二家之說義皆不備黃氏曰為學之勤若有追逐然惟恐其不及用心如此猶恐果不可及而竟失之也況可緩乎大意與程子之說無異惟其言頗明白易曉為優然亦止是施功於未得之前專務知新而已舊疏云言學自外入至熟乃可久長勤學汲汲如不及猶恐失之也何況怠惰而不汲汲者乎此說解學如不及在未得之先解猶恐失之在既得之後上下兩句相須為義知新溫故不偏廢也但其言辭不甚順快冝與黃氏之文相配為說蓋為學之勤汲汲然常如有所不及用心如此猶恐他日怠於溫習而或失之況其學先怠惰而不汲汲者乎豫有亂臣十人注馬氏曰十人謂周公旦召公奭太公望畢公榮公太顛閎夭散冝生南宫適其一人謂文母劉侍讀以為子無臣母之義蓋邑姜也林少頴破此說曰子不可臣母其理誠是至以邑姜為臣又恐未必也蓋經既無文年代久逺不復可知而九人者雖不出周召之徒亦不可一一如漢儒所定要之孔子之意惟論其才難而已舜臣五人亦然王滹南曰少頴之論當矣晦菴於作者七人知指名者為鑿而復惑於此何也豫謂林少頴之論王滹南之斷皆出衆論之右此亦無他本分而已但凡經無其文而以臆度指說者皆當準此為斷唐虞之際於斯為盛有婦人焉九人而已注際交會之閒言周室人才之多惟唐虞之際乃盛於斯引注以對經文上言唐虞之世人才之盛其下所指人數却是周之人才上下語意不相承接蓋際謂唐虞之邊際猶言唐虞之末也自唐虞之末至於斯為最盛然有婦人焉九人而已三分天下有其二以服事殷周之德其可謂至德也已矣注春秋傳曰文王率商之叛國以事紂蓋天下歸文王者六州荆梁雍豫徐揚也惟青兖冀尚屬紂耳范氏曰文王之德足以代商天與之人歸之乃不取而服事焉所以為至德也孔子因武王之言而及文王之德且與泰伯皆以至德稱之其指微矣或曰冝斷三分以下别以孔子曰起之而自為一章注文與范氏之說蓋皆以至德為文王之事范氏又言且與泰伯皆以至德稱之其指微矣者意謂泰伯不欲翦商文王以服事殷亦無伐紂之心故皆稱至德也此蓋祖襲東坡之說也東坡曰以文王事殷為至德則武王非至德明矣三說皆有少武王之意而東坡為甚然經中止言周德本無專稱文王之文何以知孔子謂武王非至德也湯武革命順乎天而應乎人此孔子之明論也豈有上與天合下與人合而猶未為至德者乎三分天下有其二文王武王其實皆然以服事殷非特文王武王亦嘗事之也文王武王皆聖人也武王伐紂之心即文王之心也孟子曰取之而燕民不恱則勿取古之人有行之者文王是也此謂殷民未盡恱則不取殷民盡恱則取之非言無伐紂之意也蓋文王之時殷有三仁尚在紂猶未為獨夫人望未絶故不忍伐之也及微子去之以箕子為囚奴比干諫而死中外嗷嗷引領以望武王之來拯己於水火之中武王不得已而始往伐之文武之事殷伐殷蓋其時有不同非其心有不同也文王不伐者為無可伐之理以其罪未貫盈也武王伐之者為無不伐之理以其罪既貫盈也至若崇信姦回昵比罪人焚炙忠良刳剔孕婦斫朝涉之脛剖賢人之心毒痡四海無辜籲天文王當此之際亦無不伐之理若徒有天下三分之二坐視生民危急如此而恝然無顧恤之心何足為文王乎且文王紂之諸侯也若無伐紂救民之心守其一身為臣之節則凡其叛紂歸已之國皆當辭而不受既於紂之天下中三分已取其二而曰無伐紂之心有是理邪南軒曰三分天下有其二以服事殷非特文王武王亦然故統言周之至德不但曰文王也蓋紂未為獨夫文武固率天下以事之也橫渠曰使文王未崩伐紂之事亦不可不為二公所言皆正大之論不可易也王滹南曰文武父子皆聖人也其德固同不容有異書曰惟九年大統未集豫小子其承厥志記曰武王善繼人之志善述人之事豈以武王行事而不以文王之心為心文王素所不欲者而一旦為之且誣稱文王之志哉蓋孔子所稱者力可取而不取也武王卒取之者義至於盡而不容已也此說引證甚明比南軒橫渠所論尤詳由此觀之文王武王易地則皆然周之德可謂至德乃是通稱文武之德非謂專美文王也語録曰若紂之惡極文王未死也只得征伐救民此却是本分語或曰一說斷三分以下自作一章其說誠是注文又言荆梁雍豫徐揚六州屬文王青兖冀三州屬紂此皆經中所無三分天下有其二大約言之耳當時叛殷歸周者必無限期惟是綿綿而往歸之不已豈有畫定界畔之理六州三州之分此本鄭𤣥之鑿說刪之可也子罕第九子罕言利與命與仁注程子曰計利則害義命之理微仁之道大所以罕言若以理微道大則罕言夫子所常言者豈皆理淺之小道乎聖人於三者之中所罕言者惟利耳命與仁乃所常言命猶言之有數至於言仁寧可數邪聖人捨仁義而不言則其所以為教為道化育斯民洪濟萬物者果何事也王滹南曰子罕言利一章說者雖多皆牽強不通利者聖人之所不言仁者聖人之所常言所罕言者唯命耳此亦有識之論然以命為罕言却似未當如云五十而知天命匡人其如豫何公伯寮其如命何不知命無以為君子也如此之類亦豈罕言哉說者當以子罕言利為句與從也蓋言夫子罕曽言利從命從仁而已我叩其兩端而竭焉注叩發動也以叩為發動則是發動其兩端而竭焉也孟子言昏夜叩人門户求水火則是昏夜發動人之門戶也史記言伯夷叔齊叩馬以諫則是發動馬以諫也似皆難說南軒以為就其兩端無不盡者焉就字為近然亦終有未盡叩只是至到之意惟以及字為說似最親切字義本訓叩頭蓋亦頭與物相及之謂也如俗言叩門叩期皆謂及門及期也答所問之事及首及尾而盡之是之謂叩其兩端而竭焉也沽之哉沽之哉注沽賣也孔子言固當賣之但當待賈而不當求之耳舊說沽之哉不衒賣之辭準此以解上句沽字亦衒賣也子貢以衒賣為問可謂輕鄙之甚注文不取是矣然解沽之哉為固當賣之連許賣之賣之則夫子之言却不雅重沽字固當訓賣然賣者出物於市鋪張示衆以求售與衒意亦相鄰但不以語言夸張此為異耳玉在匱中待其知者以賈自來而售與其出之於市肆鋪張示衆以求售者蓋懸殊矣夫子之道用之則行舍之則藏誠無張示於人邀求善賈賣之之理沽之哉沽之哉乃是彼子貢言賣之辭蓋言我何賣之哉我但待其自然賈至然後售之重言沽之哉深彼賣之之意也出則事公卿入則事父兄喪事不敢不勉不為酒困何有於我哉注說見第七篇然此則其事愈卑而意愈切矣說見第七篇蓋謂默而識之章也豫已有其辨矣而此章所言四事亦皆無用謙處說者當如默而識之章之所辨解於為如義自通貫子在川上曰逝者如斯夫不舍晝夜注天地之化往者過來者續無一息之停乃道體之本然也然其可指而易見者莫如川流故於此發以示人欲學者時時省察而無毫髮之閒斷也程子曰此道體也天運而不已日往則月來寒往則暑來水流而不息物生而不窮皆與道為體運乎晝夜未嘗已也是以君子法之自強不息及其至也純亦不已焉注文與程子之說大槩無異若夫子果言道體於此發以示人當叩其兩端明白說出道體之本然往者過來者續如川流無一息停留之意然後學者可得而知今觀本經未嘗明有如此之文而程子創為道體之論以為天運不已日往則月來寒往則暑來注文又言往者過來者續以此象其川流不息之狀亦皆甚似讀之可喜然經文止言逝者如斯實無來者之意日月寒暑往過來續之說何可通邪蓋逝乃往而不返之謂者字則有所指之物在焉逝者二字惟以嵗月光隂言之義有可取孔子自傷道之不行歲月逝矣老之將至因見川水之流去而不返故有此歎蓋與不復夢見周公之意同勇者不懼注氣足以配道義故不懼仁者必有勇勇者不必有仁勇則亦有仁與不仁之分不可一槩論也仁者之勇其氣固足以配道義矣不仁之勇何嘗顧於道義哉勇之本體無論仁與不仁義與不義皆能不懼能不懼者由其果於有為也君子之勇果於為善則能不懼小人之勇果於為惡亦能不懼其氣非皆足以配道義也說者但可言勇者果於有為故能不懼不必言氣足以配道義也未可與權注程子曰權稱錘也所以稱物而知輕重者也可與權謂能權輕重使合義也又曰漢儒以反經合道為權故有權變權術之論皆非也權只是經也愚案先儒誤以此章連下文偏其反而為一章故有反經合道之說程子非之是矣然以孟子嫂溺援之以手之義推之則權與經亦當有辨漢儒以反經合道為權近世解經者多以為非蓋皆祖述程子權只是經之說也注文雖不與之同僅能有權與經亦當有辨之一語又解孟子嫂溺援之以手及語録所論皆是持兩端為說終無仔細明白指定真是真非之論故後人得以遷改其意往往為之訛說却使與程子之說混而為一良可惜也聖人說權象其稱錘之行運往來活無定體本取應變適冝為義應變適冝便有反經合道之意在其中矣惟其事有輕重不同權則亦有淺深之異凡於尋常用處各隨其事稱量可否務要合冝謂此為經似猶有說若遇非常之事則有內外之分內則守正外須反經然後能成濟物之功豈可一槩通論哉若言權只是經則嫂溺援之以手亦當為經而孟子使與授受不親之常禮分之為二一以為禮一以為權則權與經為兩意豈不甚明彼所謂權變權術者專執反經不知合道乃陋俗無稽之說漢儒所論正不如此雖曰反經本欲合道南軒以為既曰反經惡能合道蓋不知非常之事固有必須反經然後可以合道者如湯征桀武王伐紂伊尹放太甲周公誅管叔皆非君臣兄弟之常理聖人於此不得已而為之然後家國治而天下平未聞不能合道也只如嫂溺援之之事視其所以乃是以手援嫂誠為反其授受不親之經察其所安乃是以仁存心期在救其逡巡溺者之死斯豈不能合道哉南軒又曰若此論一行而後世竊權之名以自利甚至於君臣父子之大倫蕩棄而不顧曰吾用權也不亦悲夫此正世俗所謂權變權術專執反經不知合道之說也先儒之所謂權者何嘗謬至於此哉夫竊權之名以自利其罪在於竊者歸罪先儒非通論也自曹丕而下竊禪讓之名而為篡逆者踵相接也豈唐虞之禪亦皆非與南軒之說斷不可取經言可與立未可與權立與權又當分辨立以成已權以成物人能正定其心不使外物可奪富貴不能淫貧賤不能移威武不能屈是之所謂立也雖有如此之立而或固執無權不知變通於世無經濟之用君子亦不多尚也有立有權始可為貴知此則可與論人材矣然自共學而下四事相連再須通解彼昏愚懶惰不可共學之人固不必論但其資禀憐慧及志力精勤者皆可與共學徒學而不務自修則未可與適道也有自修之心斯可與適道擇善而不能固守則未可與立也有固守之操乃可與立執滯而不達事冝則未可與權也唐棣之華偏其反而豈不爾思室是逺而注上兩句無意義但以起下兩句之辭耳其所謂爾亦不知其何所指也注言上兩句無意義而於下兩句亦無明說非特爾不知何所指室亦不可知也又解下文未之思也之一節以為夫子借其言而反之蓋前篇仁逺乎哉之意若以此意與前後通說義益難明自漢魏以來解論語者多矣此章之說皆莫能明然亦未有言其可疑而不說者惟王滹南直謂必不可通豫意亦然四書辨疑卷五
