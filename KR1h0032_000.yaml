body:
  text: 欽定四庫全書經部八四書辨疑目録四書類卷一大學在親民安而後能慮慮而後能得物有本末事有終始顧諟天之明命湯之盤銘作新民周雖舊邦其命維新如切如磋者道學也如琢如磨者自修也於戲前王不忘君子賢其賢而親其親小人樂其樂而利其利此以沒世不忘也聽訟吾猶人也必也使無訟乎無情者不得盡其辭大畏民志此謂知本此謂知之至也是故君子有大道必忠信以得之驕泰以失之彼為善之小人之使為國家卷二論語學而第一其為人也孝弟而好犯上者鮮矣不好犯上而好作亂者未之有也巧言令色鮮矣仁為人謀而不忠乎與朋友交而不信乎行有餘力則以學文賢賢易色賢賢易色事父母能竭其力事君能致其身與朋友交言而有信雖曰未學吾必謂之學矣無友不如己者父在觀其志父沒觀其行禮之用和為貴信近於義言可復也恭近於禮逺恥辱也因不失其親亦可宗也君子食無求飽子貢曰貧而無諂富而無驕何如子曰可也未若貧而樂富而好禮者也為政第二為政以德譬如北辰居其所而衆星拱之有恥且格吾十有五而志于學三十而立父母惟其疾之憂今之孝者是謂能養至於犬馬皆能有養不敬何以别乎色難有酒食先生饌視其所以先行其言而後從之學而不思則罔思而不學則殆知之為知之不知為不知是知也舉直錯諸枉則民服舉枉錯諸直則民不服季康子問使民敬忠以勸如之何子曰臨之以莊則敬孝慈則忠舉善而教不能則勸書云孝乎惟孝友于兄弟施於有政是亦為政奚其為為政殷因於夏禮所損益可知也周因於殷禮所損益可知也其或繼周者雖百世可知也卷三論語八佾第三孔子謂季氏八佾舞於庭是可忍也孰不可忍也禮與其奢也寧儉喪與其易也寧戚夷狄之有君不如諸夏之亡也或問禘之說子曰不知也知其說者之於天下也其如示諸斯乎指其掌二三子何患於喪乎天下之無道也久矣天將以夫子為木鐸居上不寬為禮不敬臨喪不哀吾何以觀之哉里仁第四知者利仁富與貴是人之所欲也不以其道得之不處也貧與賤是人之所惡也不以其道得之不去也君子去仁惡乎成名好仁者無以尚之惡不仁者其為仁矣蓋有之矣我未之見也人之過也各於其黨觀過斯知仁矣士志於道而恥惡衣惡食者未足與議也君子懷德小人懷土君子懷刑小人懷惠吾道一以貫之夫子之道忠恕而已矣德不孤必有鄰卷四論語公冶長第五子謂南容邦有道不廢邦無道免於刑戮以其兄之子妻之女器也或曰雍也仁而不佞子曰焉用佞禦人以口給屢憎於人不知其仁焉用佞無所取材賜也何敢望回回也聞一以知十賜也聞一以知二我不欲人之加諸我也吾亦欲無加諸人子路有聞未之能行唯恐有聞季文子三思而後行子聞之曰再斯可矣其愚不可及也吾黨之小子狂簡斐然成章不知所以裁之願無伐善無施勞老者安之朋友信之少者懷之雍也第六回也其心三月不違仁其餘則日月至焉而已矣伯牛有疾子問之自牖執其手不有祝鮀之佞而有宋朝之美難乎免於今之世矣人之生也直罔之生也幸而免觚不觚觚哉觚哉可謂仁之方也已述而第七述而不作信而好古竊比於我老彭默而識之學而不厭誨人不倦何有於我哉富而可求也雖執鞭之士吾亦為之如不可求從吾所好子在齊聞韶三月不知肉味加我數年五十以學易可以無大過矣三人行必有我師焉擇其善者而從之其不善者而改之子以四教文行忠信蓋有不知而作之者我無是也與其進也不與其退也若聖與仁則吾豈敢抑為之不厭誨人不倦則可謂云爾已矣卷五論語泰伯第八泰伯其可謂至德也已矣三以天下讓民無得而稱焉三以天下讓君子篤於親則民興於仁故舊不遺則民不偷曽子有疾召門弟子曰啓豫足啓豫手以能問於不能以多問於寡有若無實若虛犯而不校昔者吾友嘗從事於斯矣士不可以不𢎞毅任重而道逺如有周公之才之美使驕且吝其餘不足觀也已不在其位不謀其政學如不及猶恐失之豫有亂臣十人唐虞之際於斯為盛有婦人焉九人而已三分天下有其二以服事殷周之德其可謂至德也已矣子罕第九子罕言利與命與仁我叩其兩端而竭焉沽之哉沽之哉出則事公卿入則事父兄喪事不敢不勉不為酒困何有於我哉子在川上曰逝者如斯夫不舍晝夜勇者不懼未可與權唐棣之華偏其反而豈不爾思室是逺而卷六論語鄉黨第十朝與下大夫言侃侃如也與上大夫言誾誾如也不時不食割不正不食不得其醬不食惟酒無量不及亂不撤薑食食不語寢不言鄉人儺朝服而立於阼階康子饋藥拜而受之曰丘未達不敢嘗廄焚子退朝曰傷人乎不問馬先進第十一南容三復白圭回也視豫猶父也豫不得視猶子也季路問事鬼神子曰未能事人焉能事鬼敢問死曰未知生焉知死不踐迹亦不入於室論篤是與君子者乎色莊者乎從之者與顔淵第十二四海之內皆兄弟也足食足兵民信之矣民無信不立君子質而已矣何以文為惜乎夫子之說君子也駟不及舌文猶質也質猶文也虎豹之鞟猶犬羊之鞟愛之欲其生惡之欲其死既欲其生又欲其死是惑也片言可以折獄者其由也與子路無宿諾聽訟吾猶人也必也使無訟乎樊遲問仁子曰愛人問知子曰知人樊遲未達舉直錯諸枉能使枉者直子貢問友子曰忠告而善道之不可則止毋自辱焉卷七論語子路第十三先之勞之言不可以若是其幾也狷者有所不為也不占而已矣君子和而不同小人同而不和憲問第十四注胡氏曰此篇原憲所記貧而無怨難富而無驕易曰今之成人者何必然曰未仁乎如其仁如其仁子貢曰管仲非仁者與桓公殺公子糾不能死又相之子曰管仲相桓公霸諸侯一匡天下民到於今受其賜微管仲吾其被髮左衽矣豈若匹夫匹婦之為諒也自經於溝瀆而莫之知也陳成子弒簡公孔子沐浴而朝告於哀公曰陳恆弒其君請討之古之學者為已今之學者為人君子恥其言而過其行丘何為是栖栖者與疾固也子曰作者七人矣果哉末之難矣衛靈公第十五君子固窮小人窮斯濫矣由知德者鮮矣事其大夫之賢者友其士之仁者人無逺慮必有近憂子貢問曰有一言而可以終身行之者乎子曰其恕乎己所不欲勿施於人吾之於人也誰毁誰譽如有所譽者其有所試矣斯民也三代之所以直道而行也吾猶及史之闕文也有馬者借人乘之今亡已夫小不忍則亂大謀知及之仁不能守之雖得之必失之君子不可小知而可大受也當仁不讓於師季氏第十六注洪氏曰此篇或以為齊論則將焉用彼相矣不患寡而患不均不患貧而患不安卷八論語陽貨第十七陽貨欲見孔子孔子不見歸孔子豚孔子時其亡也而往拜之遇諸塗性相近也習相逺也子曰唯上智與下愚不移公山弗擾以費畔吾其為東周乎吾豈匏瓜也哉焉能繫而不食色厲而內荏譬諸小人其猶穿窬之盜也與道聽而塗說德之棄也其未得之也患得之古者民有三疾今也或是之亡也惡徼以為知者微子第十八至則行矣子路曰不仕無義周有八士伯達伯適仲突仲忽叔夜叔夏季隨季騧子張第十九雖小道必有可觀者焉致逺恐泥是以君子不為也曽子曰吾聞諸夫子孟莊子之孝也其他可能也其不改父之臣與父之政是難能也堯曰第二十天之厯數在爾躬猶之與人也出納之吝謂之有司不知命無以為君子也不知禮無以立也不知言無以知人也卷九孟子梁惠王上王亦曰仁義而已矣何必曰利不日成之王好戰請以戰喻填然鼓之不違農時穀不可勝食也數罟不入汙池魚鱉不可勝食也斧斤以時入山林材木不可勝用也五畝之宅樹之以桑五十者可以衣帛矣雞豚狗彘之畜無失其時七十者可以食肉矣黎民不飢不寒狗彘食人食而不知檢塗有餓莩而不知發人死則曰非我也歲也是何異於刺人而殺之曰非我也兵也王無罪歲斯天下之民至焉願比死者一灑之無以則王乎是乃仁術也是以君子逺庖厨也為長者折枝刑于寡妻權然後知輕重度然後知長短物皆然心為甚王請度之抑王興甲兵危士臣搆怨於諸侯然後快於心與梁惠王下王變乎色曰寡人非能好先王之樂也直好世俗之樂耳曰王之好樂甚則齊其庶幾乎今之樂猶古之樂也今王與百姓同樂則王矣文王之囿方七十里今也不然睊睊胥讒民乃作慝惟君所行也畜君何尤所謂故國者非謂有喬木之謂也有世臣之謂也王無親臣矣昔者所進今日不知其亡也今有璞玉於此雖萬鎰必使玉人雕琢之若大旱之望雲霓也后來其蘇不誅則疾視其長上之死而不救與民守之效死而民弗去行或使之止或尼之行止非人所能也卷十孟子公孫丑上曰管仲曽西之所不為也地不改辟矣民不改聚矣速於置郵而傳命我四十不動心不動心有道乎孟施舍雖褐寬博吾不惴焉不得於言勿求於心不得於心勿求於氣夫志至焉氣次焉持其志無暴其氣志一則動氣氣一則動志也今夫蹶者趨者是氣也而反動其心我知言其為氣也配義與道無是餒也必有事焉而勿正心勿忘勿助長也曰我於辭命則不能也然則夫子既聖矣乎人皆有不忍人之心惻隱之心仁之端也羞惡之心義之端也辭讓之心禮之端也是非之心智之端也莫之禦而不仁是不智也取諸人以為善是與人為善者也孟子曰伯夷隘柳下惠不恭公孫丑下天時不如地利夫環而攻之必有得天時者矣然而不勝者是天時不如地利也域民不以封疆之界是或一道也子之持㦸之士一日而三失伍則去之否乎不得不可以為恱且比化者無使土親膚於人心獨無恔乎吾聞之也君子不以天下儉其親有仕於此而子恱之不告於王而私與之吾子之祿爵夫士也亦無王命季孫曰異哉子叔疑泄柳申詳無人乎繆公之側則不能安其身王庶幾改之王由足用為善吾何為不豫哉卷十一孟子滕文公上周公豈欺我哉曽子曰生事之以禮死葬之以禮祭之以禮可謂孝矣吾宗國魯先君莫之行曰吾有所受之也父兄百官不我足也百官族人可謂曰知夏后氏五十而貢殷人七十而助周人百畝而徹其實皆什一也使民盻盻然又稱貸而益之周雖舊邦其命維新使畢戰問井地聞君行仁政有大人之事有小人之事曽子曰不可江漢以濯之秋陽以暴之皓皓乎不可尚已蓋歸反虆梩而掩之滕文公下勇士不忘喪其元以順為正者妾婦之道也要其有酒食黍稻者奪之我武惟揚侵于之疆則取于殘殺代用張于湯有光日攘其鄰之雞者世衰道微邪說暴行有作已頻顣離婁上而仁覆天下矣言則非先王之道仁不可為衆也道在邇而求諸逺事在易而求諸難人人親其親長其長而天下平是天下之父歸之也辟草萊任土地者次之侮奪人之君惟恐不順焉嫂溺援之以手者權也今天下溺矣夫子之不援何也人不足與適也政不足閒也惟大人為能格君心之非政不足閒也人之易其言也無責耳矣卷十二孟子離婁下惠而不知為政日亦不足矣才也養不才言人之不善當如後患何言不必信行不必果博學而詳說之將以反說約也言無實不祥不祥之實蔽賢者當之周公思兼三王以施四事君子之澤五世而斬小人之澤五世而斬豫未得為孔子徒也豫私淑諸人也可以取可以無取取傷亷不歷位而相與言不踰階而相揖也禹稷當平世三過其門而不入禹思天下有溺者由已溺之夫章子豈不欲有夫妻子母之屬哉為得罪於父不得近出妻屏子終身不養焉萬章上帝將胥天下而遷之焉瞽瞍亦允若是為父不得而子也禹避舜之子於陽城益避禹之子於箕山之隂舜禹益相去久逺外丙二年仲壬四年知虞公之不可諫而去之秦年已七十矣萬章下晉平公之於亥唐也曰郤之郤之為不恭何哉曰其取諸民之不義也其交也以道其接也以禮斯孔子受之矣殷受夏周受殷所不辭也於今為烈夫謂非其有而取之者盜也充類至義之盡也不以君命將之子思以為鼎肉使已僕僕爾亟拜也古千乘之國以友士何如一鄉之善士斯友一鄉之善士告子上曰異於白馬之白也無以異於白人之白也耆秦人之炙乃若其情則可以為善矣乃所謂善也富歲子弟多賴則為狼疾人也飲食之人無有失也則口腹豈適為尺寸之膚哉此又與於不仁之甚者也告子下方寸之木可使髙於岑樓往應之曰紾兄之臂而奪之食孔子為魯司寇不用從而祭燔肉不至不稅冕而行不知者以為為肉也其知者以為為無禮也樂正子强乎曰否有知慮乎曰否多聞識乎曰否夫茍不好善則人將曰訑訑豫既已知之矣卷十三孟子盡心上夭壽不二强恕而行求仁莫近焉行之而不著焉習矣而不察焉不恥不若人何若人有霸者之民歡虞如也殺之而不怨利之而不庸得天下英才而教育之流水之為物也不盈科不行君子之志於道也不成章不達所惡執一者為其賊道也舉一而廢百也仲子不義與之齊國而弗受人皆信之夫有所受之也居移氣養移體形色天性也惟聖人然後可以踐形君子之所以教者五有如時雨化之者君子引而不發躍如也中道而立能者從之未聞以道殉乎人者也其進鋭者其退速君子之於物也愛之而弗仁於民也仁之而弗親親親而仁民仁民而愛物盡心下各欲正己也好名之人能讓千乘之國茍非其人簞食豆羹見於色稽大不理於口山徑之蹊閒介然用之而成路君子用其一緩其二用其二而民有殍用其三而父子離若是乎從者之廋也君子之言也不下帶而道存焉人病舍其田而藝人之田欲得不屑不潔之士而與之是狷也卷十四中庸注中者不偏不倚無過不及之名天命之謂性率性之謂道道也者不可須臾離也可離非道也是故君子戒愼乎其所不睹恐懼乎其所不聞莫見乎隱莫顯乎微故君子愼其獨也致中和天地位焉萬物育焉卷十五中庸道之不行也我知之矣知者過之愚者不及也道之不明也我知之矣賢者過之不肖者不及也道其不行矣夫人皆曰豫知驅而納諸罟擭陷阱之中而莫之知辟也人皆曰豫知擇乎中庸而不能期月守也衽金革死而不厭君子之道費而隱夫婦之愚可以與知焉及其至也雖聖人亦有所不知焉夫婦之不肖可以能行焉及其至也雖聖人亦有所不能焉伐柯伐柯其則不逺執柯以伐柯睨而視之猶以為逺故君子以人治人改而止忠恕違道不逺施諸己而不願亦勿施於人故大德必得其位必得其椂必得其名必得其壽事死如事生事亡如事存忠信重祿所以勸士也成已仁也成物知也子曰吾說夏禮杞不足徴也吾學殷禮有宋存焉上焉者雖善無徴無徴不信不信民弗從下焉者雖善不尊不尊不信不信民弗從臣等謹按四書辨疑十五卷舊刻不著作者時代姓氏書中稱自宋氏播遷江表南北分隔才百五六十年經書文字已有不同則元初人所撰矣蘇天爵安熙行狀云國初有傳朱子四書集注至北方者滹南王公雅以辨博自負為說非之趙郡陳氏獨喜其說增多至若干言是書多引滹南王若虛說殆寧晉陳天祥書也朱彛尊經義考曰四書辨疑元人凡有四家雲峰胡氏偃師陳氏黃巖陳成甫氏孟長文氏成甫長文並浙人雲峰一宗朱子其為偃師陳氏之書無疑所說當矣其曰偃師者元史稱天祥因兄祜仕河南自寧晉徙家洛陽嘗居偃師南山故也天爵又謂安熙為書以辨之其後天祥深悔而焚其書今此本具存其毁之不盡歟或天爵欲張大其師學所言未足據也今觀其書大意主於闕疑而不貴穿鑿故其所列三百餘條皆平心剖析實非有意立異規規為門户之爭者齊魯毛韓四詩並存左氏公穀三傳兼列古人說經雖各有專門授受而通儒博考正未嘗暖暖姝姝守一先生之言各尊其所聞各行其所知朱子亦嘗言之矣是編固不妨與集注並存也乾隆四十一年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
