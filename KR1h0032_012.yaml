body:
  text: 欽定四庫全書四書辨疑卷十二元陳天祥撰孟子離婁下惠而不知為政註恵謂私恩小利經中無該私恩小利之文惠止當解為恩惠孔子稱子産其養民也惠謂有養民之實惠也詳此一事亦是偶見渉者之難不忍捨去故以乗輿濟之其心本出於誠非有矯情飾詐故為私恩小利之意也惠而不知為政者言雖惠矣而不知其為政之大體也不知為政盖亦指此一事而言非通謂子産不知為政也日亦不足矣註人多日少亦不足於用矣四境之内水為行人阻滯者亦不止此而已以一輿之力雖多與日數竟嵗窮年以濟之亦無可足之理日亦不足尋常語話中如此用日字者多矣皆以日為日日也欲其人人皆恱日日為之力亦不能足也才也養不才註足以有為之謂才才有大小多寡之不齊不直至於大至於多始可為才但有為者皆才也註文多却足以二字言人之不善當如後患何註此亦有為而言註文於不善之人未肯許其皆不當言也大意甚善假如居言責之任見有大姦巨猾專横於當時盖亦不容不言也但當不得已而為之不當有好言之心予謂言字上脫一好字不必說有為而言言不必信行不必果註必猶期也大人言行不先期於信果但義之所在則必從之必期二字義實不同必是已定不移之意期是期望未定之意向於前篇必有事焉而勿正之下既已辨之矣今又訓必為期不思甚矣所謂大人言行不先期於信果者先字為贅經中止有不必二字相並為文訓必為期止是不期中間不當更有先字言行不期於信果理誠未是君子欲有所言必先忖度其言可復然後出口言之此正言期於信也欲有所行亦先忖度其行可為然後決意行之此正行期於果也言不期信行不期果此何人哉言正要期信行正要期果但在審察義與不義不可有必之之意也而或不擇是非惟以信果為主義亦須信須果不義亦須信須果是之謂必大人則無如此必定之意惟其義之所在而以信果從之也必字不可别訓南軒曰言固欲信行固欲果然有必之之意則非此說為是固欲便是期其下别有必字之義博學而詳說之將以反說約也註言所以博學於文而詳說其理者非欲以誇多而鬭靡也欲其融㑹貫通有以反而說到至約之地耳此章可謂為學之指南也知約然後學為有用而註文指說未甚顯眀不知指何者為約也聖人之教人也惟恐言之未詳義之未盡經書累積文翰汪洋所載不勝其博矣然皆不出於君臣父子長㓜夫婦朋友之間其道則三綱五常而已是之謂約也反說約者引其博以眀此道正心修身為之約守所謂學問之道無他求其放心而已矣此又博約之㨗說也言無實不祥不祥之實蔽賢者當之註或曰天下之言無有實不祥者惟蔽賢為不祥之實或曰言而無實者不祥故蔽賢為不祥之實二說不同未知孰是疑或有闕文焉此章義本難通不可强解二或曰之說皆無可取既云疑有闕文則二說皆當削去以㫁後人之疑周公思兼三王以施四事註三王禹也湯也文武也四事上四條之事也又曰各舉其一事以見其憂勤惕厲之意禹湯文武道徳渾全非各一事能盡今舉四事分配四聖人其事亦有各有者亦有通有者已不倫矣而周公所施又不止此四事而已不知如何或當時記録有差或後世所𫝊之誤不可考也姑置之以待髙識之士君子之澤五世而斬小人之澤五世而斬註澤猶言流風餘韻也父子相繼為一世三十年亦為一世楊氏曰四世而緦服之窮也五世袒免殺同姓也六世親屬竭矣服窮則遺澤寖㣲故五世而斬註文說流風餘韻似謂澤為行迹名聞也楊氏說親屬遺澤盖謂澤為祖宗恩澤也一澤字分為兩說意各不同父子相繼一世年無定數與三十年一世並言一世字亦分兩說而皆不知何者為是也楊氏以親屬服制解此一章大意誠是君子以官言小人以民言澤謂親屬義分也五世以五服言之也斬盡也五服之制無分貴賤卿大夫之親屬義分五世亦盡士庶人之親屬義分五世亦盡故言君子之澤五世而斬小人之澤五世而斬孟子言此盖傷其骨肉親情之易及踈逺也予未得為孔子徒也予私淑諸人也註孟子之生去孔子未百年也故孟子言予雖未得親受業於孔子之門然聖人之澤尚存猶有能傳其學者故我得聞孔子之道於人而私竊以善其身註言孟子之生去孔子未百年聖人之澤尚存若依前註之說以澤為流風餘韻聖人之流風餘韻雖百千萬世不絶豈惟五世而已若依楊氏之說以澤為親屬遺澤孟子又非孔子之子孫與上文五世而斬義皆不通此當自為一章首闕孟子曰字淑善也諸於也言我未得為孔子門徒我但聞孔子所傳之道私以其善達之於人也可以取可以無取取傷廉註先言可以者略見而自許之辭也後言可以無者深察而自疑之辭也過取固害於廉然過與亦反害其惠過死亦反害其勇盖過猶不及之意也取與死三者須其心之自肯然後得為既有自疑之心則肯心已廢而三者皆不復可舉矣況人之所難莫難於死心在遲疑未定間豈有甘自捨生之理盖傷廉傷惠傷勇皆敘後句可以無者之意為言有可以取者有可以無取者可以無取而取之是為傷㢘於可以無取之下不必如此重言義自備矣如丈夫之冠也父命之女子之嫁也母命之後便敘母命之意為說富嵗子弟多賴凶嵗子弟多暴後便敘多暴之意為說此皆捨前句而直敘後句之例但說後句則前句之義自顯文勢然也與死二說亦同又其過不及之說義亦不安孟子本直論可與不可非但計校過與不及也且取多與多為過猶為有說死惟一死但有可不可而已死之過多恐無說也不歴位而相與言不踰階而相揖也註歴更渉也位他人之位也右師未就位而進與之言則右師歴已之位矣右師已就位而就與之言則已歴右師之位矣註文謂歴為更渉位為他人之位是也下言右師歴已之位已歴右師之位與元說他人之位却不相關右師未就位而進與之言乃是自離已位徃就右師行䖏而與之言却言右師歴已之位不知當時孟子之位與右師行䖏果實各在何䖏而右師如何却來更渉已位右師已就位而就與之言乃是已詣右師之位與右師言却言已歴右師之位不知更渉而過右師之位將復何徃皆不可曉不歴位而相與言不踰階而相揖本無難解之義不須枝蔓至此說者宜云既不鄰位不當渉歴他人之位就人與言既不同階不當踰越隔庭之階就人相揖禹稷當平世三過其門而不入註闕三過其門而不入惟禹為然而孟子與稷同言正與禹稷躬稼而有天下之語意無異又如潤之以風雨風亦何嘗能潤沽酒市脯不食酒亦不可言食古人以類言者自有此體禹思天下有溺者由已溺之註闕中原古註本由已溺之也比今本有也字取下文由已飢之也為證則古註本為是夫章子豈不欲有夫妻子母之屬哉為得罪於父不得近出妻屛子終身不養焉註但為身不得近於父故不敢受妻子之養臣無可叛之君子無可離之父舜事瞽瞍雖屢遭捐階覆井不測之危寧守死而不去誠無離之之理也匡章僅能無世俗所指五不孝之名便謂己之所以待父者為是父之所以待己者為非離而去之終身不養而又屏棄妻子已亦不受其養讎怨其父以至於此豈非不孝之大者乎孟子乃與之遊又從而禮貌之又以語言宛轉周䕶之亦豈徒然也哉盖欲漸摩誘化使之改過遷善而已學者於此宜深味之萬章上帝將胥天下而遷之焉註胥相視也解胥為相視帝將相視天下而遷之焉不成文理況胥字未嘗有訓相視者胥止當訓相帝將相天下而遷之焉亦不成語書傳中胥字解為須者每每有之史記趙奢謂許歴曰胥後令索隠曰胥須古人通用必準此說以胥為須義乃可通須必欲也帝将必欲以天下遷之也舊註解胥為須盖亦古人通用之義也孫奭䟽云帝將須以天下遷之既有此解不須别論瞽瞍亦允若是為父不得而子也註言瞽瞍不能以不善及其子而反見化於其子則是所謂父不得而子也子學善道父亦改其素習之惡如此而見化於其子者屢嘗見之比於不得待以為子者道理相懸尚逺矣盖瞽瞍平昔忍為於舜者無所不至一旦化兇悖為信順何哉盖由知舜道徳顯著而為天下歸仰亦謂非復向日之子不得以平昔待舜之心待之此之謂不得而子也禹避舜之子於陽城益避禹之子於箕山之隂註陽城箕山之隂皆在嵩山下深谷中可藏䖏也藏之一字甚不情實禹益避其君之子與舜避堯子之心無以異也君之子果有道徳能嗣父業使天下得被其澤此固舜禹益之所願也及見天下之朝覲訟獄謳歌者皆不歸之知其不克負荷民望在已所不得辭始以安天下為己任此舜禹之所以踐天子位焉者也益則君之子既克負荷已所得辭者也是皆誠心任其自然之道而行深谷中藏不知藏甚若禹在深谷中藏則天下之朝覲者亦難尋覓也況陽城在嵩山南將三十里箕山又在其南皆不在嵩山下深谷中藏字不可取舜禹益相去乆逺註闕相去乆逺四字殊無義理與下文皆字不可通說況益親曽事舜繼又相禹至禹崩時去舜纔十三四年其實未嘗相去乆逺也孟子於此一節專論為相乆不乆其子賢不賢之兩事耳自此句而下乃是結上文之意兩事俱各再言相當作去聲去當作之逺當作近舜禹益相之乆近其子之賢不肖皆天也如此與前後通讀則文理不差去逺二字盖傳寫之誤外丙二年仲壬四年註趙氏曰太丁湯之太子未立而死外丙立二年仲壬立四年皆太丁弟也太甲太丁子也程氏曰古人謂嵗為年湯崩時外丙方二嵗仲壬方四嵗惟太甲差長故立之也二說未知孰是信如程氏之說則外丙仲壬皆當為太甲之弟太甲乃其庶兄也嫡者尚幼故庶長者得以立也然欲敘外丙仲壬之年以明其當立之意亦須有先後之次當自長者言之長者有故始言次者今先舉二嵗之弟後言四嵗之兄此何說也仲壬乃太甲叔父太甲嗣仲壬而立蔡氏書傳考據甚明本趙氏之說為是知虞公之不可諫而去之秦年已七十矣註此事當孟子時已無所據孟子言宫之竒諫百里奚不諫又言年已七十所指之事亦已詳矣未可謂之無據也註文盖見孟子之言與史記所載有所不同故有此說史記言晉獻公既虜百里奚以為秦穆姬媵於秦百里奚亡秦走宛楚鄙人執之穆公聞其賢欲重贖之恐楚人不與乃以五羖羊之皮贖之授以國政號曰五羖大夫由是言之乃是晉虜百里奚以為媵於秦非百里奚自之秦也孟子言知虞公之不可諫而去之秦似與史記不同其實未嘗不同也讀此章者當以知虞公之不可諫而去為句去為去位也之秦年已七十矣則與晉虜秦贖自不相妨不必言已無所據萬章下晉平公之於亥唐也註闕中原古註本無之字有則似為文備宜取集註本為正曰郤之郤之為不恭何哉註郤不受而還之也再言之未詳二郤之一必為衍然孟子荅萬章之問止是言交際主恭未嘗言其有所賜與萬章便以郤之為問意不相承必有㫁簡不可考也曰其取諸民之不義也註萬章以為彼既得之不義其餽不可受但無以言語閒而郤之直以心度其不義而託於他辭以郤之萬章一問中二曰字必有一為衍者而註文今為是説盖指以心郤之下曰字為心度之辭然其所敘之言誠難以心度為說也予謂經文有傳寫之差其取諸民之一句與曰字相連元是一段緫意合在請字之上曰其取諸民之不義也請無以辭之以心郤之而以他辭無受不可乎如此讀之似為順理其交也以道其接也以禮斯孔子受之矣註孔子受之如陽貨蒸豚之類是也陽貨未嘗交孔子以道接孔子以禮也蒸豚之歸正可謂無道無禮不可引以為證斯孔子受之矣盖言其交也以道其接也以禮雖孔子亦受之乃是假設譬喻之言本無所指之事陽貨蒸豚之說置之可也殷受夏周受殷所不辭也於今為烈註商受至為烈十四字語意不倫李氏以為必有㫁簡或闕文者近之而愚意其直為衍字耳然不可考姑闕之可也直為衍字者良是去此十四字讀之上下語意方始得通前人之見未嘗及此自宋氏播遷江表南北分隔纔一百五六十年經書文字已有不同況其秦火之餘而又累經喪亂傳流錯誤不可謂無如此之類宜有以辨之也夫謂非其有而取之者盜也充類至義之盡也註夫禦人於國門之外與非其有而取之二者固皆不義之類然必禦人乃為真盜其謂非有而取為盜者乃推其類至於義之至精至密之處而極言之耳非便以為真盜也盜亦多端豈必禦人始為真盜昏夜伺隙𤼵户穴牆取彼之物以為己有此皆非其有而取之者雖與國門之外禦人者不同得不為真盜乎況其言論至於義之至精至密之䖏不過極是而已夫義豈有過哉果如註文所論則天下之事皆於義之不精不密䖏言之然後為是恐無此理充類至義之盡與獵較簿正之類本不易知茍無實據不可謾說有惑後人也末章註云此章文意多不可曉不可强為之說此言却公可以免後人穿鑿之勞不以君命將之子思以為鼎肉使已僕僕爾亟拜也註初以君命來餽則當拜受其後有司各以其職繼續所無不以君命來餽不使賢者有亟拜之勞也註文中道而止自子思以為鼎肉之下不解一字此必有疑於經文既不以君命將之子思猶以為鼎肉而拜之於此義不能通故不說也舊說不以君命者欲使賢者不荅以敬所以優之也子思所以非繆公者以為鼎肉使已數拜也此是解子思以為鼎肉之一節謂是申眀前段子思不恱繆公之意也此說大意固是但前後經文不能相接不以君命將之之下須當别有敘起前意之文如云子思之不恱也或云子思所不恱者須有如此一句在於以為鼎肉之上然後可通今既無從可考說者但當云有闕文而已古千乘之國以友士何如註闕國乃諸侯疆域之稱豈能與人為友邪國本君字之誤下文千乘之君求與之友是其眀證一鄉之善士斯友一鄉之善士註言已之善盖於一鄉然後能盡友一鄉之善士推而至於一國天下皆然善盖一鄉單指一人而言盡友一鄉普指衆士而言一善士分為兩說盖有由矣意謂前句一鄉之善士既為善盖一鄉最善之士後句斯友一鄉之善士若與前善士同說亦為善盖一鄉一䖏不能容兩最善以此為嫌故於後句中特加盡字普指一鄉衆士而言避重複也盖不思天之賦與人善非有定則善盖鄉國天下者不可限定各䖏止有一人也臯陶后稷俱是同時周公太公亦皆並世未聞一䖏不能容有兩人也只以一家論之而有泰伯仲雍伯夷叔齊周之八士秦之三良天亦未嘗限定止生善盖一家之一人況於鄉國天下乎但其善為衆所推尊者無論㡬人同為一鄉所尊者皆為善盖一鄉所謂一鄉之善士也同為一國所尊者皆為善盖一國所謂一國之善士也徳同道合相與為友是為一鄉一國天下之善士斯友一鄉一國天下之善士也今言盡友且一鄉之士或有盡能友之之理以普天下衆士之多豈能人人盡友邪天下所有之善士志操亦不能皆同相與為友盖亦各從其類耳如長沮桀溺之徒雖孔子亦不能盡友也豈孔子之善未能盖於天下乎註文所分兩善士皆當同說宜云已之善盖於一鄉然後能友善盖一鄉之士已之善盖於一國然後能友善盖一國之士天下之善士亦然告子上曰異於白馬之白也無以異於白人之白也註張氏曰異於二字宜衍李氏曰或有闕文焉謂有闕文者誠是上白字之上當復有一白字異於白者言其長異於白也白其馬之白固無異於白其人之白我不知長其馬之長亦無異於長其人之長歟異於白三字乃是一段總意無此三字意便短促謂異於二字為衍者非耆秦人之炙註耆與嗜同耆字中原古註本作嗜盖自毛晃於禮部韻略中増入耆字引孟子此語注於其下江南以此為據故孟子中嗜字皆去口為耆恐非孟子所用之本字也惟從中原古本從口為嗜乃正理也乃若其情則可以為善矣乃所謂善也註乃若𤼵語辭情者性之動也人之情本但可以為善而不可以為惡則性之本善可知矣情雖性之動於性亦依違無常非能體性而全善也喜怒哀懼愛惡欲此皆性之動而通謂之情者也其能動皆合理𤼵皆中節所舉無有不善者見亦罕矣但可以為善不可以為惡惟性為然謂為情則非也下文若夫為不善非才之罪也才字正繼情字之文勢而言後又言或相倍蓰而無筭者不能盡其才者也二才字與情字上下相連意如貫珠情乃才字之誤也才猶材質性之本體也乃若𤼵語辭盖言乃若其性之本體則可以為善矣故謂之善也若夫為不善非性本體之罪也仁義禮智人皆有之是為性所固有之善雖曰求則得之然氣質所禀各有不同而求者用功淺深不一故其所得亦不能齊或相倍蓰至於無筭是皆不能盡其性之本體也下章天之降才之才與此二才字情字義又全同由此觀之則情本才字才為性之本體亦明白矣富嵗子弟多賴註賴藉也豐年衣食饒足故有所賴藉而為善訓賴為藉乃是富嵗子弟多藉不知藉為藉甚也有所頼藉而為善一藉字寧兼許意邪賴本訓善止當直解為善則為狼疾人也註狼善顧疾則不能故以為失肩背之喻此以狼疾為狼病也狼疾人乃是狼病人天下之人未聞有病狼病者況狼身受病亦有不礙囘顧之䖏病則亦有輕重不同豈但病者皆不能顧邪盖疾本藉字之誤狼藉言其亂也養其一指失其肩背則為狼藉繆亂之人為其養小以失大也舊說以狼疾為藉字義本是然以狼藉歸之醫者却為未當以為醫之療疾治其一指不知肩背之有疾此為狼藉散亂之人為有此說故不能全是飲食之人無有失也則口腹豈適為尺寸之膚哉註若使專養口腹而能不失其大體則口腹之養軀命所關不但為尺寸之膚而已註文専字為窒前註言賤而小者口腹也貴而大者心志也其說誠是今云専養口腹而能不失其大體既已専定只養其小如何却能不失其大又以所養之大歸之軀命義亦不通軀命有重於太山有輕於鴻毛當其所惡有甚於死理當捨生就義之際軀命亦所不顧大人所養正不在此說者於前後兩飲食之人須當識其意有輕重彼上文飲食之人既曰人賤之矣乃是貪嗜飲食之人固當解為専養口腹矣此飲食之人方且望其無失於大却不合說為専養口腹也試通言之貪嗜飲食之人則人輕賤之矣為其専養口腹之小失其心志之大也人亦誰不飲食若使飲食之人無其貪嗜飲食之心不以專養口腹為事而於心志之大無有所失則其口腹所須豈但為養尺寸肌膚而已哉盖欲飲食資其一身之康寧所以保其心志而存道義也南軒曰豈但養尺寸之膚哉固亦道義之所存也此又與於不仁之甚者也註與猶助也仁之勝不仁必然之理也但為之不力則無以勝不仁而人遂以為真不能勝是我之所為有以深助於不仁助不仁䖏不正在為仁不力在於水不勝火之言於仁不仁之間有抑有揚以為仁不足恃善不足為有以張不仁之勢此為賛助於不仁最為甚者也告子下方寸之木可使髙於岑樓註岑樓樓之髙銳似山者升寸木於岑樓之上則寸木反髙岑樓反卑矣方寸之木本與一輿羽相對為說皆其積之之多所以髙所以重單升一寸之木為髙與其一輿羽之為重語意不倫南軒曰累方寸之木而髙於岑樓遂謂木髙於山積一輿之羽而重於鉤金遂謂羽重於金而山之為髙金之為重其理終不可易也此說句句對解使自為證辭理甚明累方寸之木為髙㫁無疑矣樓與山之二說無從考正不辨本亦無妨徃應之曰註闕自徃應之曰以下至則將摟之乎學者徃徃解此一段為屋廬子之言舊說教屋廬子徃應任人此說為是紾兄之臂而奪之食註此二者禮與食色皆其重者而以之相較則禮為尤重也孟子之言正謂寧不得食不可紾寧不得妻不可摟食色可去而禮不可棄也皆重尤重之說未見其是孔子為魯司寇不用從而祭燔肉不至不稅冕而行不知者以為為肉也其知者以為為無禮也註孟子言以為為肉者固不足道以為為無禮則亦未為深知孔子者註昏固不足道亦未為深知孔子之兩句學者徃徃通指為孟子之意然經文中實無如此之言指在孟子則近誣矣孟子明言其知者以為為無禮何嘗言未為深知孔子哉註文本是自譏孟子之非不肯顯言而以孟子言三字糢糊說過所以致有如此之疑予謂經文實亦有可譏者雖至愚之人亦能知孔子無為肉之心孟子以為為肉之言似不𢎞雅註文譏之可也然直以為不足道却似涉於太峻又譏以為為無禮之一言謂為亦未為深知孔子者全為未當論語集註解齊人歸女樂章亦說簡賢棄禮解其次避色亦言禮貌衰而去季桓子耽玩女樂不致燔爼於大夫無禮至此孔子遂行其行實為無禮也樂正子强乎曰否有知慮乎曰否多聞識乎曰否註此三者皆當世之所尚而樂正子之所短故丒疑而歴問之公孫丑三問中其事有五强謂剛健有為君子以自强不息也智乃心之知知是非而不繆也慮乃心之思慮而後能得也多聞所以資其聰友多聞則益矣多識所以資其明君子多識前言徃行五者在人萬世所尚豈惟當世而已哉樂正子果短於此既不能自强而又無知無慮無聞無識盖亦庸愚之輩耳所好之善果何善邪孟子之喜亦為妄喜矣彼公孫丑之問本非為樂正子所短而𤼵也盖不知孟子所喜之意問其為何而喜也為其强乎為其有知慮乎為其多聞識乎孟子皆荅曰否盖言我之所喜不為此也丑復問然則奚為喜而不寐言既不為此果為何事喜至於此也孟子復荅其為人也好善言我為其為人好善而喜也以此觀孟子與公孫之言皆不見有指說樂正子所短之意問荅語話中間本皆有為字意脉但顯為字則註文之誤自見夫茍不好善則人將曰訑訑予既已知之矣註訑訑自足其智不嗜善言之貌註文大意不差但略過人字不說義為未盡盖自將曰以下本皆假設茍不好善之人所言之言為說也然有人字在上人將曰訑訑却是他人所言之言與下文訑訑之聲音顔色距人於千里之外意不相貫若刪去人字但曰夫茍不好善則將曰訑訑予既已知之與下文通讀語意乃圎人字盖羡文也四書辨疑卷十二
