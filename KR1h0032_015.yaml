body:
  text: 欽定四庫全書四書辨疑卷十五元陳天祥撰中庸道之不行也我知之矣知者過之愚者不及也道之不眀也我知之矣賢者過之不肖者不及也注知者知之過既以道為不足行愚者不及知又不知所以行此道之所以常不行也賢者行之過既以道為不足知不肖者不及行又不求所以知此道之所以常不眀也知乃智之事行則賢所能於智愚止可言知於賢不肖止可言行智者過之止可解為知之過愚者不及止可解為不及知賢者過之止可解為行之過不肖者不及止可解為不及行注文為見前一節行與智愚相配為言後一節眀與賢不肖相配為言故以知與行兩相遷就交互言之牽強甚矣夫道在世間必須先眀然後能行必先不眀然後不行下章注云由不眀故不行此言是也眀字本當在前今反在後行字本當在後今反在前乃後人傳寫之誤也行明二字當相易讀之解者宜云道不眀者由其智者知之過愚者不及知此道之所以常不眀也道不行者由其賢者行之過不肖者不及行此道之所以常不行也智者知之過如著書傳道而為過髙過深之論者是也賢者行之過如摩頂放踵而為愛無差等之行者是也二者俱為害道然行之過者誤人淺知之過者誤人深孟子曰所惡於智者為其鑿也由此觀之解經而務鑿孟子之罪人也道其不行矣夫注由不眀故不行此章承上章而舉其不行之端以起下章之意注文為見本經中無話可説故曲就上下兩章而言也豫謂經文惟此一句中間又無所言之事似難獨為一章正與大學此謂知之至也之一句相似必有闕文不可強説人皆曰豫知驅而納諸罟獲陷阱之中而莫之知辟也人皆曰豫知擇乎中庸而不能期月守也注罟網也擭機檻也陷阱坑坎也皆所以掩取禽獸者也言知禍而不知辟以況能擇而不能守皆不得為知也驅字是一章中緊要字而注文略不言及又不細推罟擭陷阱所喻者何事乃云知禍而不知辟以況能擇而不能守蓋不知罟擭陷阱所況不在擇守也驅者言其身為物欲所驅也罟擭陷阱以況物欲陷人之禍害也人皆自謂我有智慮及見美色珍貨富貴大權有私便可圖之隙則其攘奪之心奮然而起驅其身或為姦為盜為亂臣賊子納之於辱身喪命亡家覆族之禍害中而不知辟與其雖亦擇乎中庸而不能期月守者皆不得為智也衽金革死而不厭注衽席也金戈兵之屬革甲胄之屬注文止是訓字未嘗通解其文訓衽為席乃是席金革死而不厭席字難説衽訓卧席亦訓卧褥卧席卧褥皆人寢息所安者也衽金革蓋言嗜金革如嗜卧席卧褥之安雖死於其間而不厭此北方之強也君子之道費而隱夫婦之愚可以與知焉及其至也雖聖人亦有所不知焉夫婦之不肖可以能行焉及其至也雖聖人亦有所不能焉注費用之廣隱體之微君子之道近自夫婦居室之間逺而至於聖人天地之所不能盡其大無外其小無內可謂費矣解費為用之廣大意則是再審如何是用之廣却無明説解隱為體之微體字蓋以道體為言不知指道為何道何者為道體也其言夫婦居室者蓋以夫婦作夫妻説也夫婦之愚解為夫妻之愚凡為夫妻者豈皆愚乎夫婦之愚夫婦之不肖二夫婦字與造端乎夫婦之夫婦義本難同若只解為愚夫愚婦乃為通順又觀聖人天地所不能盡之一句且論聖人不能盡若以亦有所不知亦有所不能之經文為解猶有可説然已幾於莊子注郭象矣再論天地不能盡若以天地之大天下莫能載之經文為解則是東南西北至其天地盡頭無天地處君子之道猶逺天不能蓋盡地不能載盡也以此為用之廣不知天地盡了之外又有何人廣用此道也或問又解隱字曰隱之為言正以其非言語指陳之可及耳此説亦非君子所行之道何嘗有言語不可及者哉隱字本指理之微妙難見者而言見則言語可以及矣然此章大要先須指定道是何道乃可説也蓋君子之道三綱五常是也斯道也古今天下君臣父子夫婦長幼朋友之間無時可離無處不有其所用之廣如此所謂費也中間如仁義禮知孝弟忠信之屬人雖日日用之而能得其正理者鮮矣仁或流於姑息敬或墮於阿諛慈或敗子孝或陷父又前人經解中所辨仁恕忠恕忠信之分道理權經和同之别如此之類終無定説者多矣其理微妙難見如此所謂隱也注文或問於聖人不知不能處亦説不通蓋聖人不知以學言聖人不能以位言不得其學則不知不得其位則不能且其一身一家常用之事如父子之親夫婦之别長幼之序雖愚夫愚婦亦皆可知亦皆能行及其化為治國平天下之用如禮樂憲章前王制度聖人雖稟上智之姿不得其學則亦有所不知也故孔子問禮於老聃問官於郯子然後能知此可見得其學則無有不可知者也雖已知之不得其位則亦有所不能也故孔子為中都宰一年四方則之攝行相事三月魯國大治此可見得其位則無有不能行者也若於君子之道得其學亦不能知得其位亦不能行何足為聖人乎豫於此章知此而已自天地之大以下義多難曉其間或有脫誤衍文不敢強解注文或問輯略語録重重復復幾五千餘言皆無明白可通之説如天地之大人猶有所憾注文解為覆載生成之偏或問再與注文為注云天能生覆不能形載地能形載不能生覆以此為覆載生成之偏亦皆未是天覆地載乃天地之正理不可謂之為偏也況天地之覆載與君子之道亦不相干人亦未嘗有憾於天不載而地不覆也又如鳶飛戾天魚躍于淵諸家詩解各有異同程子曰此一節子思喫緊為人處活潑潑地或問又引程子之言曰與必有事焉而勿正心勿忘之意同活潑潑地反覆參詳終不見活潑潑地義理安在必有事焉而勿正心勿忘勿助長也豫於孟子集注已有辨矣豈可與鳶飛魚躍同説哉或問又曰子思於此指而言之惟欲學者默而識之則為有以洞見道體之妙又曰苟能超然默會則道體之妙已躍如矣又有一説言楊龜山得鳶飛魚躍之理於意言之表信如此等之説則是中庸之義止可默識不可以文字語言發明之也嗚呼聖人立言設經為教以傳道後人所得之道一皆出自於經須其師友講説然後能明寧有不容言語指陳止可超然默會者哉使學者襲此成風凡遇難眀之理皆可自謂吾已默識默會於心洞見道體之妙在吾目前已躍如矣問之則曰此非言語指陳可及以此虛誑互相迷惑害道誤人孰甚於此纂疏又引語録一説問中庸編集得如何曰便是難説緣前輩諸公説得多了儘有差舛處又不欲盡剝難他所以難下手不比大學都未曽有人説此話亦似未公四書中前人注説之多者孰如論語雖有差舛何嘗有礙後人之識見哉中庸一書本多難解大學傳文亦頗相類蓋此書與大學本皆各為一經歷戰國之亂經秦火之厄雖能僅存世無知者漢儒採集附於禮記中列為二篇與諸篇相混無别非二程先生不可得如今日矣大迹既已如此則其章句中傳寫之差必不能無所不知者止當置而勿解不可歸罪前輩諸公責其説者之多也語録又曰中庸之書難看中間説鬼説神都無理會豫謂此數語真是文公本意其實亦有不盡知者況我輩乎説者但無自欺之蔽知之為知之不知為不知如是而已可也伐柯伐柯其則不逺執柯以伐柯睨而視之猶以為逺故君子以人治人改而止注睨邪視也言人執柯伐木以為柯者彼柯長短之法在此柯耳然猶有彼此之别故伐者視之猶以為逺也注文既訓睨為邪視於通説處却單撤去睨字不復有關邪視之意前言長短之法彼此無别後句却言猶有彼此之别經文本謂睨視者誤以其則為逺注文於睨視一節却解為其則實逺意皆有差蓋睨視持疑不決之貌手中執柯以伐柯彼柯長短只此柯是其定則其則至近甚不難見而乃側視傍觀持疑不決則是所見不眀猶以其則為逺也以自己之心度他人之心無不同者己心所欲之善事人亦欲之己心所惡之惡事人亦惡之忖度他人之心只自己之心是其定則此之謂其則不逺也彼亦人也已亦人也見彼人道有差以己人道治而正之此之謂以人治人也彼既能改有耻且格便當善待不須更治此之謂改而止也若已改過自新而猶治之不已人或以此加之於己蓋亦己之所惡如此等事已亦不可加之於人此之謂施諸己而不願亦勿施於人也忠恕違道不逺施諸己而不願亦勿施於人注施諸己而不願亦勿施於人忠恕之事也注文本意蓋指忠恕為一事不欲使有分别也然以實理言之心無私隱之謂忠推己不欲勿施於人之謂恕忠自是忠恕自是恕豈可併而為一哉程子言事上之道莫若忠待下之道莫若恕此亦分忠恕為兩事其意本是而或問非之以為不當析之為二無無恕之忠無無忠之恕若準此説為例天下道理中亦無無仁之義無義之禮無禮之智仁義禮智亦當通為一事不可析之為四也此皆知之過者之病學者尤當慎之也或問又引論語中忠恕為説云盡己推己乃忠恕之所以名曽子之言蓋指其不可名之妙而借其可名之粗以眀之學者默識於言意之表則亦足以互相發眀而不害其為同也此又以忠恕止當默會於心不可以言語解説也言語可説者為忠恕之粗不可説者為忠恕之妙也遍覽堯舜禹湯文武伊周孔孟之言皆無如此差異之論聖人經世理人之道至精至妙者載在經典備矣何嘗有不可言説止可默識於言意之表者哉此等話前論中已嘗正之豫亦自厭其繁不欲再加詳辨也施諸己而不願亦勿施於人此只是恕經文與忠兼言者正與禹稷當平世三過其門而不入之文相似豫於孟子中已有其辨可就觀之違道不逺又與孟子言強恕而行求仁莫近焉之意正相類仁包五常而為人道之本恕最近仁故言違道不逺也故大德必得其位必得其祿必得其名必得其夀注舜年百有十嵗注言舜年百有十嵗又解下文大德者必受命之一句云受天命為天子也以此言舜義固不差如孔子之至聖大德賢於堯舜而乃不得其位不得其祿年又止於七十有三顔子以亞聖之德居於陋巷簞食瓢飲年才三十二而終與舜豈可通論哉蓋經文專指事之當然而言未嘗與時兼論也夫大德者必受天命必得位祿名夀四者俱全惟天運開泰至盛之時乃能如此若陽消隂長君子道衰則大德之人必無全能有此四者之理此皆天人相關自然之道學者不可不知也事死如事生事亡如事存注始死謂之死既葬則曰反而亡焉始死為死既葬為亡諸字書皆無此説果如注文所言則事死如事生之一句止是説事其初死者當如事生既葬之後春秋祭祀皆不必有如事生之敬也豈通論乎況死與亡既有始死既葬之分則生與存亦當分為兩説今生存二字却皆仍舊何也又諸書中言人亡國亡者不可勝數孔子執伯牛之手曰亡之書言有一於此未或不亡如此之類亦何嘗有關既葬之意哉經言事死如事生事亡如事存亡乃死之變文存乃生之變文死便是亡亡便是死生便是存存便是生難容更有如此分别也忠信重祿所以勸士也注忠信重祿謂待之誠而養之厚注言待之誠蓋以誠字解忠信又以忠信為人君之忠信也豈有君忠於臣者哉只論待之誠三字義亦難通於九經中觀之身與賢親大臣羣臣庶民百工逺人諸侯皆當待之以誠非獨於此一處當用誠也然於羣下亦須分辨賢否若於邪惡之人待之以誠敬養之以重祿則賢者必思退隱不可謂之勸士也忠信重祿本繼上文體羣臣一節而言忠信止可説在羣臣體謂體察辨認也此與孟子言國人皆曰賢然後察之意同言於羣臣中審詳體察見有忠信賢善之實者厚其祿賜以旌顯之則士皆景慕樂於為善是之謂忠信重祿所以勸士也孔子言舉直錯諸枉能使枉者直舉善而教不能則勸義皆相類成己仁也成物知也注仁者體之存知者用之發注與經文意不相對又不知説體為何者之體用為何者之用也仔細詳觀似謂體為道之體用為道之用然經中實無關該道體道用之處存發二字亦生澀難看注中本要見何者為成己何者為成物成己者如何是仁成物者如何是知如此以解本經可也夫學以明德乃成己也教以新民乃成物也孟子引子貢贊孔子之言曰學不厭智也教不倦仁也此以成己為智成物為仁子思却説成己仁也成物知也二説不同不容不辨蓋子貢以心言子思以事言思欲成己之心屬智如終日不食終夜不寢以思無益不如學也者是也所行成己之務為仁如崇德修慝克己復禮者是也思欲成物之心屬仁如己欲立而立人己欲達而達人者是也所行成物之務為智如聖人設科為教以傳道髙下淺深各隨其材以授之中人以上可以語上中人以下不可以語上者是也以此為解則二家之説皆通矣豫舊嘗有説曰成己之心智也所以成己者仁也成物之心仁也所以成物者智也此最簡直易言然又恐人未曉故有如許之曲折也子曰吾説夏禮杞不足徴也吾學殷禮有宋存焉注夏禮既不可考證殷禮雖存又非當世之法語云夏禮吾能言之杞不足徴也殷禮吾能言之宋不足徴也此亦孔子之言今曰吾學殷禮有宋存焉却是宋守殷禮未嘗有闕不可謂宋不足徴孔子之言何其翻覆如此邪況世衰道喪古禮皆亡夏禮既無可取證於杞殷禮亦豈能獨存於宋以此推之當取論語為正中庸文有傳寫之差難謂兩經俱是也上焉者雖善無徴無徴不信不信民弗從下焉者雖善不尊不尊不信不信民弗從注上焉者謂時王以前如夏商之禮雖善而皆不可考下焉者謂聖人在下如孔子雖善於禮而不在尊位也夏禮吾能言之殷禮吾能言之殷因於夏禮所損益可知也周因於殷禮所損益可知也此皆孔子之眀論蓋前王禮典當時皆在夏禮商禮俱有考據故孔子自謂能言又云可知也然其禮之文雖在禮之實皆亡如云把不足徴宋不足徴本言先王之禮久廢雖其後嗣亦無可以取證之實此特傷其禮之不行非謂夏商之禮皆不可考也子思必無不取聖祖之言别為如此異論之理王天下有三重焉其寡過矣乎此兩句本是上章結語摘屬此章非也中庸章數差互者甚多他日必有能辨之者此章自上焉者以下皆是通論君子之道本非專説禮之一事也試於下文故君子之道本諸身徴諸庶民之十二字中仔細觀之則一章之本意可見上焉下焉皆以位言在上之人徒有仁心仁聞而民不被其澤此之謂上焉者雖善無徴也在下之人道同前聖前賢而身不在其位此之謂下焉者雖善不尊也無徴不尊民不信從理勢之自然也四書辨疑卷十五
