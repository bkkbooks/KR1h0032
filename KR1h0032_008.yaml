body:
  text: 欽定四庫全書四書辨疑卷八元陳天祥撰論語陽貨第十七陽貨欲見孔子孔子不見歸孔子豚孔子時其亡也而往拜之遇諸塗注必時其亡而往者欲其稱也遇諸塗而不避者不終絶也隨問而對者理之直也對而不辨者言之遜而亦無所詘也經言孔子不見只此一句足以見聖人待陽貨之本心往拜者迫於禮之當往不得已而然也時其亡者終不欲與之相見非為不誠於己而乃復以不誠報之須其兩停相稱而已也遇諸塗而不避者既已聲言往拜而於道塗偶然相遇自無避之之理非欲與之不絶也隨問而對者語話之間有問則自是有對理之直與不直在其所言之事何如耳只隨問而對亦未可便以為理之直也對而不辨者亦止是待貨為凶愚之人不足與辨所以不辨不必稱為不詘也南軒曰在禮當往拜烏得而不往時其亡者則不欲見之也遇諸塗則有不得避焉貨三問而應之如響者貨蓋不可與言者故不申己之意而遜辭以答之言雖遜而理亦未嘗枉也此待惡人之道此説為當性相近也習相逺也注此所謂性兼氣質而言者也氣質之性固有美惡之不同矣然以其初而言則皆不甚相逺也但習於善則善習於惡則惡於是始相逺耳程子曰此言氣質之性非言性之本也若言其本性即是理理無不善孟子之言性善是也何相近之有哉程子説此言氣質之性非言性之本注文説性兼氣質而言二説相較程子之説疐礙為多不知夫子何故不言性之本論性不言性之本而却專言氣質之性則性之本理昧矣聖人言論恐不如此踈謬之甚也性與氣稟本不可相離經中實皆兼有其義注文兼字意當性中止論善惡兩事其言相近者必不指惡處相近蓋謂人心善處皆相近也人心善處便是性之本豈可謂之非性哉若單言性之本固是無有不善若與氣稟兼言衆人所稟之氣質各有偏處所以性皆不圎不能盡有其善其初只能相近也茍非上聖之資氣質未有不偏者但偏多偏少各有分數之不齊耳偏少者善境多不善之境少偏多者善境少不善之境多天下之人偏少者寡偏多者衆故往往習善則難習惡則易也然在幼歲心猶未有所習之際雖其氣質各有所偏而於本然之善亦皆不甚相逺故曰性相近也及其漸長各有從習習於善則與惡相逺習於惡則與善相逺故曰習相逺也若至聰至明上智之人以其氣質全正天性所居之境字周圎雖強使之習惡惡亦無自而入若至昏至濁下愚之人以其氣質極偏其間無容天性之處雖強使之習善善亦無從而生故曰惟上智與下愚不移也如此通作一章總而論之則天性氣質與其習以相逺又有非習可移自本至末竭盡無餘此可見聖人之言理無不備未嘗不言性之本也豫又推求氣質之源見世有談命之術及相人之術妙其理者皆能道人壽夭休咎性情好惡如指諸掌談命者專論隂陽五行此是論氣相者專論骨法形象此是論質氣乃人生所稟隂陽五行之氣也人之受胎而生也隨其年月日時各有支干相配其所遭值隂陽五行之氣數千變萬化人人不同某處隂或多於陽某處陽或多於隂某處木或盛於金某處金或盛於木自毫釐倍蓰至於無算氣之所以不齊者此也又其逺近之地方殊異古今之世運推移隂陽大氣亦有差别父母所稟傳流在己者又常相兼於年月日時不齊之外又有此等之不齊也質乃人之形質也氣聚而後成形有是氣則有是質氣既如此不同質亦不能不異質之所以不齊者此也一身之中不能遍舉只如人之面貌視其大槩則皆相類仔細詳觀俱各不同人心不同亦如人面內則五臟六腑外則四肢百節內外形質與心相連通是一氣故其心之邪正皆形諸外相者相其外而識其內也性之所居者心心之所依者身心與身之形質氣脈若四方上下皆無一毫之偏則性在其中無有阻礙乃能全有本然之善若性為氣質之偏邪所拘則其本體不圎不能全有其善矣氣質與性關連之理大槩如此程子發明出氣質二字固有𢎞益於後學然亦時有未盡通者如所謂氣質之性義實未安既有天性又有氣質之性則是性有兩種一身兩性斷無此理性本一也其不同者氣質之偏使之然也氣質何嘗自有性哉性在稟氣形質中與水在器中相似水之本體無不周圎器有偏曲窊凸則水亦不能圎正不圎不正者亦只是此水豈可别為器之水哉性無氣質之性亦猶是也子曰惟上智與下愚不移注此承上章而言人之氣質相近之中又有美惡一定而非習之所能移者程子曰人性本善有不可移者何也語其性則皆善也語其才則有下愚之不移所謂下愚有二焉自暴自棄也人茍以善自治則無不可移雖昏愚之至皆可漸磨而進也惟自暴者拒之以不信自棄者絶之以不為雖聖人與居不能化而入也仲尼所謂下愚也或曰此與上章當合為一子曰二字蓋衍文耳此段與上章本是一章三句相連有本有末前已辨之分之為二義皆不全或曰之説誠是子曰字為衍文無復可疑注文以為承上章而言非也又氣質相近之中六字之意亦差經中只説性相近非言氣質相近也上智之不移由其氣質全正下愚之不移由其氣質極偏豫於上文備言之矣正為氣質之稟絶相懸逺故上智不可下移下愚不可上移也氣質相近之中豈有美惡一定非習可移之理程子又一向只説下愚不移於上智不移略無干涉亦不可通如云語其性則皆善也語其才則有下愚之不移才字意昏性與氣質皆是實有之物今於性與氣質之外又别説才不知指何者為才也説者皆宗孟子集注以才為人之能果如此説語其能則有下愚之不移則程子之言愈不可曉此才字本自孟子中來孟子答公都子問性上言乃若其情則可以為善矣下言若夫為不善非才之罪也程子解之意謂孟子既言性善情亦善才又善遂以才與性情並列一同論其善惡以為才稟於氣氣有清濁稟其清者為賢稟其濁者為愚似説才為材質也注文乃云才猶材質人之能也此比程子之説於才字雖有所指之實然材質與能義實不同材質是言其本體能是言其作為不可混而為一也語録中或説才為材料或説資質或説才能又言才之初亦無不善緣他氣稟有善惡故其才亦有善惡又曰能為善而本善者是才如此之類紛紛紜紜不能遍舉終無明白可曉之理竟不知才果何物也大槩只是説才本是善不能為不善及解赦小過舉賢才却説賢有德者才有能者又解驥不稱其力稱其德也亦説人有才而無德則亦奚足尚哉才與善却有如此分别與其能為善而本善者是才之説豈不自相矛盾邪才字本有兩義一為才能一為材質惟所用處各有不同今此才字若以為才能之才語其才能則有下愚之不移辨已在前既不可通若以為材質之才材質專歸下愚而無關於上智亦不可通孟子中才字豫既有其辨矣上智下愚不移亦有前説程子以下諸才字之説自不須用程子又言人茍以善自治則無不可移雖昏愚之至皆可漸摩而進惟自暴自棄者不可化理亦未當既已昏愚之至如何却能有以善自治之美此論正是反孔子之言為説也孔子以下愚為不可移程子以至愚為必可移若程子之言果是則孔子之言非也然世間自有無慧而不辨菽麥者問鳴蛙屬官屬私者此則為昏愚之至雖聖人與居亦不可漸磨而進孔子之所謂下愚者此類是也彼自暴自棄之人多是非不能而自不為者愚則愚矣非皆下愚猶有可移之理也太甲初亦自暴自棄矣及為伊尹所放三年而後改過遷善卒為賢君豈非可移之驗歟雖然若無伊尹道德功業兼重之勢以制之亦不能移此又不可不知也公山弗擾以費畔注弗擾季氏宰與陽虎共執桓子據邑以叛舊疏云弗擾即左傳公山不狃也字子泄注文蓋於舊疏中去此一節而取其下文也雖不明指弗擾為誰推所言之事亦是以弗擾為不狃也然左傳或稱不狃或稱子泄未嘗又稱弗擾也又以史記與左傳對考其事所載亦多不同注文與二書皆不相合史記於定公九年陽虎出奔之下言公山不狃以費畔季氏十二年言仲由為季氏宰將墮三都公山不狃率費人襲魯左傳惟十二年有不狃帥費人襲魯之事十二年以前未嘗於不狃言叛也若從史記之説不狃自九年以費叛至十二年猶據費邑而率費人襲魯季氏之於費邑豈有經涉三年不往攻取之理若從左傳之説惟以十二年帥費人襲魯為不狃之叛而陽虎出奔已踰三年不可謂與陽虎共執桓子以叛也况是時孔子為魯司寇不狃以叛逆之人而召司寇孔子居司寇之職而欲往從叛人之召皆無此理以弗擾為不狃之説不知如何以待别考吾其為東周乎注為東周言興周道於東方注言興周道於東方夫子欲自興之邪將欲輔人興之邪輔人興之將欲遷周王於東方輔之邪將欲君弗擾於費邑輔之邪是皆不可得知語録曰使周家修其禮物作賔於王家豈不賢於赧王自獻其邑而滅亡乎史記孔子世家曰公山不狃以費畔季氏使人召孔子孔子循道彌久溫溫無所試莫能己用曰蓋周文武起豐鎬而王今費雖小儻庶幾乎語録是誘説周家當如堯之禪舜史記是窺伺時釁欲據費邑代周語録是軟取史記是硬取二説均為無禮史記為尤甚聖人之心寧有是哉況欲倚叛人以興聖王之道據一邑以圗天下之功此又昏狂人所為之事今乃直以為聖人之本圗何其固執如是邪聖人寃抑至此莫有肯為伸理者悲夫使異端中有能窺見此釁者因而乘之指聖人為叛逆之人則吾道受害蓋不淺也纂疏又引語録答門人之説曰若謂弗擾既為季氏臣便不當叛季氏所謂改過者不過於臣順季氏而已此只是常法聖人須别有措置此蓋以季氏強僭於魯謂弗擾叛之為是也以臣叛主從而是之不知何義以當時普天下觀之諸侯卿大夫之違禮犯義強僭無上者滔滔皆是也為其臣者知有不可止當退而不仕必無據人之邑反叛之理若謂弗擾之反叛為是則其天下之臣於諸侯及為卿大夫之家臣邑宰者皆當各叛其主家臣叛大夫大夫叛諸侯以亂敵亂亂益滋多天下國家寧有治邪且前注言弗擾與陽虎共執桓子以叛既於弗擾稱是則陽虎亦無不是而注文解陽貨欲見孔子孔子不見却也説陽貨為亂孔子不見義也二人同黨志同事同而有是非善惡之分此何説也注文又引程子一説曰聖人以天下無不可有為之人亦無不可改過之人故欲往然而終不往者知其必不能改故也觀此所論於本人反叛中而更望其有為不知將為甚事前句欲弗擾有為後句欲弗擾改過聖人之心果何如也況不可有為之人不可改過之人聖人未嘗言無也孟子言自棄者不可與有為也此豈不是天下有不可有為之人夫子言下愚不移此豈不是天下有不可改過之人既言聖人以不可改過之人為無又言知弗擾必不能改此却是以不可改過之人為有前既言無後却言有既欲其進而有為又欲其退而改過反覆顚倒殆不可曉推夫子欲往之心初亦只是見其來召有道之人想是有改悔之意欲往從而勸之使之去逆從順復歸於魯而已其意不過如此豈有與興周道之理答子路之言上下通看文有宛轉夫字如有二字二者字皆是普該衆人之辭非直指弗擾而言也吾其為東周乎其猶豈也夫子身在周東故以東周為諭蓋言凡其召我者豈虛召哉必將聽信我言用我之道耳譬如今此東方諸國有能信用我者我必正其上下之分使之西向宗周而已我豈與之相黨别更立一東周乎只此便是欲勸弗擾歸魯之意聖人之言辭不迫切如此初將勸令改過遷善以此欲往仁之事也察知其心終不能改以此不往智之事也若乘弗擾之叛欲與共興周道於東方則是無仁無智之舉不可以此揆度聖人也吾豈匏瓜也哉焉能繫而不食注匏瓜繫於一處而不飲食人則不如是也注文正説處止是人則不如是也之一語於匏瓜之諭略無發明與上文磨而不磷涅而不淄不可通説繫而不食者言其為無知之物也夫子蓋謂我之所往自有當往之理我豈受其磨涅與之同惡如匏瓜之不動不食蠢然不知去就哉色厲而內荏譬諸小人其猶穿窬之盜也與注小人細民也穿穿壁窬踰牆解小人為細民其意以為色厲內荏穿窬之盜已是邪惡小人中間不可再言小人以此為疑故改小人為細民也蓋不察小人為作非止一端或諂或讒或姦或盜或顯為強暴或暗作私邪或心很而外柔或色厲而內荏推而辨之何所不有譬諸小人者言於衆小人中譬之也荏柔媚也諸之也以色厲內荏之人譬之於諸般小人惟其為穿窬之盜者可以為比也注又以穿窬二字分為兩事穿為穿壁窬為踰牆亦為少思蓋穿壁而入者為竊盜踰牆而入者為強盜二者之情狀不同夫色厲而內荏者外示嚴正之色以影人內懷柔媚之心以取事惟以隱暗中穿壁之竊盜方之為是與彼踰牆排户無所畏憚之強盜大不相類況窬字分明以穴居上而訓門邊小竇竇又訓穴穿窬乃穿穴也改窬為踰解為踰牆非也道聽而塗説德之棄也注聞善言而不為己有是自棄其德也不説如何是道聽如何是塗説但説聞善言而不為己有觀其大意蓋謂聞善言則當蓄之而為己用不可於道塗之間傳説與人也豫謂聖人教人必不如此所聞之言果善正當廣以傳人若於道塗之間遇有可傳之人傳之何礙傳説與人亦何損於己有哉蓋此章戒人聽人所傳傳己所聽皆不可不謹道塗之間濫聽將來不考其實即於道塗傳説與人如此輕妄則必不為雅德君子所與故曰德之棄也德之棄三字文理甚明非謂自棄其德也舊疏云聞之於道路則於道路傳而説之必多謬妄為有德者所棄也此説為是其未得之也患得之注何氏曰患得之謂患不能得之何氏之説固是然經中本無不字文不相合東坡謂患得之當為患不得之蓋闕文也此為完説古者民有三疾今也或是之亡也注氣失其平則為疾故氣稟之偏亦為疾昔所謂疾今亦無之傷俗之益衰也三疾下文所言是也氣稟之偏古今之民皆有之非獨古民為然其所偏處人人不齊亦非止三者而已果三疾為氣稟所偏則今也或是之亡也之一句却是説今民氣稟皆正而無古民之偏也恐無此理況氣稟偏正乃人生自有風俗盛衰蓋教化使然因人氣稟不正却傷風俗衰薄理亦未是夫子止是傷其時風益衰民俗所習漸不如古故有此歎非論氣稟偏正也疾猶瑕病也言古之民行當時指為瑕病者有三今民瑕病又與古民不同思欲復見如其古者三等之人今亦不可易得故曰或是之亡也惡徼以為知者注徼伺察惡伺察以為智亦説得過然徼本訓抄舊説抄人之意以為己有所以惡之此説義明微子第十八至則行矣注孔子使子路反見之蓋欲告之以君臣之義而丈人意子路必將復來故先去之以滅其迹子路乃路行過客既已辭去安能知其必復來也丈人既欲自滅其迹則不當止子路宿於其家而又見其二子也彼之出行果因何事不可得知未須如此億度也子路曰不仕無義注福州有國初時寫本路下有反子二字以此為子路反而夫子言之也未知是否夫子使子路去時略無一言至其回來才為此説義有未安況古今天下印本寫本皆未嘗見有添此二字者惟此福州一寫本有之其説義又不通不冝收録刪之以斷後人之疑可也周有八士伯達伯適仲突仲忽叔夜叔夏季隨季騧注或曰成王時人或曰宣王時人蓋一母四乳而生八子也然不可考矣四乳之説經中本無今人又分兩説有説四箇乳為四乳者有説四産子為四乳者一身四箇乳四産生八子事皆怪異不當贅於聖經成王時人宣王時人亦無實據荒妄之傳皆不可取子張第十九雖小道必有可觀者焉致逺恐泥是以君子不為也注小道如農圃醫卜之屬君子不為也之一語此甚有疾惡小道之意必是有害聖人正道故正人君子絶之而不為也農圃醫卜皆古今天下之所常用不可無者君子未嘗疾惡也況農又人人賴以為生其尤不容惡之也注文為見夫子嘗鄙樊遲學稼之問故以農圃為小道此正未嘗以意逆志也蓋樊遲在夫子之門不問其所當問而以農圃之事問於夫子夫子以是責之耳非以農為不當為也古人之於農也或在下而以身自為或居上而率民為之舜耕於厯山伊尹耕於莘野后稷播時百榖公劉教民耕稼未聞君子不為也又農圃醫卜亦未嘗見其致逺則泥也蓋小道者如今之所傳諸子百家功利之説皆其類也取其近效固亦有可觀者期欲致逺則泥而不通雖有暫成不久而壞是故君子惡而不為也農圃醫卜不在此數曽子曰吾聞諸夫子孟莊子之孝也其他可能也其不改父之臣與父之政是難能也注孟莊子魯大夫其父獻子有賢德而莊子能用其臣守其政故其他孝行雖有可稱而皆不若此事之難注中不見難能之理義有未盡南軒曰莊子之不改意者其政雖未盡善而亦不至悖理害事之甚故有取其不忍改也蓋善而不改乃其常耳不必稱難能惡而不改則是成其父之惡不可稱難能也胡寅曰莊子之繼世也必其先臣先政有不利於己者他人不能不改而莊子能之是以稱難王滹南謂二説皆有理胡氏之説尤親豫意亦然堯曰第二十天之歷數在爾躬注歷數帝王相繼之次第猶歲時節氣之先後也歷數既以天言當是天之歷運之數鄭玄妄引圖讖為説固不足道而注文不肯顯言天數亦恐涉於妖妄也然天數自有本分説處顯言何礙大抵人能成德於身成功於世無非天也書言豫懋乃德嘉乃丕績天之歷數在汝躬亦是見有盛德大功乃知天之歷運之數在其身也此連下文允執厥中四海困窮天祿永終凡四句皆虞書大禹謨舜以命禹之文未嘗又見堯以此言命舜也經言堯曰咨爾舜今不可考況此四句乃是於大禹謨篇中零散採摘湊合在此非舜命禹之全文也又通看一章經文自堯曰至公則説語皆零雜而無倫序又無主名不知果誰所言古今解者不為少矣終不見有皎然明白可通之説亦不見有公心肯言不可通解者惟東坡謂此章雜取禹謨湯誥泰誓武成之文顚倒失次不可復考王滹南謂此説為近人情豫與滹南意同猶之與人也出納之吝謂之有司注猶之猶言均之也均之以物與人而於其出納之際乃或吝之而不果則是有司之事非為政之體項羽使人有功當封刻印刓忍弗能豫卒以取敗亦其驗也猶無訓均之例解猶之為均之亦甚費力語録曰史家多有此般字此言亦似未真既言多有却不指出一字為證學者不得無疑也又出納之吝與上三惡亦不相類若以項羽之事論之雖有司亦不當如此經中或有脫誤闕之不講似亦無妨不知命無以為君子也不知禮無以立也不知言無以知人也注尹氏曰知斯三者則君子之事備矣弟子記此以終篇得無意乎君子當知之事非止三者而已知斯三者豈可便以為備乎果如尹氏之説則三者不可相離闕一則為不備也然三者其實各自為用未嘗不可相離也夫子之言亦只是泛舉學者之急務非以三者總包君子之事也又所謂弟子記此以終篇者亦為過論論語一書皆其諸弟子集記聖人之言記盡則已非如特作一篇文字前有帽子後有結尾也尹氏之論斷不可取四書辨疑卷八
