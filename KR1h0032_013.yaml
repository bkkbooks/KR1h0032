body:
  text: 欽定四庫全書四書辨疑卷十三元陳天祥撰孟子盡心上夭壽不二注二疑也疑字意不的切二固訓疑亦訓携二變異也注又言盡心知性而知天所以造其理也存心養性以事天所以履其事也以此推不二之義由造理言則不疑為順由履事言則不變為長夭夀不二正在發於行事處言之蓋誠一不二無有變異之意也說者宜曰夭夀惟一不變所守修身以俟其終也强恕而行求仁莫近焉注强上聲强勉强也恕推己以及人也反身而誠則仁矣其有未誠則是猶有私意之隔而理未純也故當凡事勉强推己及人庶幾心公理得而仁不逺矣己所不欲勿施於人曰恕然其不施之心有勉强之不施亦有不勞勉强之不施恕則亦有誠與不誠之異未可通謂猶有私意之隔也己所不欲之事勉强不施於人此非自然之恕固猶有所未盡於誠不勞勉强自然不肯施之於人此為自然真誠之恕然亦未至於仁也仁恕之分豫於論語吾亦欲無加諸人可謂仁之方也已之兩章已有其辨蓋恕者止能推己不欲之不善不以及人未能至於以善及人也再進一階推己之所欲以及於人如老吾老以及人之老幼吾幼以及人之幼己欲立而立人己欲達而達人之類是謂以善及人至此則為仁矣若以强為勉强而行望其自然之恕猶有限隔於仁豈有莫近之理强當讀為平聲自强不息之謂也人心但能不肯以惡及人便有以善及人之意在其中矣但未發見以及於物耳恕與仁之地位緊相挨次人能自强於恕力進不已進得不以不善及人之境便能以善及人故曰求仁莫近焉也行之而不著焉習矣而不察焉注著者知之眀察者識之精言方行之而不能眀其所當然既習矣而猶不識其所以然所以終身由之而不知其道者多也光顯彰著雖皆訓眀然其眀皆在外非內照之眀也如言聲迹顯著事業昭著此皆著字用當其分者也若以眀眀德為著眀德眀於庶物為著於庶物必不可也今以著為人心知識之眀誠為未是此著字止當如聲迹顯著之著為說察為識之精亦非程子以察為省察宜取為正蓋行謂行君子之所行習謂習君子之所習行君子所行而不能顯著由其信之不篤也習君子所習而不能省察乃其學而不思也惟其信之不篤學而不思雖亦行其君子所行習其君子所習而終身不知其道者多也不恥不若人何若人有注但無耻一事不如人則事事不如人矣或曰不恥其不如人則何能有如人之事其義亦通注文前說改不字為無字義便難解學者疑為兩說一說但其無恥之一事既不如人則事事不如人一說但於一件事有不如人處不以為恥則事事不如人未知注文果主何說若主學者前說無恥一事不如人此言甚騃正如說為姦一事不如人為盜一事不如人者無異是皆何等語邪若主學者後說又有責人太峻之病君子於小知小能多不用心因一小技不如人而不以為恥便謂事事皆不如人豈通論乎前說兩意皆無可取況經中亦無分别一事事事之文不恥不若人五字昭然在人目中止是言自已立心為人不如人處不自知恥而無見善思齊之志何能有如人之善此與心不若人則不知惡之語意相類或曰之說意是霸者之民歡虞如也注程子曰歡虞有所造為而然楊氏曰所以致人歡虞必有違道干譽之事虞與娛同古字通用五霸之術無他以力假仁而已造為干譽皆不必言致人歡虞乃其假仁之效也大扺昏虐之世民罹殘暴甚於倒懸幸有肯假仁義之君使民得䝉一時之惠如飢者甘食渴者甘飲歡虞之情蓋以此也殺之而不怨利之而不庸注豐氏曰因民之所惡而去之非有心於殺之也何怨之有因民之所利而利之非有心於利之也何庸之有非有心於殺之者是非有心於利之者非聖人以博施濟衆為心王政以安人利民為本命羲和之官歷象授時察璿璣玉衡以齊七政平治水土播時百榖敬敷五教順理庶工至於堯以不得舜為己憂舜以不得禹臯陶為己憂皆所以思濟斯民孜孜汲汲惟恐不及何嘗無心於利民哉無利民之心非聖人之徒也豐氏之說殺之與利之同謂之無心豈不繆哉庸功也利之而不庸者不以利己者為有功而無知感歡虞之心也蓋王者之民生長於雍熙盛化中未嘗見衰世之事視國家字民之道習以為常惟知利澤己所當得安豫己所固有帝力何有於我哉此其皡皡然自得之心利之而不以為功也得天下英才而教育之注盡得一世眀睿之才而以所樂乎已者教而養之則斯道之傳得之者衆而天下後世將無不被其澤矣英才世不多出不可以衆言如孔子之有顔曾自足為樂若直須盡得一世之才皆來受教然後始以為樂孟子本意恐不如此天下人才實無定數豈容以盡得為期縱有定數亦無盡得教之之理天下英才蓋指天下人中傑出間有之才而言非普言天下所有之才也如司馬懿歎稱天下竒才亦止是稱道孔明一人未嘗以天下為普言也天下英才正與此同得如此英傑眀睿之才教育之使聖人大道傳得其人功及後世所樂在此也流水之為物也不盈科不行君子之志於道也不成章不達注成章所積者厚而文章外見也章字解為文章與上句水不盈科不行之喻義不可通毛晃韻略成事成文曰章仍引孟子此文不成章不達為據義亦未盡此章字惟以為學之次第言之乃可說也章猶事目倫序也達通也言君子志在於道若所學不成倫序則不可通也物有本末事有終始自格物以至平天下自親親以至愛物自明善以至獲於上如此之類不能遍舉學者必當知所先後循序漸進成了一事然後再成一事道乃可通譬如水之流行注滿一科然後再注一科斷無越此注彼可通之理也所惡執一者為其賊道也舉一而廢百也注為我害仁兼愛害義執中者害於時中皆舉一而廢百者也經文中所惡執一者以下皆重言子莫執中之病文理甚眀舉一而廢百言其執一廢百也為我兼愛二事無預於此注文以三者通言皆舉一而廢百非也說者宜云執中無權害於時中舉一而廢百也仲子不義與之齊國而弗受人皆信之注仲子設若非義與之齊國必不肯受齊人皆信其賢然此但小廉耳其避兄離母不食君祿無人道之大倫罪莫大焉豈可以小廉信其大節而遂以為賢哉以萬乘之國與之果能郤之而不受雖夷齊無以加也注猶以為小廉天下廉者復有大於此者乎仲子不義與之齊國而弗受者蓋當時齊人嘗有此言孟子以此為人之大節非仲子所能而不之信也人皆信之者言其信上句所言將謂實能不受也注文以為人皆信其賢經中本無賢字意脉蓋所以就其小廉為說也既以不受齊國為小廉又謂以小廉信其大節不知又指何事為大節也仲子不食其兄所得之祿又嘗哇其鵝肉以此致有廉士之譽孟子謂此不足為廉故舉嘗所論者簞食豆羮之說以喻仲子所為無異於此蓋常人之情於細微之物多能忍其欲心而不輕取及見多廣貴重之物得之足以去貧賤而處富貴於是平昔所匿之欲心奮然而起不復顧其禮義廉恥而取之矣以仲子視萬乘之齊斷無與之不受之理孟子所以知其然者蓋於人倫之間察見之也人之惡行莫大於叛人倫仲子避兄離母棄祖宗世卿之業而不居是無親戚君臣上下蔑仁義而不顧也於齊國見與之際寧復有羞惡辭讓之心哉人但因其不食兄祿之小廉而遂信其真能不受齊國之大節何可哉此章移於前篇陳仲子豈不誠廉士哉之下義則易見夫有所受之也注言臯陶之法有所傳受非所敢私雖天子之命亦不得而廢之也以傳受抑天子之命使不得廢亦似難憑昏亂之世有司之法非無傳受而皆為其所廢渠亦何嘗有忌於傳受哉惟以公心期之則無擅廢之理五刑有服惟明克允此舜之所以命臯陶而臯陶受之於天子者也臯陶受此明命固自非所敢私惟知明於五刑而已舜既嗣堯之法而以公天下之心命之豈得復以瞽瞍之子為心而廢之哉受之言臯陶受之於天子也居移氣養移體注居謂所居之位養奉養也言人之居處所繫甚大王子亦人子耳特以所居不同故所養不同而其氣體有異也經文初言居移氣養移體繼而言者大哉居乎其居使之然也居天下之廣居魯君呼於垤澤之門皆敘居移氣之義為說略不再言養移體者蓋居移氣本是一章正義養移體乃是兼設譬喻之言而注文無所分别使養與居通混體與氣均齊並列於孟子稱羡中抑亦不思之甚也夫氣之為用大矣賢者養之惟恐有餒故孟子見王子之氣得其居處地位之助而有心廣體胖之貌乃稱羡之不為無取若見其身體得所奉養顔貌肌膚有豐潤肥澤之美而咨嗟歎羡此何義也孟子於此本因有所感激而言大抵常人之情隨物輕重位卑則氣卑位盛則氣盛正如奉養薄則體羸弱奉養厚則體豐碩今王子因有是位則有是氣外物所資尚能如此况居天下之廣居其氣又豈止此而已所謂浩然塞乎天地之間者豈不信哉大哉居乎蓋謂此也孟子稱歎之意本不在於養移體也形色天性也惟聖人然後可以踐形注人之有形有色無不各有自然之理所謂天性也踐如踐言之踐蓋衆人有是形而不能盡其理故無以踐其形惟聖人有是形而又能盡其理然後可以踐其形而無歉也注昏不知指形為何等之形色為何等之色何者為自然之理也形有骨肉軀體之形亦有動作容貌之形若指骨肉生成之軀體為說孟子言形色天性也人之軀體果可以為天性乎後又單說踐形於色字再不相干義皆未易可曉形色二字本是一意通取動作容貌而言人與事物相接各有理所當然之容貌隨之居尊貌必莊嚴處卑貌須恭謹弔則有憂戚之容慶則有喜恱之色如此之類皆其性中之善物發於外而見於面施於四體為性之用故言形色天性也然有色厲內荏色取仁而行違之欺雜於其間在小人則無時而無於君子亦有時而有惟聖人之德表裏渾全心與容貌動皆相應有莊嚴形色有莊嚴之心有恭謹之心有恭謹形色至誠於心以實其貌是之所謂踐形也君子之所以教者五有如時雨化之者注時雨及時之雨也草木之生播種封植人力已至而未能自化所少者雨露之滋耳及是時而雨之則其化速矣若孔子之於顔曾是也注文但說雨露草木生化之意而於孔子之教顔曽絶無一事相關言時雨化則云若孔子之於顔曽言成德則云如孔子之於冉閔不知孔子之教顔曽與其教冉閔者果有何異以所教何事為時雨化何事為成德皆無所指之實如謂孔子於冉閔為成德於由賜為達才於樊遲為答問然夫子於由賜非無成德之言於樊遲非無達才之義於冉閔非無答問之辭五者之教自有五般實事但當明言其事不可謾指其人自上而下鼠尾相次而言也如夫子之立之斯立道之斯行綏之斯來動之斯和為中都宰一年四方則之攝行相事三月魯國大治所施普及於衆無有不霑其化者此其如時雨化之之謂也主忠信徙義克己復禮見賢思齊此皆成德之謂也可使治其賦可使為之宰可使與賔客言此皆達才之謂也答其問仁答其問知答其問孝問政問鬼神各隨所問而答之此皆答問之謂也又注文解私淑艾以為人或不能及門受業但聞君子之道於人而竊以善治其身是亦君子教誨之所及豫謂五者之中四者皆言教人惟私淑艾者却是受人之教與上四者意不倫矣前篇豫未得為孔子徒也章與此一節皆以私淑為言彼是孟子自謙之辭此論君子教人之法彼言私淑諸人此言私淑艾二私淑之義本難同說此閒無用謙辭處止當解私淑為自善艾治也義與太甲自怨自艾之艾同躬修善行使人效之以自身之善化導治人故曰私淑艾也南軒曰私淑艾者蓋不在於言辭之間躬行而觀者化焉此說意是夫子溫良恭儉讓所至之處人皆自以國政告之自善其身所過者化蓋亦君子為教之一大端也君子引而不發躍如也注引引弓發發矢也躍如如踴躍而出也君子教人但授之以學之之法不告之以得之之妙如射者之引弓而不發矢然其所不告者已如踴躍而見於前矣吾無隱乎爾我叩其兩端而竭焉聖人之教人如此未嘗見有不肯盡者今言不告以得之之妙果何心哉如云踴躍而出踴躍而見於前不知躍出面前跳躍如此果何物也豫於君子之下引而不發躍如也之七字疑皆羡文去此七字上下通讀是否自見中道而立能者從之注中道而立言其非難非易能者從之言學者當自勉也中道而立解為非難非易能者從之解為學者當自勉皆不可曉孟子之言本以正公孫丑所請之謬中道乃其理所當然不可易之正道也中道而立能者從之蓋言教人之法但當守此正道而立能者從其所教而行其不能者止不可為彼不能而改此正道也未聞以道殉乎人者也注以道從人妾婦之道也此乃襲前篇景春問公孫衍張儀之注文為說從人謂阿諛茍從也以道則不茍從人茍從則非為以道既能以道又苟從人無是理也妾婦之以道從夫乃其理所當然非謂阿諛茍從也孟子本言有道之士無以私殉人之理惟不以其道則殉乎人故曰未聞以道殉乎人者也其進鋭者其退速注進鋭者用心太過其氣易衰故退速注文過字意差用心太過乃思慮過深也思慮過深者遇事必不輕進正與進鋭者意氣相反從鋭字看止可言用心太猛其進鋭者乃是猛鋭輕進之人猛而輕進者其氣易衰所以退速故勇者必以沉勇為貴也此七字與上文意不相類當自為一章首闕孟子曰三字君子之於物也愛之而弗仁於民也仁之而弗親親親而仁民仁民而愛物注物謂禽獸草木愛謂取之有時用之有節程子曰仁推己及人如老吾老以及人之老於民則可於物則不可統而言之則皆仁分而言之則有序注言取之有時用之有節此只是節其費用不使致有匱乏而已以此為愛正與百姓皆以王為愛也之愛相似此本智者吝惜之愛非仁愛之愛與親親仁民之理差矣程子之說解仁民一節其理誠是然於親親愛物皆置而不說亦為未盡所謂親親者子之於父冬溫夏凊昏定晨省至樂根於心而愈色婉容見於外如老萊子衣斑斕之衣仆地作嬰兒啼以恱其親其孝愛發乎天性者如此至於慎終追逺哀慕祭祀死而後已其罔極之思又如此父之於子欲其夀欲其賢欲其富貴顯達鍾愛之深慈育之至亦有不可勝言者此皆親親之道但可施之於親不可施之於民也所謂仁民者所惡與之去之所欲與之聚之足其衣食教以人倫使老幼遂其生上下安其分此皆仁民之道但可施之於民不可施之於物也所謂愛物者如齊宣王憫其牛之觳觫鄭子産樂其魚之得所至於當春草木不忍摧折行視螻蟻不忍踐傷此皆愛物之道是為仁愛之愛與親親仁民之心同是一本然而有此差等不齊是之謂理一而分殊吝惜之愛無與於此親親之道自然不可以及民仁民之道自然不可以及物故曰於民仁之而弗親於物愛之而弗仁也盡心下各欲正己也注民為暴君所虐皆欲仁者來正己之國也經文上句言征之為言正也本說征人者所以正人也注文解此句為皆欲仁者來正己之國却是受征者欲人正己意與經文不同各欲正己也此是自解上句正字之義蓋言王者之征以義正人欲其畏威悔過各正己之不正故曰各欲正己也好名之人能讓千乘之國茍非其人簞食豆羮見於色注好名之人矯情干譽是以能遜千乘之國然若本非能輕富貴之人則於得失之小者反不覺其真情之發見矣惡名無不惡之者善名無不好之者然其矯情飾詐務以欺世違道干譽賣直邀名斯固可鄙果於義利之間明其去就於其不義雖萬鍾之祿不受當其可讓雖千乘之國不吝如此以保令名非不善也古之能讓千乘之國者太伯仲雍伯夷叔齊子臧季札寥寥千古數人而已若皆以為矯情干譽則是萬世無遜讓之賢也況聖人亦嘗言君子疾沒世而名不稱焉君子去仁惡乎成名揚名於後世以顯父母令聞廣譽施於身若此類者聖人豈以名為不美而無欲之之心哉但聲聞過情則恥之耳近世講學皆謂聖人不當有尚名之心凡於經傳見有顧惜名聞之言多為曲說以諱之必使化真為僞而後已儻能各於惡名善名之間私自忖其惡欲之誠亦必覺其在己之善名果無不欲之理也所謂矯情干譽者又當知其情之受矯各有輕重亦有不容其矯者大抵取與之際於物之輕者矯之易物之重者矯之難至其物之尤重有關於富貴之大者雖欲矯之不可得也今言以千乘之國矯情與人恐無此理或曰子噲亦能以燕為讓豈非矯情干譽者乎豫應之曰子噲老耄昏瞶子之以計奪其國謂為讓則非也謂之能讓又非也能讓者讓於可讓之賢者也夫千乘之國亦富貴之極位也一旦自舉以讓賢非有義烈誠肯之心者定不能也注猶以為本非能輕富貴之人此與解仲子不受齊國為小廉之說無異不受齊國者為小廉讓千乘之國者為矯情干譽然則廉讓之士復有何事可為以此垂示後人廉讓之道廢矣豈不有傷風教哉况其人二字本指上文好名之人而言今以為本非能輕富貴之人一其字中間豈有如許之意邪孟子之言本謂果能慕好令名之人雖千乘之國亦能讓之而不吝也茍非有此志操之人雖簞食豆羮之微物將欲與人其鄙吝之心亦必見於顔色也稽大不理於口注理賴也今案漢書無俚方言亦訓賴理俚本是兩字理亦自有義訓不可就俚字之訓解為賴也理整治也舊說云稽大不能治人之口此說為是蓋謂衆口紛亂之言不能整治也山徑之蹊間介然用之而成路注介音戞徑小路也蹊人行處也介然倐然之頃也用由也路大路也人行處與小路不知如何分别蹊與徑相混無别則經文不可解矣又以介音戞介然解為倐然之頃亦甚費力江南廣韻中原韻略南北玉篇介字皆無音戞者惟中原廣韻毛晃韻略兩處有之然亦未嘗訓倐也况山徑之在茅棘中倐然之頃由之恐無便成大路之理蹊與左傳牽牛以蹊人之田之蹊字義同蹊猶踐也閒猶初閒也介如字經文當以山徑之蹊閒介然為句言其山徑之初為踐之之間介然微分於草棘中往來由之而不止遂成大路少閒不用則茅草生而塞之矣山徑喻心茅喻物欲心不修治而物欲之私充塞也君子用其一緩其二用其二而民有殍用其三而父子離注征賦之法嵗有常數然布縷取之於夏粟米取之於秋力役取之於冬當各以其時若併取之則民力有所不堪矣取之各以其時乃古今不易之常法不可謂之為緩也大抵孟子所言非古征賦什一之法蓋指當時之事而言用謂費用重取之也緩謂寬緩輕取之也三者之中其一既重取之餘二者取不盡數此謂用其一而緩其二也若重取其二惟輕其一民已有殍若三者俱重則有父子相離者矣近代以來往往於賦稅正額之外别立名色橫加掊斂如趙光竒對德宗者是也若此類者取雖各以其時民亦豈能免於飢餓流離之患哉唐制每丁嵗役二旬有事而加役者旬有五日免其調三旬則租調俱免此亦用一緩二之意也若是乎從者之廋也注或問之者問於孟子也言子之從者乃匿人之物如此乎匿人之物如此乎乃是窘斥孟子之言直指從者為盜可謂無狀之甚者也既發如此粗戇之言如何便能有殆非也以下禮順之語蓋若者疑而未定之辭若是猶莫是也言莫是從者之所匿也以此為問則其氣本柔和與殆非也以下之言可有相接之理君子之言也不下帶而道存焉注古人視不下帶則帶之上乃目前常見至近之處也舉目前之近事而至理存焉所以為言近而指逺也經文本說言不下帶注文却說視不下帶意不相干雖其目之所視下不過帶却不知口之所言果言何事豈可便以為言近乎又不知舉目前之近事果指何者為近事至理存焉果指何者為至理意皆不眀蓋經典聖人之言垂世以教後人大要只是理㑹方寸之心如存心養性誠意正心其事則仁義禮智孝弟忠信所言皆在一心境中不離胸臆之間故曰君子之言不下帶也此與下文修其身而天下平乃是自解上文言近指逺守約施博兩節之義言不下帶所謂言近也而有修身齊家治國平天下之道存焉所謂指逺也修其一身所謂守約也致天下平所謂施博也人病舍其田而藝人之田注此言不守約而務博施之病也此一節本言不守約之病與博施意不相干藝人之田非博施也經文下兩句自解此文已了所求於人者重此是自解藝人之田一節之意求與有諸己而後求諸人之求字義同求責也分眀說求於人者重何嘗言其有博施之病哉舍其田而藝人之田蓋謂不自治已而專務治人也南軒曰不務其在己者而責諸人此為得之欲得不屑不潔之士而與之是狷也注狂有志者也狷有守者也有志者能進於道有守者不失其身志者心之所之狂與狷各有其志非獨狂者有之也但狂者志不務近而專慕逺為狷者志不慕逺而專務近守此為異耳南軒曰狂者所知進於髙逺狷者所守執之堅介此說為得注文又謂狂者能進於道義亦未安正為嘐嘐然志慕髙逺言不顧行行不掩言不務進道之實故謂之狂也然其所期既已髙逺則外物不能為纍行雖不得其中於道亦有可進之理不可謂之能進也能進於道惟中行之士可以當之若狷者立心堅介外物亦不能為纍與狂者皆能得其道之一邊故孔子不得中行之際均思之也由是言之狷者亦有進道之理豈獨狂者為然不失其身亦非不進於道者能之也四書辨疑卷十三
