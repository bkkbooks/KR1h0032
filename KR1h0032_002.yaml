body:
  text: 欽定四庫全書四書辨疑巻二元陳天祥撰論語學而第一其爲人也孝弟而好犯上者鮮矣不好犯上而好作亂者未之有也註犯上謂干犯在上之人作亂則為悖逆争鬭之事矣干字意輕作亂解為争鬭亦為未盡閭閻之閒語言偶有相犯罵詈争鬬未可便以為作亂也作亂亦豈爭鬬而已孝弟之道僅能息其爭鬬則有子之言亦無意味也蓋犯上謂陵犯在上之人作亂謂悖逆篡弑等事人能以孝弟為心入則善事其父兄出則善事其長上此等人中有好陵犯在上之人者少矣犯上之事既所不為而却好為無父無君悖逆篡弑等事決無如此之人故曰未之有也古之明王教民以孝弟為先孝弟舉則三綱五常之道通而家國天下之風正故其治道相承至於累世數百年不壊非後世所能及也此可見孝弟功用之大有子之言可謂得王道為治之本矣孟子言人人親其親長其長而天下平與此章義同蓋皆示人以治國平天下之要端也巧言令色鮮矣仁註好其言善其色致飾於外務以恱人則人欲肆而本心之德亡矣聖人詞不廹切專言鮮則絶無可知致飾於外言甚有理必有隂機在内而後致飾於外將有陷害使之不為隄防也語意旣已及此其下却但說本心之德亡而不言其内有包藏害物之心所論迂緩不切於事實未能中其巧言令色之正病也本心之德亡固已不仁不仁亦有輕重之分其或穿穴踰牆為姦為盜大而至於弑君篡國豈可但言心德亡而已哉蓋巧言甘美恱人之言令色喜狎恱人之色内懷深險之人外貎往往如此李林甫好以甘言㗖人此巧言也而有隂中傷之之機阱在焉李義府與人語必嬉怡㣲笑此令色也而有狡險忌克之機阱在焉若王莽以謙恭簒漢武后以卑屈禍唐此又言色巧令之尤者也古今天下之人為此巧言令色而無隂險害物之心者蓋鮮矣鮮字乃是普言此等人中有仁者少非謂絶無也爲人謀而不忠乎與朋友交而不信乎註盡己之謂忠以實之謂信只以盡已為忠義有未備天下之事亦有理所當隱不當盡者其父攘羊而子證之此亦盡已之謂聖人未嘗以忠直許之也況盡已以實只是一意忠與信不可辨也忠信理雖相近要之自是兩事曽子分明說在兩處解者不可相混無别也語録曰忠信只是一事又曰做一事說也得做兩事說也得此說意持兩端無真正可憑之理蓋忠當以心言信當以言論心無私隱之謂忠言有準實之謂信此乃忠信之别也行有餘力則以學文註餘力猶言暇日文謂詩書六藝之文註文與所引尹氏洪氏之說大意皆是然行字無明說不知行為行甚也學者多以為行其上文數事弟子之職所當行者亦豈止此數事而已哉南軒曰非謂行此數事有餘力而後學文也言當以是數者為本以其餘力學文也此比註文為詳然所謂以其餘力亦不知其果為何者之餘力也夫弟子當為之事言不能盡舉此數事急先務也行有餘力乃是普言弟子當為之事行之而有餘暇則以學文也伊川曰為弟子之職力有餘則學文此說普言弟子之職可謂得本經之㫖賢賢易色註賢人之賢而易其好色之心好善有誠也此言賢人之賢易其好色之心舊說改易好色之心好賢雖其文辭小有不同然皆以易色為變易好色之心試於易色兩字中觀之易既為變易其下止有色之一字如何做得好色之心今於本文色字之外剏加好之心三字與色字凑合為好色之心一色字寧包許意邪易當讀為去聲易輕易也蓋言賢人之賢輕易女色也夫子屢言吾未見好德如好色者蓋輕賢重色乃古今之通患而其眞能賢人之賢眞能輕易女色者求之於古今天下不多得也以此論之易為輕易則文理不差義亦通貫賢賢易色事父母能竭其力事君能致其身與朋友交言而有信雖曰未學吾必謂之學矣註四者皆人倫之大者而行之必盡其誠學求如是而已故子夏言有能如是之人茍非生質之美必其務學之至雖或以為未嘗為學吾必謂之已學也呉氏曰子夏之言其意善矣然詞氣之間抑揚太過其流之弊將或至於廢學學求如是而已義有未盡君子之道豈惟四者而已哉又言茍非生質之美必其務學之至亦非通論蓋謂質美則不待學而能之此本就呉氏之說證子夏抑揚太過之病也語録云世閒也有資禀髙㑹做許多事底但子夏兩句被他說殺了所以謂其言之有弊註文主意於此可見然經中實無分别生質美與不美之意兩句中亦無說殺此事非學不能之文假若便曽如此說殺本亦無妨大抵生質美資禀髙不待學而自有所能者世固有之至於見賢無媢嫉之心又能尊尚之於色無躭愛之志而能輕易之事父母而能竭盡其力事君而能委致其身與朋友交言不失信必欲全此數事茍非有得於學者定不能也然其務學之至亦須質美者能之茍非生質之美必不能有務學之至須其生有淑質然後能有務學之實有得於學然後能有過人之行故子夏之於能此數者之人不敢以不學待之也亦猶今人偶見一人出言循道理作事有規程必待為有學之人此乃人情事理之常子夏之言誠未見有可指之病而吴氏以爲抑揚太過其流之弊將或至於廢學殊不知如何是抑揚太過如何是將至於廢學讀之不可曉也蓋呉氏誤認雖曰未學以為實未嘗學不學者亦能此事故有將至廢學之論此說未必不出於舊䟽也舊䟽云此論生知美行雖學亦不是過此蓋以曰字為助辭虚字言雖未學亦與學者無異也果如此說下學字上須當更有猶字雖曰未學吾必謂之猶學也經中以此為文則吳說與舊䟽為有所凴而經之本文未嘗如此足以見二說之謬蓋雖曰未學乃是子夏假設能於此者自謂之言非子夏實謂未學也劉正叟曰其人既能此等之事而自言未學吾必謂之已學蓋此等非學不能也此最簡直明白無友不如已者註友以輔仁不如已則無益而有損註文本通因東坡一說致有難明之義東坡云世之陋者樂以不已若者為友則自足而日損故以此戒之如必勝己而後友則勝己者亦不與吾友矣學者往往以此為疑故不得不辨如字不可作勝字說如似也南北廣韻中原韻略如又訓均不如己如己勝己凡三等不如己者下於己者也如己者與己相似均齊者也勝己者上於己者也如己不如己當以德言不可以才能論也己為君子彼未君子彼之所為無己之善是之謂不如己者也己為君子彼亦君子彼之所為善與己均是之謂如己者也如己者德同道合自然相友孟子曰一鄉之善士斯友一鄉之善士一國之善士斯友一國之善士天下之善士斯友天下之善士此皆友其如己者也如己者友之勝於己者己當師之何可望其為友邪如己與勝己者既有分别學者於此可無疑矣父在觀其志父没觀其行註父在子不得自專志則可知父没則其行可見此章論觀人之法須當審其語言次序於志行止可言觀不可直截便下知見二字觀志觀行蓋欲得其為人善惡之實知與見當在觀之之後於得其為人之實處用之為是父在子不得自專故捨其所行而觀其志趣然後為人善惡之實可知父没所行皆出本人故但觀其見行事迹則其為人善惡之實可見禮之用和為貴註禮者天理之節文人事之儀則和者從容不廹之意蓋禮之為體雖嚴而皆出於自然之理故其為用必從容而不廹乃為可貴禮與和各有名物須當質諸行事指其實有之物言之使學者分明見是何物行之有所依準可也今以從容不廹為和在談說固無差忒於踐履未有準程蓋尊卑貴賤各正其分斯謂之禮恭謙遜讓以緩其嚴斯謂之和至於先人後已厚往薄來顔色相迎言語相接使彼此之氣融㑹交通皆其和也試於尋常人事中體認只如升階入門長者居前少者在後此便是禮然須揖讓而後升揖讓而後入此便是和相遇於途少者揖長者答此便是禮相揖之後須有一二語相與問答此便是和事無大小莫不皆然註言禮之體雖嚴而皆出於自然之理故其為用必從容不廹乃為可貴此乃解用為體用之用禮為體和為用也程子言禮勝則離故禮之用和為貴蓋謂禮難獨行必兼用和然後為貴此與註文體用之說不同二說相較程子之說為是信近於義言可復也恭近於禮逺恥辱也註約信而合其宜則言必可踐矣致恭而中其節則能逺恥辱矣必能二字太重結意之語不全冝云約信而合其冝言乃可踐矣不合其宜不可踐也致恭而中其節斯逺恥辱矣不中其節反招辱也因不失其親亦可宗也註因猶依也宗猶主也所依者不失其可親之人亦可以宗而主之矣可以宗而主之蓋謂受依之人可主旣言可親又言可主語意重複矣主與依意亦相犯舊說宗敬也旣能親仁比義不有所失則有知人之鑒故可宗敬也此謂來依之人可敬於本段中大意則順然與上兩節語意不倫又所謂知人之鑒者止是能知他人之善非能自有其善不足以當宗敬之意二說義皆不完王滹南直謂此一節為不可通愚謂因至宗也九字蓋别是一章首闕言者姓名誤與上兩節合而為一故不通也若自作一章義理便圓因猶依也宗猶敬也所依不失可親之人既能取友必端其為人也亦必端矣故亦可以宗敬也觀逺臣以其所主即此意也君子食無求飽居無求安註不求安飽者志有在而不暇及也不暇及者欲心濳伏有所待耳有暇可及必求之矣無求不專求也蓋言志學之士於奉養口體之物無嗜欲茍貪之心敏事愼言正於有道所專務者在此不暇及也子貢曰貧而無諂富而無驕何如子曰可也未若貧而樂富而好禮者也註諂卑屈也驕矜肆也無諂無驕則知自守矣而未能超乎貧富之外也樂則心廣體胖而忘其貧好禮則安處善樂循理亦不自知其富矣貧賤不能移富貴不能滛惟有守者為然能知自守與其僅無驕諂者地位相去蓋已逺矣安處善樂循理亦是安仁境界不專在於好禮也又以超乎貧富之外與無諂無驕為對意亦不的蓋無諂者僅能免其阿媚卑屈而已未至於甘貧樂道而有心廣體胖之安也無驕者僅能除去蹇傲矜肆而已未至於端躬好禮而有崇敬謙光之美也僅可未若之等第如此不可不審辨之也爲政第二爲政以德譬如北辰居其所而衆星共之註為政以德則無為而天下歸之其象如此天下歸之惟王者為然此章非特為王者設也蓋普言為政者道之以德則衆皆歸服如衆星之共北辰也治一邑則一邑之衆歸服治一國則一國之衆歸服治天下則天下之衆歸服為政以德本無定所不可專以天下為言有恥且格註格至也民恥於不善而又有以至於善也一說格正也書曰格其非心註文前說文不可通格字既在一句之末其下别無字義以格為至與全句通讀乃是有恥且至不知至為至甚也今言有以至善善字乃贅文耳後一說以格為正於理為順蓋言既恥所犯又歸於正也吾十有五而志於學三十而立註志乎此則念念在此而為之不厭矣有以自立則守之固而無所事志矣志學乃一章之本立以下皆志學所成之事物也立者心有定止不隨物欲變遷之謂有定然後静安能慮慮然後能得事物之理所以不惑也既於事物不惑由事物之理體諸天命天人之際既已洞達凡有所聞耳皆順熟施之於行事隨其心之所欲自然不踰規矩下學上達其序如此志學於數者之中始終無有閒斷纔有斷止事便無成今謂三十而立則無所事志與其為之不厭之說已自相窒又況立乃以志為本志去則立隨之而仆矣斷無志亡立存之理見有之立猶不能自存又安有進進不已積累以至從心所欲不踰矩者之道哉父母惟其疾之憂註言父母愛子之心無所不至惟恐其有疾病常以爲憂也人子體此而以父母之心為心則凡所以守其身者自不容於不謹矣豈不可以為孝乎舊說人子能使父母不以其陷於不義為憂而獨以其疾病為憂乃可為孝亦通準前說以觀夫子之言教人為孝不言人子用心而言父母之心但云父母惟恐有疾為憂此外寂然更無一語所謂體父母之心為心者終不顯言使問者自為臆度與夫吾無隱乎爾我叩其兩端而竭焉者大不相類上章荅孟懿子之言初亦有隱蓋由見其所問非誠故但荅以無違而已懿子果不再問夫子又恐失其本指所以備告樊遲也初不盡言者有所為而然也終以告樊遲者聖人無隱之本心也非如此說縈囘宛轉終不正言為孝之道也由是觀之惟舊說為是今之孝者是謂能養至於犬馬皆能有養不敬何以别乎註養謂飲食供奉也犬馬待人而食亦若養然言人畜犬馬皆能有以養之若養其親而敬不至則與養犬馬者何異甚言不敬之罪所以深警之也奉養非但飲食而已至於居處衣服僮僕車馬一切所須及有事服勞皆奉養也此章舊說有二一曰犬守禦馬代勞皆能有以養人者但畜獸無知不能生敬於人若供養父母而不敬則何以别於犬馬乎一曰人於犬馬飲之食之資其為人用耳而不敬此犬馬也養父母而不敬何以别於犬馬乎前說以犬馬喻人子後說以犬馬喻父母註文與後說意同以犬馬之無知喻其為子之不敬於義為安以禽獸況父母於義安乎註言深警不敬之罪若只從前說以其為子不敬比為無知之犬馬警之之意亦豈淺邪但以文勢觀之亦惟犬馬養人為順況養字本讀為去聲於義下奉上也今言人養犬馬却是上之畜下下養字當改為上聲二字音義既殊本經之義亂矣惟從舊註前說則無此數病色難註孝子之有深愛者必有和氣有和氣者必有愉色有愉色者必有婉容故事親之際惟色為難耳舊說承順父母顔色為難亦通婉容嫵媚之容如老萊子衣斑斕之衣仆地作嬰兒啼者是也此孝子深愛之心形諸外者之極致也承順之義雖能順從父母顔色而不違其所欲然己之顔色端肅莊嚴亦非事親之道也愉色婉容能兼承順之意承順之意不能兼愉色婉容舊說亦通許之過也有酒食先生饌註食音嗣食飯也饌飲食之也有酒飯先生饌除酒之外於諸品食物中不言其他單以飯言供奉父母與酒配者亦豈飯之一味而已哉酒食之食舊讀與飲之食之之食同音為蝕音雖同義則異矣食之之食口之啗物之謂也不撤薑食不多食者之食皆其類也酒食之食乃其諸品食物之緫名而恥惡衣惡食君賜食者之食亦其類也既以酒食為酒嗣惡衣惡食亦當作惡衣惡嗣君賜食亦當作君賜嗣今也或從新音為嗣或從舊讀為蝕一經之中字同意同而為兩讀既有一是必有一非不容不為辨之也傍考先儒解經之例薦其時食未有以時食為時嗣解為薦其時飯者需于酒食未有以酒食為酒嗣解為需于酒飯者質諸世人通知之事酒食衣食人所常言食字皆從蝕音天下古今無有異也今乃剏音為嗣或嘗以酒嗣之語施之於談話之間聞者往往為之𤼵笑欲使天下之人皆從此說不言酒蝕而言酒嗣不言衣蝕而言衣嗣其亦難矣本分言之止從舊音讀為酒蝕乃為通順視其所以註以為也為善者為君子爲惡者為小人視其所以觀其所由察其所安三句通為觀人一法意脉相次各有界畔說者不可有相踰越也註文於視其所以之下便言為善者為君子為惡者為小人只於此處已見盡為人善惡之實後二句將無所道於所由之下却說事雖為善而意之所從來者有未善焉則亦不得為君子矣此於觀其所由意固不差但前已許為君子者又當置之何地也又解察其所安云安所樂也所由雖善而心所樂者不在於是則亦偽耳此惟辨其所為似善者則可辨其似不善者則安字為無說也南軒曰所安謂心之所主此為得之蓋所以者言其見為之事也所由者言其事迹來歴從由也所安者言其本心所主定止之處也觀人之道必先視其見為之事以審詳之見所為者雖善未可遽以為君子也見所為者雖不善未可遽以為小人也王莽未簒之前恭儉禮讓似其為善若視其為善者便以為君子則王莽為君子矣伊尹初放太甲斥主逐君似其為惡若視其為惡者便以為小人則伊尹為小人矣須更觀其事迹來歴從由循其從由以察本心所主定止之處則王莽心主於簒漢伊尹心主於致君至此則君子小人善惡之實始可判矣至於聽訟決獄剖析是非必須由此乃得其情非惟辨别君子小人而已註又言觀比視為詳察則又加詳焉者是亦不然蓋視與觀用皆在外察則用乃在内所以所由以事言故用視觀取其見也所安以心言故用察取其知也視與觀亦無詳略之别乃變文耳然觀與察亦有時同用顧所言之事意何如耳此又不可不知也先行其言而後從之註周氏曰先行其言者行之於未言之前而後從之者言之於旣行之後先行其言者行其與言相配為文乃是行用其言非謂行在言前也而後從之者言字已属上句本句中無言字之意非謂言在行後也果如周氏之說先行其言若作行先其言是謂行之於未言之前也而後從之若作言後從之是謂言之於既行之後也若無改經就註之理須以先行二字自為一句其言二字分屬下句猶能免其自相窒礙而周氏之文未嘗如此假使委曲遷就改成其文於事理終亦不是大抵人之行事必有言約在前行從其言此正理也以言從行君子不為事既行矣安用更言若每事於旣行之後必須以言從之意亦渉於伐善矣此章本戒子貢輕易其言行猶出也蓋謂言不可輕𤼵必須愼擇既出其言後能從之則為君子矣語言輕發而不能從言不顧行行不副言不得謂之君子矣子貢嘗言我不欲人之加諸我也吾亦欲無加諸人孔子謂其非爾所及正謂見其言之輕𤼵有所未能從者故因其問而戒之也古者言之不出恥躬之不逮也意與此同學而不思則罔思而不學則殆註不求諸心故昏而無得不習其事故危而不安此章學與思相須為義闕一則不可註文上兩句單說不思而遺其學下兩句單說不學而遺其思義皆不完不求諸心故昏而無得此言不思之蔽也思則宜乎無蔽矣下文既思又有危而不安何也不習其事故危而不安此言不學之蔽也學則宜乎無蔽矣上文旣學又有昏而無得何也蓋學謂求問於師思謂研窮其理罔謂虚罔殆謂疲殆學而不思則罔者言其雖亦求問於師不自研窮其理則其見趣罔然所得無實也思而不學則殆者言其雖自研思而不求問則其精神疲殆所致不逺也舊說雖從師學而不尋思其義則罔然無所得也但自尋思而不往從師學終亦不得其義徒使精神疲勞倦殆也明道曰學不思則無得力索而不求問則勞殆二說大意皆是然學而不思不可直以為絶無所得但其在内者所得無實耳思而不學不可直以為徒自勞殆但以疲殆而所致不逺耳知之為知之不知為不知是知也註但所知者則以為知所不知者則以為不知如此則無自欺之蔽亦不害其為知矣况由此而求之又有可知之理註文解知之為知之不知為不知語意皆圎解是知也三字言有未當知謂實知也所知者則以為知所不知者則以為不知如此則無自欺之蔽心公理得知皆實知故曰是知也舉直錯諸枉則民服舉枉錯諸直則民不服註程子曰舉錯得宜則人心服謝氏曰好直而惡枉天下之至情也順之則服逆之則去必然之理也然或無道以照之則以直為枉以枉為直者多矣是以君子大居敬而貴窮理也舊說舉正直之人用之廢置邪枉之人程謝之說枉直二字未明不知以人言邪以事言邪學者多作事之枉直王滹南曰夫子荅樊遲知人之說曰舉直錯諸枉能使枉者直而子夏即荅以舜湯舉伊臯不仁者逺則舊說是矣此論引證甚明今從之季康子問使民敬忠以勸如之何子曰臨之以莊則敬孝慈則忠舉善而教不能則勸註張敬夫曰此皆在我所當為非為欲使民敬忠以勸而為之也然能如是則其應蓋有不期而然者矣此過髙之論無及民及物之念聖人之道本所以維持天下國家事皆在於三綱五常之内無非在我所當為者然亦以成物之實效為期天下國家遵以為治何嘗有不期而然者哉中庸曰誠者非自成己而已也所以成物也此亦可為明證矣況此章明有康子之問求其使民敬忠以勸之道於夫子故夫子對其所問一一指示如此則民敬如此則民忠如此則民勸未有一字意不在於民者而張敬夫目睹如此明文而曰非為欲使民敬忠以勸而為之也誣經甚矣若從此說則愼終追逺君子篤於親故舊不遺亦皆在我所當為不當更言民德歸厚民興於仁則民不偷也此等議論專務髙逺迂誕無實不惟誤己而其誤人敗事之患蓋有不可勝言者此近世學者之深蔽不可不辨書云孝乎惟孝友于兄弟施於有政是亦為政奚其爲爲政註書云孝乎者言書之言孝如此也言君陳能孝於親友于兄弟又能推廣此心以為一家之政則是亦為政矣何必居位乃為為政乎言孝如此未曉其說經中亦無如此二字之意夫子之言首稱書云孝乎蓋孝為一章之主意而註文乃云能孝於親友於兄弟孝與友相對停言與本經之意異矣只惟孝二字亦不可自為一意須當與友于兄弟連作一句通說蓋言惟孝能友于兄弟也不孝於父母而能友于兄弟者未之有也註又言以為一家之政者語脉亦太直截文理有所未備有政二字意固在於一家之政然有有字為之宛轉却非直說一家也施於有政蓋言施於但有政事之處也又所謂何必居位乃為為政者單讀此註語意甚順若與經文字字對說則不能通矣奚其與爲為政之閒本無安下居位二字之處奚其為為政者何者為為政也試通言之書云孝乎者夫子反問或人也云猶言也蓋問或人汝聞書之言孝乎惟孝能友于兄弟推此施於但有政事之處如齊一家亦是為政復謂何者為為政乎殷因於夏禮所損益可知也周因於殷禮所損益可知也其或繼周者雖百世可知也註馬氏曰所因謂三綱五常所捐益謂文質三統三綱五常文質三統註文言之備矣文多今不具載文質之說以為夏尚忠商尚質周尚文叅考舊註初無此說所因謂三綱五常所損益謂文質三統馬氏本文只此而已䟽云夏尚文殷則損文而益質又曰王者必一質一文質法天文法地而已亦不言其有尚忠者董仲舒云夏尚忠殷尚敬周尚文註文與此亦不盡同當是别有所據然其義實不通文與質固有分言之理忠與文質何可分邪況忠乃人道之切務天下國家不可須臾離也豈有損去不用者哉今從註文推其三代損益之義夏則尚忠至殷則損忠而益質周又損質而益文由是言之惟夏尚忠殷與周皆不尚也為臣者以不忠事君為子者以不忠事父兄弟夫婦朋友之閒皆不以忠誠相待而以詐偽相欺欲其久安而不亂不可得也殷周之治豈容如此之盛厯年豈容如此之逺哉且文質損益假如實曽如此輪流而繼周者不復曽有三統互用亦惟至秦而止皆非百世可知之道况夫子於三代正朔惟許行夏之時不應却說三統為百世可知也尋繹經文因與損益之閒實亦無該三綱五常文質三統之處自馬融引此為說襲傳既久今又因之而尚忠一說又出馬融所引之外學者不得無惑也子張問十世可知也初不知果問何事但夫子所荅乃是禮之損益之道子張之問疑有闕文大抵此章止是言禮蓋禮之大體萬世不改所損益者禮之時宜厯代相承載在典籍故雖百世可知也註又云其所損益不過文章制度小過不及之閒此說却依本分然與文質三統之說豈不自相乖戾邪胡氏曰天叙天秩人所其由禮之本也商不能改乎夏周不能改乎商天地之常經也若乃制度文為或太過則當損或不及則當益益之損之與時宜之而所因者不壊是古今之通義也南軒曰三王之禮各因世而損益之二論意同皆無三綱五常文質三統之說足以正馬氏之誤王滹南曰孔子言三代相因損益可知者此專指禮云爾馬融以所因為三綱五常所損益為文質三統殆是妄說此亦眞識之論皆有益於後學者也四書辨疑卷二
