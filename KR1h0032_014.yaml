body:
  text: 欽定四庫全書四書辨疑卷十四元陳天祥撰中庸注中者不偏不倚無過不及之名程子以不偏為中吕氏以無過不及為中二說之意本同注文通言之是也或問中却分為兩意說不偏在未發之前說無過不及為見諸行事以為方其未發未有無過不及之可名抑不思人之氣禀鮮有得中者過於剛則仁有不及過於柔則義有不及氣太嚴者必少恩心太慈者必少斷過與不及心實主之先有諸內然後見諸行事也若其氣禀無有所偏則於未發之前亦有無過不及之可名何不可之有哉至於不偏不倚亦不可専說在未發之前若於行事得中亦可以不偏名之也信如或問之說則程子止是言未發之中未嘗言行事之中也吕氏止是言行事之中未嘗言未發之中也有上截者無下截有下截者無上截不知程吕之意何故如此或問又以不偏為心之體地之中無過不及為理之當事之中亦不知心之體與理之當如何分地之中與事之中如何辨又云二義雖殊而實相為體用語録曰未發之中是體已發之中是用亦皆過論凡言體用者乃是一物而有兩分之名如根梢枝葉相須為義耳若以中和言之中為體和為用乃可說也單獨一中而有體用之分無是理也夫中之在心物來則應猶鏡中之眀刃中之利也如以未照之明為體已照之明為用未割之利為體已割之利為用可乎未照之明與已照之眀只是一箇眀未割之利與已割之利只是一箇利未發之中與已發之中亦只是一箇中不偏與無過不及亦只是一箇意言不偏則無過不及在其中言無過不及則不偏亦在其中只注文當為定說或問之說不講可也天命之謂性率性之謂道注命猶令也性即理也天以隂陽五行化生萬物氣以成形而理亦賦焉猶命令也於是人物之生因各得其所賦之理以為健順五常之德所謂性也率循也道猶路也人物各循其性之自然則其日用事物之間莫不各有當行之路是則所謂道也孔子言性相近也孟子道性善本皆専論人之性未嘗普該萬物之性也子思說天命之謂性率性之謂道亦是専以人性人道為言注文乃以萬物與人一混言之誤矣所謂人物之生各得所賦之理以為健順五常之德者五德俱全復加健順惟人有能之之理彼禽獸昆蟲等物何嘗能有如許之德哉天地之閒知覺運動之物其性於五常之中固有頗能近之者或近於仁或近於義雖於天理中粗有通處亦不可便與人同一槩言有健順五常之德也注文又見率性一節於萬物之性難以盡循故再指物為日用之物亦不可通物無皆能自為人用之理語録又以馬馳牛耕佐注文為說蓋亦未之思也馬須用銜牛須穿鼻既制奔突又加鞭箠然後始可為用亦猶戕賊杞柳以為杯棬非謂循其性之自然也况天下萬物知不能盡豈皆得在日用之閒乎凡彼不為人用之物其性尤有不可循者如虎狼之暴蛇蠍之狠皆其本然之性也若循此性以為道果何道邪只如荆棘稂莠生於道路壠畝之間亦無任其叢茂不除之理語録曰人與物之性皆同循人之性則為人之道循馬牛之性則為馬牛之道此話益難憑準既言人物性同又郤自有人性物性人道物道之分何也循馬牛之性則為馬牛之道若循虎狼之性則亦為虎狼之道循蛇蠍之性則亦為蛇蠍之道循荆棘稂莠之性則亦為荆棘稂莠之道果修此道以為教使天下後世遵之而行將見獸蹄鳥跡之道復交於中國區宇永為鴻荒聖人之教寧有是哉若以注文語録之說通解經文則人與一切昆蟲禽獸皆當各循其性以為道昆蟲禽獸之道皆可修之以為教不知禽獸之道如何修之以為教如何教人於禽獸之道如何不可須臾離皆不可曉人物之性不同孟子已有明論集注亦曰以氣言之則知覺運動人與物若不異也以理言之則仁義禮智之禀豈物之所得而全哉此人之性所以無有不善而為萬物之靈也其說當矣以彼證此是非了然而纂疏又引真氏之說曰朱子於告子生之謂性章深言人物之異而於此章乃兼人物而言生之謂性以氣言者也天命之謂性以理言者也以氣言之則人物所禀之不同以理言之則天之所命一而已矣此章兼人物而言尚何疑哉觀此一說人物不同者既以為是人物同者亦以為是阿蔽甚矣然集注以氣言者為同真氏反以為異集注以理言者為異真氏反以為同真氏本欲曲合文公之意而不自覺如此之差也嗚呼人性與物性不同此特眼前事甚不難見世之曲說何其多也惻隱羞惡辭讓是非之心人皆有之未聞牛羊犬豕皆能與人同有也只解性為人之性自無許多節病天命謂性以理言也理為衆善之宗三綱五常皆所從出天命人由此理而生具五常之善以為性故曰天命之謂性物欲非性也人惟循此本然之性各就人倫職分之當然而行君仁臣敬父慈子孝兄友弟順夫義婦節朋友有信是則所謂道也申眀此道使人行之是則所謂教也率性謂循自已本然之性非循他物之性也道亦自已當行之道非他物各有之道也率性為道眀德之事也修道為教新民之事也道也者不可須臾離也可離非道也注道者日用事物當行之理皆性之德而具於心無物不有無時不然所以不可須臾離可離皆外物矣道與理當有分别不可混而為一也道者事物相接往來交通之道路也理猶事物之脉理文理而為道之準則也道則依循此理而行理以貫道道必循理此其道理之分也今注文直截解道為理則理亦是道道亦是理理與道既已不分道果何道不可得知所謂性之德而具於心者此惟言理則可言道則不可又言無物不有無時不然并下文外物云者皆不見其道之不可離與可離之的切實理而或問與纂疏所引諸人之說旁牽曲衍不勝其繁大槩不過専以扶同注文而已皆不必辨蓋道謂三綱五常之道君子之所以正心修身齊家理世皆此道也有身而無此道則心不正行不修其身必辱有家而無此道則父不父子不子其家必壞有國而無此道則君不君臣不臣其國必亂此其所以不可須臾離之也若異教異術出天理人倫之外與三綱五常不相干涉有則於世無所益無則於人無所損凡其如此不急於用人皆可得而離之者俱不可以為道故曰可離非道也是故君子戒慎乎其所不睹恐懼乎其所不聞注君子之心常存敬畏雖不見聞亦不敢忽所以存天理之本然而不使離於須臾之頃也此一節所以申眀不可須臾離道之意與大學第六傳小人閒居為不善之一節意正相對皆是警戒後人之言解者不可虛務髙逺須要分眀說出必能使人恐懼之實事義乃可通今注文只說存天理之本然誠未見其警動人心使之知恐知懼之實理所在又其雖不見聞一句或謂人不見聞或謂已不見聞意亦不眀或問中說其所不睹不聞為己所不睹不聞說下句獨字為人所不睹不聞然經中實無分别人己之文自戒慎乎其所不睹至君子慎其獨也五句相連只是一意慎獨一句乃其上四句之結語豈容有如此之分邪或問執定分為兩說自問自答幾二千言輯略語録又數千言皆不見有公平之論盡欲辨之則不可勝辨今但直解本經而已戒慎乎其所不睹恐懼乎其所不聞本說人所不睹不聞蓋人之私心於四通八達衆人耳目交㑹之間不須隄防自然斂束不敢恣縱及在隱暗之中獨居之處則坦然放肆以為雖有不善他人不知也然誠於中則形於外人之視已如見其肺肝自古以來大姦大巧暗昧中所為之惡未聞曽有人不知者故君子之於人所不睹不聞之際益加戒慎恐懼所以間其邪惡之心不使得為邪惡之事也莫見乎隱莫顯乎微故君子慎其獨也注隱暗處也微細事也獨者人所不知而已獨知之地也言幽暗之中微細之事跡雖未形而幾則已動人雖未知而已獨知之則是天下之事無有著見明顯過於此者幽暗之中微細之事跡猶未形人猶未知但以己獨知之便謂天下之事無有著見眀顯過於此者假如大惡之事跡已發見非獨已知人共知之昭昭然衆目所視衆手所指者反不謂之著見不謂之明顯乎或問再廣注文之意為說迂曲尤多中間却有一說云又況既有是心藏伏之久則其見於聲音容貌之間發於行事施為之實必有暴著而不可掩者又不止於念慮之間而已也此亦見前說未安復為此說也然猶未免有兩圖之意不能全是微字本亦訓隱經文以隱為見之對以微為顯之對則隱與微皆取幽暗之意而言兩句只是一意注文疑其言有重復故解微為細事以致牽强不通蓋不察顯乃見之變文微亦隱之變文也此與有若無實若虛危而不持顛而不扶事死如事生事亡如事存之語句無異皆其變文重言之也何獨疑於此哉大抵人之處身行事在青天白日衆人之中雖小人亦知所慎在幽暗偏僻獨居之處雖君子亦有所忽故私邪之心每由此生私邪之事每由此成古今天下著見眀顯之惡未有不從幽暗隱微之中而起者無惡不自隱而見故曰莫見乎隱無惡不自微而顯故曰莫顯乎微君子審其如此故雖暗室獨居暗地獨行尤須密加嚴慎也致中和天地位焉萬物育焉注致推而極之也位者安其所也育者遂其生也自戒懼而約之以至於至靜之中無少偏倚而其守不失則極其中而天地位矣自謹獨而精之以至於應物之處無少差謬而無適不然則極其和而萬物育矣蓋天地萬物本吾一體吾之心正則天地之心亦正矣吾之氣順則天地之氣亦順矣故其效驗至於如此注言自戒懼而約之以至極其中而天地位矣自謹獨而精之以至極其和而萬物育矣推詳此說天下人中但有一人於不睹不聞之處戒懼以謹其獨便能使天地各安其所萬物各遂其生未之聞也又云蓋天地萬物本吾一體吾之心正則天地之心亦正吾之氣順則天地之氣亦順義愈難通天地萬物與吾同在隂陽大氣中謂同一氣則可謂為一體則不可天下萬物何所不有豈能同為一體哉天地之氣固有順不順時天地之心未嘗不正也豈待吾之心正然後天心地心始正哉天地之氣有時而不順者蓋由國家失德則有恆雨恆暘恆燠恆寒恆風之應此皆天地不順之氣也普天之下惟吾一身之氣順便能使此氣皆順久雨則能使之晴久旱則能使之雨斷無此理或問亦曰三辰失行山崩川竭則不必天翻地覆然後為不位矣兵亂凶荒胎殰卵殈則不必人物消盡然後為不育矣若此者豈非不中不和之所致又安可誣哉彼達而在上者既有以病之則夫災異之變又豈窮而在下者所能救也哉此說大意却是然與吾之氣順則天地之氣亦順之說豈不自相矛盾邪繼此復改一說云但能致中和於一身則天下雖亂而吾之天地萬物不害其為安泰此又有涉荒誕實流入於異端矣於目前見有之天地萬物之外又别有吾身之天地萬物不可曉也孟子言萬物備於我蓋謂萬物之理具於吾心非謂天地之外别有天地萬物之外别有萬物在吾一身之中也推原或問本意蓋亦只是說天下雖亂而已之心能獨安也且天下遭亂生民之命朝不保夕已在其間心獨安之可謂仁乎經文自喜怒哀樂至萬物育焉此一段與上文本難通說當自為一章喜怒哀樂之未發謂之中發而皆中節謂之和此就各人之一身而言中也者天下之大本也和也者天下之達道也此義散開在於天下矣繼言致中和天地位焉萬物育焉此乃專言天下之中和解者不可只就一人之身為說也然其致此者惟人君能之如堯之親睦九族平章百姓協和萬邦此其致天下中和之道也至黎民於變時雍則天下之中和成矣民人和則天地之和應而無三辰失行山崩川竭災異之變天氣和於上地氣和於下此之謂天地位也天地位則風雨寒暑各以其時人與物皆康寧蕃息此之謂萬物育也四書辨疑卷十四
