body:
  text: 欽定四庫全書四書辨疑卷四元陳天祥撰論語公冶長第五子謂南容邦有道不廢邦無道免於刑戮以其兄之子妻之注不廢言必見用也以其謹於言行故能見用於治朝免禍於亂世也此蓋言夫子之於南容為其有此二事以其兄之子妻之先進篇却說南容三復白圭孔子以其兄之子妻之二者不知果孰為是注言謹於言行此是就三復白圭之意為說三復白圭章注云有意於慎言此邦有道所以不廢邦無道所以免禍却是就此章之意為說蓋亦見兩章之言不同故互為遷就而欲通為一意也然此章本無該說謹於言行之意三復白圭章亦無不廢免禍之文況其方才有意於慎言亦未能必使有道之邦不廢於己而已必能見用也夫子亦無止為有意愼言便以兄子妻之之理王滹南曰凡為女擇配取其相當非止一端未可以此等斷聖人之意也弟子徒謂聖人妻人必不茍然故於諸處認之而附㑹耳此論推見事理之源足以破古今之疑且夫子言容邦有道不廢邦無道免於刑戮實無可指之迹止是大槩忖度謂南容遇有如此之時必能如此之事此乃議親之際意已允從因而稱道許可之辭非為真有如此事迹而妻之也上章稱公冶長之言亦然女器也注子貢雖未至於不器其亦器之貴者歟注文蓋反君子不器為說謂子貢止堪一器之用也聖人之意恐不如此子貢問賜也何如夫子答以女器也本是稱美子貢為成才之人非謂子貢未至於不器也或曰雍也仁而不佞子曰焉用佞禦人以口給屢憎於人不知其仁焉用佞注佞口才也我雖未知仲弓之仁然其不佞乃所以為賢不足以為病也小人之利口為佞利口即口才也惡利口之覆邦家者惡其佞也不佞者僅能不以利口禦人才免人所憎惡而已驟稱為賢斯亦過矣況仲弓德行與顔閔相亞夫子嘗稱騂且角可使南面其所許者蓋不淺矣答或人之言縱不全許為仁人亦不至於絶言不知有仁也不知其仁乃是不知佞者有仁非謂不知仲弓也蓋或人但知口才便利為美不知其為仁人君子之所惡仁而不佞之問其問甚騃夫子聞其言而鄙之答之之辭首言焉用佞鄙之之意深矣蓋言佞是何物仁者焉用有此佞乎彼佞者之所為專以口才捷給禦敵於人以求勝屢以取憎於人如此之人我不知其有仁也蓋仁則不容有佞佞則不容有仁再言焉用佞深警或人之非也無所取材注材與裁同程子曰浮海之歎傷天下之無賢君也子路勇於義故謂其能從己皆假設之言耳子路以為實然而喜夫子之與己故夫子美其勇而譏其不能裁度事理以適於義也乘桴浮于海固為假設之言從我者其由與却是實稱子路之意非戲弄也子路之喜喜為夫子所知非為不能裁度也浮海之歎雖我輩聞之亦能知其意在傷時必無實往之理豈有聖門髙第弟子於此反無裁度懵然不知者哉無所取材之一句義本難解古注解材為桴材又解為哉與注文意皆牽强姑置之可也賜也何敢望回回也聞一以知十賜也聞一以知二注胡氏曰子貢平日以已方回見其不可企及故喻之如此經中雖嘗有子貢方人之語當時果曽比方何人不可得知今言平日方回豈有據邪縱或有據猶當慎取夫顔子亞聖也人不自量以己方之雖至愚之人亦必不為而謂子貢為之乎向者以己方回直與之均齊今乃以知十知二為比何其升降陡驟如此邪方回之說蓋未敢信我不欲人之加諸我也吾亦欲無加諸人注此仁者之事不待勉强故夫子以為非子貢所及程子曰我不欲人之加諸我吾亦欲無加諸人仁也施諸己而不願亦勿施於人恕也恕則子貢或能勉之仁則非所及矣注又云無者自然而然勿者禁止之謂此所以為仁恕之别我不欲人之加諸我吾亦欲無加諸人正與施諸己而不願亦勿施於人之義同而程子分之為二一以為仁一以為恕初不見有可分之理亦不見其所分之由繼言恕則子貢或能勉之仁則非所及矣意謂己所不欲勿施於人夫子嘗許子貢能行此則以為難及而不許彼既為恕此必謂仁分之之由實在於此蓋不察彼時之言因其問也子貢問有一言而可以終身行之者乎夫子答以己所不欲勿施於人蓋以此言為一言終身可行之言非謂恕為子貢能行也夫子之於門人非惟不輕許仁恕亦未嘗輕試也試以己所不欲勿施於人就其人心與物交處觀之遇其物之輕處安而行之亦有能者至於有關萬鍾之多一國天下之重雖勉而行之千萬人中未必能有一二也諸葛孔明可謂閒世之大賢先主亦三國之賢君也居常共事皆能推己所惡不以及人及為取蜀以復漢業之大計所牽孔明運籌先主致力加兵劉璋攻奪益州不復能有推己勿施之念蓋事勢使然非得己也為恕之難於此可見由是言之夫子之不許子貢豈止於仁雖恕亦冝然也注亦祖襲程子之說不審真是真非直言此仁者之事過矣又言無者自然而然勿者禁止之謂此所以為仁恕之别此更迂逺之甚仁自仁恕自恕無與勿之兩字豈能有所變易哉果若言無者為仁言勿者為恕夫子答顔淵非禮勿視非禮勿聽非禮勿言非禮勿動此亦禁止之謂然皆為仁此何說也程子又嘗言以己及物仁也推己及物恕也及其解孟子於物愛之而弗仁章却說推己及人仁也注文解以德行仁者王亦說自吾之得於心者推之無適而非仁也此皆以推己及物為仁所論本出於無心却能合於自然之理以己推己本無分别恕雖推己及物仁則亦有推己及物之道但所推之事物不同此其為仁恕之别也推己不欲勿施於人謂之恕如所惡於上毋以使下所惡於下毋以事上者是也推己良欲務施於人謂之仁如老吾老以及人之老幼吾幼以及人之幼者是也恕者止能不以不善及人未至以善及人也以善及人然後為仁吾亦欲無加諸人止是不加不善於人而已未能至於以善及人但可為恕不可為仁也子路有聞未之能行唯恐有聞注范氏曰子路聞善勇於必行門人自以為弗及故著之若子路可謂能用其勇矣論語一書無非善言善行皆其門人所記何必更論及與弗及哉況經中亦無門人自謂弗及之文范氏之說當刪此一節但言子路聞善勇於必行可謂能用其勇矣如此則意圓無病季文子三思而後行子聞之曰再斯可矣注三去聲若使晉求遭喪之禮以行亦其一事也程子曰至於再則已審三則私意起而反惑矣故夫子譏之王滹南駁喪禮之說曰文子至晉果遭之則正得思之力也何過之有又駮程子之說曰思至于三何遽為私意邪又曰事有不必再思者亦有不止於三思者初無定論也其說大意皆當然三字之音義未有明辨三作平聲乃是數目定名若作去聲只是再三再四頻繁之意世俗語話中常有之如云一日三場如此一日三衙如此者是也三思之三既為去聲則文子之三思不止三次而已也夫子之言止是言文子過思之蔽非謂天下之事皆當止於再思不可至於三次也其愚不可及也注成公無道至於失國而武子周旋其閒盡心竭力不避艱險凡其所處皆智巧之士所深避而不肯為者而卒能保其身以濟其君此其愚之不可及也衛成公之過惡不多見也惟有信讒殺元咺子角一事而已既而以叔武尸枕其股而哭之立使追殺歂犬則是知己之過能自改悔未可直以為昏虐無道之君也至於失國出居於外由其不假道與晉也晉以私忿必欲致之於死至使醫衍鴆之無道在晉不在成公武子當此之際自無棄而去之之理周旋其間盡心竭力不避艱險以濟其君此正武子所當為者今反謂其為愚推窮此說令人昏悶果謂其為佯愚也却有盡心竭力之勤若謂其為真愚也復有保身濟君之美此誠不可曉也邦無道則愚本與邦無道言孫邦無道卷而懷之之意同於武子行事中必有所指能自韜晦之事故歎其人所不能及也魯文公賦湛露彤弓武子佯為不知此亦自晦之一事杜預以為愚不可及亦有取也程子曰邦無道能沈晦免患此說為是吾黨之小子狂簡斐然成章不知所以裁之注夫子至是而知其終不用也於是始欲成就後學以傳道於來世不得中行之士而思其次以為狂士志意髙逺猶或可與進於道但恐其過中失正而或陷於異端耳故欲歸而裁之也狂士志意嘐嘐然遼逺髙大顧雖不得其中若聖人與居亦可以近於道矣然其言不顧行行不掩言欲與成章傳道法則後世則不可也夫子欲成就後學以傳道於來世何用思其狂士乎不得中行之士而思其次此本孟子答萬章之語注文變其文而用之也萬章問曰孔子在陳曰盍歸乎來吾黨之士狂簡進取不忘其初孔子在陳何思魯之狂士孟子答曰孔子不得中道而與之必也狂狷乎狂者進取狷者有所不為也孔子豈不欲中道哉不可必得故思其次蓋萬章所問本無斐然成章不知所以裁之之語止以孔子思狂士為問孟子乃是就其所問以答之也萬章之問與此經文既已不同孟子之答萬章者亦不可施之於此也不得中行而與之必也狂狷乎此乃思其狂狷也吾黨之小子狂簡斐然成章不知所以裁之却是抑制狂者不令妄有述作之意非思之也說者冝云夫子知其終不用也於是特欲成就後學以傳道於來世慮其門人狂而志大簡而踈略徒以斐然之文而成章篇違理害道不知裁正恐有誤於後人故欲歸而裁正之也思狂士一節不必取願無伐善無施勞注伐誇也善謂有能施亦張大之意勞謂有功易曰勞而不伐是也或曰勞勞事也勞事非己所欲故亦不欲施之於人亦通伐善之善乃其凡己所長之總稱伐忠伐直伐力伐功伐才伐藝通謂之伐善今乃單指善為能又解施勞為伐功恐皆未當既言無伐善又言無伐功止是不伐之一事分之為二顔子之志亦豈别無可道邪或曰之說於義為順但說得勞字事輕亦不見其志之逺大也蓋無施勞者不以勞苦之事加於民也夫勞民不恤乃古今之通患桀紂幽厲之事且置勿論請以近代易知者言之秦始皇隋焬帝之世勞民之事無所不至四民廢業人不聊生死者相枕藉於道路於是盜賊羣起天下大亂生民荼毒何可勝言由其施勞於民之所致也顏子之言於世厚矣願無施勞安人之志也既無伐善又無施勞內以修己外以安人成己成物之道不偏廢也若兩句之意皆為不伐其志止於成己而無及物之道既偏且隘不足以為顏子之志只從或曰之說深造以觀其義則亞聖之資於此可見老者安之朋友信之少者懷之注老者養之以安朋友與之以信少者懷之以恩一說安之安我也信之信我也懷之懷我也亦通養之以安恩已在其中矣不可再言懷之以恩也況恩冝普遍非可專施於少者老者亦當及之也前說全言夫子作為後說全言人從夫子之化後一說既無前說數者之病又其道理自然氣象廣大與近者恱逺者來綏之斯來動之斯和義同後說為是雍也第六回也其心三月不違仁其餘則日月至焉而已矣注程子曰三月天道小變之節言其久也過此則聖人矣三月之下既有日月至焉之餘人三月之上又有過此之聖人顏子於仁必須九十日一次違之也過此至九十一二日便為聖人恐無此理王滹南曰豈有恰限三月輒一次違之之理若三月之後不復可保何足為顏子乎東坡云夫子默而察之閲三月之久而造次顚沛無一不出於仁知其終身弗畔也王滹南謂此說為是今從之伯牛有疾子問之自牖執其手注疾先儒以為癩疾也牖南牖也禮病者居北牖下君視之則遷於南牖下使君得以南靣視已時伯牛家以此禮尊孔子孔子不敢當故不入其室而自牖執其手蓋與之永訣也注文既言當時伯牛家曽以此禮尊孔子必有所據今不可考然以人情推之伯牛純正之士必不如此輕率妄使家人僭以人君之禮過尊孔子也縱使有之孔子必正其失使之更改其位亦不難為心知其非隱而不言但不入其室師弟之閒豈冝如此子路使門人為臣夫子固已明其為詐切責之矣況夫子未嘗為君而伯牛輒以人君之禮尊之其詐不又甚歟然夫子於子路則諄諄然以正其非於伯牛則略無一言以正之何也伯牛見夫子不敢當而不入亦竟不改其位儘從夫子在外但自牖中出其手與之永訣又無此理舊說牛有惡疾不欲見人故孔子從牖執其手也注言先儒以為癩疾者蓋謂此也向亦屢嘗見有此疾者往往不欲與人相近於其所當尊敬者尤欲避之蓋自慚其醜惡腥穢恐為其所惡之也由此推之只舊注牛以惡疾不欲見人之說為是不有祝鮀之佞而有宋朝之美難乎免於今之世矣注鮀衛大夫有口才朝宋公子有美色言衰世好諛恱色非此難免蓋傷之也衰世恱色乃是恱婦人之色宋朝美色意不相關又非此難免一句意亦不明不知免為免甚也若言免己之患而為佞為淫適所以致患未聞可以免患也蓋夫子疾衰世之風習口舌之佞而為諂諛飾容貌之美以為淫亂不為祝鮀之佞必為宋朝之美不為宋朝之美必為祝鮀之佞二者為世之患不能免除故曰難乎免於今之世矣也人之生也直罔之生也幸而免注程子曰生理本直罔不直也而亦生者幸而免耳程子之說語意不明不知生為如何生幸而免耳亦不知幸免何事也蓋生者全其生理善終之謂也人之不遭橫夭得全生理壽盡天年而善終者由其不為非道之事所行者直而無罔曲故也罔曲之人亦得全其生理不遭橫夭以終其身此特幸而免耳幸免者免其橫夭之死也夫子所言乃其天理之常人事大槩不出於此至於君子不幸偶值迍命者閒亦有之然不可以常理論也觚不觚觚哉觚哉注觚稜也或曰酒器或曰木簡皆器之有稜者也不觚者蓋當時失其制而不為稜也觚哉觚哉言不得為觚也有制之世器皆朴素無制之世器多纎巧器有常制適用而已惟其失於常制故雕鐫刻鏤無所不至而於有稜之器豈有捨其稜而不為者哉且如木簡失其制而不為稜果何物也又以語法律之觚字若作一器為說文猶可讀單讀為稜則鄙陋之甚不成語矣舊說觚酒器容二升然其說曰若用之失禮則不成觚以諭為政不得其道則不成此亦不通用之失理罪在用者非觚之罪也何云不成觚哉王滹南謂此章不可解冝從此論闕之可也可謂仁之方也已注方術也近取諸身以已所欲譬之他人知其所欲亦猶是也然後推其所欲以及於人則恕之事而仁之術也世閒事物皆有定名無無名之事無無名之物今以恕之事仁之術合而為一果何事邪果何物邪果當名之為恕乎果當名之為仁乎聖人之言本所以明道悟迷事事物物各有分判誠無一言中該羅兩意三意之理恕與仁自有分明界畔已所不欲勿施於人謂之恕已之良欲務施於人謂之仁恕止於不以不善及人未至於以善及人也以善及人斯為仁矣已欲立而立人已欲達而達人其心正在推已良欲務施於人與其止於不以不善及人者境界不同方謂方分境界也說者冝曰近取諸身以已良欲譬之他人知其所欲亦猶是也然後推其已之良欲以及於人已既欲立而亦欲立人已既欲達而亦欲達人此為以善及人之心可謂仁之方分也已仁之方與孟子言仁之端意正相類述而第七述而不作信而好古竊比於我老彭注述傳舊而已作則創始也故作非聖人不能而述則賢者可及老彭商賢大夫孔子刪詩書定禮樂贊周易修春秋皆傳先王之舊而未嘗有所作也然當時作者略備夫子蓋集羣聖之大成而折衷之其事雖述而功則倍於作者矣注言述傳舊而已作則創始也作非聖人不能述則賢者可及此數語視作為重而已二字視述甚輕繼言孔子傳舊未嘗有所作則是孔子止能述而不能作但可為賢人不可為聖人也豈不悖哉若注解經傳循其本文為之訓說謂此為傳舊而已可也至於刪詩書定禮樂贊周易修春秋豈但傳舊而已哉此正可謂非聖人不能未聞賢者可及也上古聖人立法垂世皆是述天理之所固有未嘗違理自作也先世聖人創述於前異世聖人繼述於後不可以先者為聖人之作後者為賢人之述也只如易之一書伏羲則為創述之聖人文王孔子則為繼述之聖人亦無聖作賢述之分繼述與創述所循之理一也若不循此理自生枝派别為創始是乃異端之作聖人固不為也夫子自謂述而不作繼之以信而好古此作字正為異端妄作非謂聖人之創作也蓋述謂明其理之所有作謂創其理之所無循天人之際自然之理以明夫三綱五常固有之道若六經之言者通謂之述出天理所有人倫綱常之外若楊墨之言者通謂之作蓋有不知而作之者我無是也與此章義同默而識之學而不厭誨人不倦何有於我哉注何有於我言何者能有於我也三者已非聖人極至而猶不敢當則謙而又謙之辭也以此章為夫子之謙義無可取謙其學而不厭以為已所不能則是自謂厭於學矣謙其誨人不倦以為已所不能則是自謂倦於誨矣既言厭學又言倦誨則是聖人不以勉進後學為心而無憂世之念也下章却便說學之不講是吾憂也語意翻覆何其如此之速邪夫子屢曽自言好古敏以求之者不如丘之好學也我叩其兩端而竭焉吾無隱乎爾若此類者皆以學與誨為己任未嘗謙而不居也况又有若聖與仁章抑為之不厭誨人不倦則可謂云爾已矣之一段足為明證彼以學誨為己之所有此以學誨為己之所無聖人之言必不自相乖戾以至於此於猶如也蓋言能此三事何有如我者哉此與不如丘之好學也意最相類皆所以勉人進學也伊川曰何有於我哉勉學者當如是也此說意是富而可求也雖執鞭之士吾亦為之如不可求從吾所好注設言富若可求則身雖為賤役亦所不辭然有命焉非求之可得則安於義理而已矣何必徒取辱哉此說却是本有不顧義理求富之心但為命運所制不得遂其所求然後安於義理也聖人之心恐不如此蘇氏曰聖人未嘗有意於求富也豈問其可不可哉此亦過髙之論不近人情富與貴人皆欲之聖人但無固求之意正在論其可與不可擇而處之也不義而富且貴君子惡之非惡富貴也惡其取之不以其道也古之所謂富貴者祿與位而已貴以位言富以祿言富而可求以祿言也執鞭諭下位也蓋言君子出處當審度事宜穀祿之富於已合義雖其職位卑下亦必為之故夫子之於乘田委吏亦所不鄙茍不合義雖其爵位髙大亦必不為故夫子之於季孟之閒亦所不顧也伊川曰富貴人之所欲也茍於義可求雖屈已可也如義不可求寧貧賤以守其志也子在齊聞韶三月不知肉味注史記三月上有學之二字不知肉味蓋一心於是而不及於他也雖曰學之一心于是至於食肉三月而不知其味此甚不近人情南軒曰三月之久猶忘味焉則幾於不化矣故程子以三月為音字謂聖人之心不如是其固也此說正三月之誤是也然以三月二字併一音字却為牽强聞韶下亦不須更有音字王滹南曰或言月字為日字之誤皆不可必當姑闕之豫謂日字比諸說最為有理學者冝從之加我數年五十以學易可以無大過矣注劉聘君見元城劉忠定公自言嘗見他本加作假五十作卒蓋加假聲相近而誤讀卒與五十字相似而誤分也愚案此章之言史記作假我數年若是我於易則彬彬矣加正作假而無五十字蓋是時孔子年已幾七十矣五十字誤無疑也學易則明乎消長吉凶之理進退存亡之道故可以無大過以五十為卒卒以學易不成文理注文準史記為斷謂無五十字是時孔子年幾七十語録言孔子欲贊易故發此語王滹南曰經無贊易之文何為而知為是時語乎此言甚當注又言學易則明乎消長吉凶之理進退存亡之道故可以無大過豫謂若以此章為孔子七十時所言假我數年以學易則又期在七十以後然孔子七十三而卒直有大過一世矣只從五十字說亦有五十年大過小過則又不論也何足為聖人乎孔子天縱生知不應晚年方始學易也五十七十義皆不通又有說學易為修易過為易書殽亂者復有說學易而失之無所不至孔子憂之故託以戒人者皆為曲說此章之義本不易知姑當置之以待後之君子三人行必有我師焉擇其善者而從之其不善者而改之注三人同行其一我也彼二人者一善一惡則我從其善而改其惡焉是二人者皆我師也師者人之尊稱惟其善堪為人軌範者可以此名歸之惡如惡臭之可惡者亦謂之師善亦吾師惡亦吾師此黃冠衲子之言聖人談話中豈容有此唐明皇問韓幹畫馬以誰為師對曰廄中之馬皆臣師也林氏引之以證此說其所諭者甚似究其實則不然馬之壯健老弱肥瘦黑白畫之者皆從本真依倣摹寫無論美惡期皆似之故言廄中之馬皆師也經所言者擇其善者從其不善者改而不從與其依樣畫馬豈可同論也哉果言善惡皆我師則天下之人皆為師矣何必專指三人亦不須更言必有也三人取其數少而言必有二字於三人中又有所擇也三人行必有我師焉者言其只三人行其間亦必有可為師法者擇其善者而從之其不善者而改之者非謂擇其一人全善者從之一人全惡者改之也但就各人行事中擇其事之善處從之其不善處改之不求備於一人也全德之人世不常有若直須擇定事事全善之人然後從之於普天下終身求之未必可得三人中豈能必有也止當隨其各有之善從而師之甲有一善則從甲之一善乙有一善則從乙之一善舜取諸人以為善亦此道也由是言之三人行必有我師信不誣矣子以四教文行忠信注程子曰教人以學文修行而存忠信也行為所行諸善之總稱忠與信特行中之兩事存忠信便是修行修行則存忠信在其中矣既言修行又言而存忠信義不可解古今諸儒解之者多矣皆未免為牽强王滹南曰夫文之與行固為二物至於忠信特行中之兩端耳又何别為二教乎讀論語者聖人本意固須詳味疑則闕之若夫弟子之所志雖指稱聖人亦當愼取不必盡信也此蓋謂弟子不善記也所論極當可以決千古之疑或曰若作行言政文對四科而言似為有理恐傳寫有差今不可考蓋有不知而作之者我無是也注不知而作不知其理而妄作也孔子自言未嘗妄作蓋亦謙辭不知其理而妄作此說誠是楊墨之徒皆其妄作者也已於述而不作章講論之矣兩章可以互相發明但注文以孔子自言未嘗妄作為謙辭未曉其說躬行君子則吾未之有得若聖與仁則吾豈敢此誠孔子之謙辭謙其美而不居也妄作非美事也孔子自言我無是也正是鄙其妄作而以不妄作自居何謙之有若以此為謙辭則凡其自言我不為姦我不為盜皆為謙矣抑亦不思之甚也注中刪去蓋亦謙辭四字便無節病與其進也不與其退也注與許也但許其進而來見耳非許其退而為不善也進退二字無關於志行專以身言身來見之為進既見而去為退殊無義理蓋進謂有進善之志退謂有退惰之心與猶待也蓋言人既清潔其心來見必是有所企慕將欲進而為善我惟待其欲進而為善不待其惰退而為不善也若聖與仁則吾豈敢抑為之不厭誨人不倦則可謂云爾已矣注為之謂為仁聖之道誨人亦謂以此教人也朝氏曰當時有稱夫子聖且仁者以故夫子辭之此以為字作行字說也為仁聖之道蓋謂行仁聖之道也行小人之道便是小人行君子之道便是君子行其道而非其人無是理也既言若聖與仁則吾豈敢却說我行仁聖之道不厭誨人仁聖之道不倦豈有躬行仁聖教人仁聖而非仁聖之人者哉果如此說則為之不厭誨人不倦正是以聖與仁自居與上文之謙辭意不倫矣又況君子之所行與其所以教人者亦不可專以仁聖兩事為名也為與女為周南召南矣乎之為同為猶學也蓋言聖與仁則吾豈敢當之但於未知者學之不厭以所知者誨人不倦則可謂我如此而已蓋於聖與仁不敢自居學與誨以為己任與前默而識之章學而不厭誨人不倦語意正同章首疑有闕文朝氏謂當時有稱夫子聖且仁者此說誠是四書辨疑卷四
