body:
  text: 欽定四庫全書四書辨疑卷十一元陳天祥撰孟子滕文公上周公豈欺我哉注文王我師也蓋周公之言公明儀亦以文王為必可師故誦周公之言而歎其不我欺也文王大聖人古今皆師宗之以公眀儀之賢豈不知此何須直至聞周公之言方才亦以文王為必可師也歷觀成覸顔淵之言皆是勇於為善當仁不讓之義至公明儀則誦周公稱文王我師之言歎周公之不我欺不惟無甚意味與前二家氣象亦不同矣文王我師也此本公明儀之言欺猶輕易也蓋言文王我既所師不違其道雖周公亦豈能輕易我哉則與我丈夫豫何人之意氣相類曽子曰生事之以禮死葬之以禮祭之以禮可謂孝矣注但所引曽子之言本孔子告樊遲者豈曽子嘗誦之以告其門人歟曽子便曽誦之以告門人所誦者亦只是孔子之言終不可以曽子曰為是也曽子曰與孔子曰只爭一字之差曽字本是孔字蓋後人傳寫之誤吾宗國魯先君莫之行注滕與魯俱文王之後而魯祖周公為長兄弟宗之故滕謂魯為宗國也宗枝宗𣲖宗屬宗人皆同姓稱呼之常語如周之宗盟異姓為後晉吾宗也宗婦覿用幣之類皆其同姓稱宗之明例滕謂魯為宗國亦此例也兄弟宗之之説似為過論曰吾有所受之也注蓋上世以來有所傳受雖或不同不可改也注文猶以此句為父兄百官之言也若準此説當須刪去吾字上曰字下句謂字上却添世子二字然後可通不然則曰與前曰字重復謂然友之語又與上文相混不知何人所言前後交互不可曉矣觀其文勢彼父兄百官之言至喪祭從先祖句終盡矣自曰字以下皆世子之言故謂字上不須再稱世子也吾有所受之也此世子答衆人之語也所受有受於孟子也既答之又謂然友使復之鄒以問孟子也父兄百官不我足也注不我足謂不以我滿足其意也注文不眀所謂其意者恐是指父兄百官之意也敘此以解下句乃是文公自謂恐其不能盡於大事也若此者豈非隂從百官以阻孟子之意乎孟子素知言宜當察見此心已入於自暴自棄之境雖不答所問可也今乃諄諄然加意以告之乃是知文公有志於肯為可與言而言之也蓋不我足者以我為不足也父兄百官以我馳馬試劒素無謹行不足以遵守禮制彼皆為此恐其不能盡於大事也使然友以此往問者蓋欲孟子知其衆所沮撓之本情然後有以處之也百官族人可謂曰知注可謂曰知疑有闕誤或曰皆謂世子之知禮也注文所疑者兩事一疑有闕一疑有誤謂有誤者為是經中可字有窒或曰之説易可為皆此甚有理然又改知字為平聲却為未當知字既為平聲而在一句之末其下别無字意可説百官族人皆謂曰知不知知為知甚也皆謂世子知禮禮字乃贅文耳知止當音智世子排衆議以遵孟子之言守先王之禮確乎其不可拔茍非智識髙逺者定不能也百官族人皆謂曰智前後義皆通貫夏后氏五十而貢殷人七十而助周人百畝而徹其實皆什一也注夏時一夫受田五十畝計其五畝之入以為貢商人始為井田之制以六百三十畝之地畫為九區區七十畝中為公田其外八家各授一區但借其力以助耕公田又云貢法固以十分之一為常數惟助法乃是九一而商制不可考周制則公田百畝中以二十畝為廬舍一夫所耕公田實計十畝通私田百畝為十一分而取其一竊料商制亦當似此而以十四畝為廬舍一夫實耕公田七畝是亦不過什一也此説既多與經相違又多自相窒礙若商人始為井田之制則夏后氏未有井田也田既不井不知貢法如何分畫商人井田之制既已備説在前繼而却言商制不可考前言惟助法乃是九一後説周制為十一分取一竊料商制亦當似此所言前後不一除貢法之外皆與什一之數各不相合論語集注解盍徹乎言周制大率民得其九公取其一亦與此周制十一分取一之説不同助法九一之説想亦别無所據蓋指後文請野九一而助為言豫於此句竊有疑焉孟子果謂殷制為九一與其皆什一之説豈不自相乖異邪當時必是見其事有未能驟改者故有此請蓋一時之權宜非殷人之舊制也大抵三代田制既無明文可考其詳不可得知孟子既言由此觀之雖周亦助也則是當時周制已不能盡得其詳今又經隔一千七八百年而欲備舉周代以前殷夏之制亦徒勞耳説者但當合其經文什一之數而已南軒曰夏商周皆以什一蓋五十畝者以五畝為貢七十畝者以七畝為助百畝者以十畝為徹此説本分使民盻盻然注盻五禮切從目從兮或音普莧切者非盻恨視也注文於此段經中止是零説字義未嘗通解所言事理不知盻字之恨視果主何意恨視何人也盻有數音陸德明引説文音五禮切南北玉篇皆下計吾計二切江南廣韻胡計五計匹莧三切中原廣韻五啓胡計五計普患四切韻略無此字毛晃韻略二音其一胡計切訓恨視其一匹襇切與普莧匹莧普患切者皆同音盻毛氏又與盼字同訓顧視又釋為勞苦不休息貌仍引孟子此語為據讀孟子者惟準此説讀盻字與盼同音義乃通順盻乃盻望也言其民於力作勞苦之間盻盻然望其所獲將至終嵗勤動竟不得以養其父母也又稱貸而益之注稱舉也貸借也取物於人而出息以償之也益之以足取盈之數也若謂舉借於人以足取盈之數經文止可言又稱貸而足之益與足義實不同益謂增其餘足謂補其闕今以益之為足其取盈之數於文已有如此之差繼推經文前後所言之事理上文既言凶歲必取盈焉使民不得以養其父母至此民又舉借以足取盈之數則是兩畨取盈義不可曉蓋稱謂假其名也貸謂借其賦也益謂增其數也言於常賦之外稱為借貸重復取之也近代有以用度不足於此年賦稅既已征足又指下年者假稱借貸為名以征取之又有别指名項借征於民如稅舟車間架之類及和雇和買竟不給價者凡如此者皆於常賦元額數外所增益者又稱貸而益之皆此類也周雖舊邦其命惟新注周雖后稷以來舊為諸侯其受天命而有天下則自文王始也注文蓋以惟新為文王所受有天下之天命惟新也若從此説則下文亦以新子之國乃是亦欲滕文公受天新命而有天下也孟子之言必不輕率如此新子之國一句之上眀有子力行之四字蓋是勸文公力行仁政如制民恆産教以人倫之類用此道以新其國若事功獲成則天也皇天無親惟德是輔天命人事未嘗相離今注文專言天命不及文王之德理有未盡詩之本意正是以天命與文王之德兼言周雖祖宗之舊邦至文王益修其德上天佑之治化大行民乃丕變凡其所成無非天命其命惟新蓋謂此也不直至於有天下始為其命惟新也使畢戰問井地注文公因孟子之言而使畢戰主為井地之事故又使之來問其詳使畢戰主為井地之事經無其文蓋億度也向者問為國滕文公之親問也今者問井地乃是使人來問本非一時之事又前假答文公者乃是論其取於民之法制教民人倫之道此段答畢戰者止是説井地一事前後兩假事各不同此當自作一章正為首初無滕文公三字以故併而為一若以兩次與兩段之事證之三字乃脫漏無疑聞君行仁政注仁政上章所言井地之法也仁政非可枚舉豈止井地一事而已況滕文公雖嘗使畢戰問其法於孟子然亦未聞實曽行之於其國也許行豈得探先借稱其美哉渠亦止是總指文公善迹而言也有大人之事有小民之事注闕上言大人下言小民文辭不順古注本有大人之事有小人之事大人與小人對言是其本文今本民字為誤曽子曰不可江漢以濯之秋陽以暴之皓皓乎不可尚已注言夫子道德明著光輝潔白非有若所能倣佛也或曰此三語者孟子贊美曾子之辭也三語果為贊美曽子之辭則江字上當别有孟子發語之文然又不知所贊者為何事也若止為不可有若之一事亦不必推稱至此若謂通贊曽子之道德而孟子本説子貢諸人追仰孔子却忽然盛稱曽子之德美如此可謂語言失序矣況其所稱非孔子無以當之也由是言之只前説為是蓋歸反虆梩而掩之注反覆也虆土籠也梩土輿也於是歸而掩覆其親之尸反字訓覆義便難解此段意有曲折若初見其尸即便掩覆宜曰掩覆而歸不當道歸而掩覆也經既先言歸後言反虆梩反字乃齎回虆梩之謂也推其始末初亦只是偶然至其委尸之所虆梩之器隨身必無既見其尸心始不安思欲掩之必須歸取其器齎之反至其處然後得以掩之也反虆梩為齎回虆梩亦較然矣滕文公下勇士不忘喪其元注勇士輕生常念戰鬭而死喪其首而不顧也勇士之志遇事即奮不止在於戰鬭也龍逢比干雖非戰鬭而死亦不可謂為非勇可以死而死皆為勇者之事不可單言戰鬭也以順為正者妾婦之道也注女子從人以順為正道也蓋言二子阿諛茍容竊取權勢乃妾婦順從之道耳非丈夫之事也彼公孫衍張儀駕縱橫之勢騁遊説之辭想其精神氣槩如在眼前阿諛茍容非其類也一怒而諸侯懼安居而天下熄此衍儀事狀之本真比之妾婦之必敬必戒無違夫子者氣象不同孟子答景春子未知禮乎者此是鄙衍儀僭橫無禮之主意蓋人倫綱紀惟禮維持男為人臣女為人婦一不循理即為人道中罪人尚何足稱故舉女子從夫之道以喻為臣之節言雖妾婦猶當以順為正不可違禮自恣而衍儀挾縱橫之術脅制諸侯圖取一時富貴違禮犯義曽不如妾婦之以順為正非言如妾婦之阿諛茍容也要其有酒食黍稻者奪之注饋食酒食之食音嗣食當音蝕音嗣非也論語中有辨然經中酒食之食字義不可通要其有食者奪之豈容饋食而有無食者哉葛伯所奪乃是擇其食有美味者奪之中原古注本要其有酒肉黍稻者奪之肉字為是下文童子以黍肉餉是為明證我武惟揚侵于之疆則取于殘殺伐用張于湯有光注言武王威武奮揚侵彼紂之疆界取其殘賊而殺伐之功因以張大比於湯之伐桀又有光焉張大其殺伐之功仁人之所不為非武王之光也以殺伐與湯爭雄長肆矜誇衒耀之言又為可鄙武王之心必不如此光字義本屬湯説在武王非也南軒曰于湯有光云者言其相發揮云爾又諸家書解蘇氏以為湯伐桀而有慙德今我亦為之湯不愧矣吕氏曰武王體湯之心行湯之事所以有光於湯也蔡氏曰自世俗觀之武王伐湯之子孫謂之湯讎可也然湯放桀武王伐紂皆公天下為心非有私於己者武之事質之湯而無愧湯之心驗之武而益顯是則伐紂之舉豈不於湯有光也哉陳氏曰湯放桀以安民吾今亦伐紂以安民則於湯有光顯矣南軒諸人意同其説皆是蓋武王遵湯所行而行則湯有光顯故言於湯有光非謂武王之光過於湯也然張字無明説却為未備張猶開張顯眀之也蓋言我之誅伐所以張眀其凶殘之罪也日攘其鄰之雞者注攘物自來而取之也物自來而取之攘字本無此訓經中亦無自來之意攘字止當訓竊世衰道微邪説暴行有作注有作之有讀為又古字通用豫謂上文邪説暴行又作此云有作恐皆有誤又與有前後相易讀之於文為順已頻顣注已仲子也已當作已已與紀同音已與以同音已已止爭半畫之異蓋後人傳寫之差耳從已字説觀其自仲子齊之世家也以下皆言仲子之文未嘗間斷至此不當又有已字謂稱仲子也又已頻顣亦不成文從已字説初見所饋生鵝固已頻顣而惡之矣他日偶食其肉聞其兄之言而哇之則前後意有倫次已字文亦自然離婁上而仁覆天下矣注此言古之聖人既竭耳目心思之力然猶以為未足以遍天下及後世故制為法度以繼續之則其用不窮而仁之所被廣矣此章本言為政必須遵先王之法離婁之明公輸子之巧師曠之聰皆譬喻比方之言非一章之本意也今以耳目心思通言其用不窮仁之所被廣矣耳目之力豈能仁覆天下哉目力繼之以規矩止能為方圓耳力繼之以六律止能正五音仁覆天下止是言其既竭心思繼之以不忍人之政者所能非有關於耳目之力也言則非先王之道注非詆毁也上注解泄泄為怠緩恱從之貌形容得不相匡正之情狀本是初不言泄泄中有詆毁先王之意繼而解沓沓二字復為此説蓋不審沓沓即泄泄也前解泄泄為怠緩恱從之貌後解沓沓為詆毁先王之道一事而分兩意豈非誤邪又況以非為詆毁則意狹事偏若只解為是非之非則意廣事備言聚斂言奢靡言酒色言逸遊凡其所以懈怠其君心忽慢其王事者皆非先王之道非特詆毁而已也大抵泄泄沓沓皆不敬之貌怠緩恱從乃不敬之情也事君無義進退無禮所言不由先王之道是皆不敬之大者也我非堯舜之道不敢以陳於王前此孟子事君之敬也非與此非字義同南軒曰言非先王之道則是不稽古而汨於功利也此謂不稽古者是也汨於功利却是好大喜功而有作為之志與泄泄沓沓怠緩恱從者又不同矣仁不可為衆也注有仁者雖十萬之衆不能當之衆本無定數孔子之言亦非有指定幾萬之意十萬蓋繼前億字而言然以文理觀之衆與億義不相干不可曲就其數衆只是人數衆多之謂為施為也遇至仁之君雖有衆不能施為也道在邇而求諸逺事在易而求諸難人人親其親長其長而天下平注親長在人為甚邇親之長之在人為甚易而道初不外是也舍此而他求則逺且難而反失之但人人各親其親各長其長而天下自平注文散亂指説不知道為何道事為何事亦不見天下自平之理讀之不可曉也蓋孟子傷昏亂之世不知王道為治之本先王之教化不行故有此歎道治道也事亦為治之事也欲致天下之治其道在邇不在逺而於逺處求之其事在易不在難而於難處求之此古今之通患而世莫之悟也果能遵先王之道於心得躬行之餘以孝弟仁義教化其民使人人皆親其親長其長自無悖理亂倫無父無君之事而能上下安和故曰天下平也又各字之義亦似未安各親其親乃是各親已家之親各長其長亦是各長已家之長親非他人所有以各為言理固不差長雖他人亦有之長之之道豈可無也如倍年以長父事之十年以長兄事之孔子之於鄉人杖者出斯出矣未嘗各長已家之長不長他人之長也天下有達尊三齒亦天下之通尊者楚人之長亦長之秦人之長亦長之但與長兄之長有差等耳非有截然各長之限也上下通言二各字皆不必用是天下之父歸之也注天下之父言齒德皆尊如衆父然有天下皆尊之德無天下皆尊之齒太公見用於周年方八十歸周之初七十餘矣若以齒言亦未可比擬天下之父也况伯夷以孤竹國世子歸周又未必如太公之齒也以德言之故稱二老注文止可言德為天下所尊若衆父然不必言其齒也辟草萊任土地者次之注辟開墾也任土地謂分土授民使任耕稼之責如李悝盡地力商鞅開阡陌之類也開墾田疇分土授民皆王政之先務養民之良制今乃指為李悝盡地利商鞅開阡陌之術同類使與善戰連諸侯者相次伏罪豈不寃哉蓋草萊指邊鄙荒廢之地而言辟草萊謂開拓邊疆也任土地謂務廣土地也侵奪鄰境益已疆土以此加罪宜無辭矣侮奪人之君惟恐不順焉注言恐人之不順已人被陵侮侵奪之際強者必怒弱者必怨此人之常情必無順已之理智伯求地於韓魏二國隱忍而與之非其順也蓋欲長其侮奪之心構其禍將以報怨也南軒解順為遂曰惟恐不得順遂其侮奪之為也此為得之嫂溺援之以手者權也注權稱錘也稱物輕重而往來以取其中者也權而得中是乃禮也引經以證注説嫂溺援之以手正為權而得中以手援嫂果可以為禮乎聖人取稱錘稱物活無定體之象名權本以應變適宜為義故漢儒有反經合道之論近世儒者力排此説豫於論語中已嘗辨之孟子於此固已分别男女授受不親為禮嫂溺援之以手為權於應變適宜反經合道之義豈不甚明注文亦嘗正程子權只是經之説云以孟子嫂溺援之以手之義推之則權與經亦當有辨其説誠是然亦但當歸之於一今言權而得中是乃禮也却與權只是經之説相合翻覆如此未敢從也今天下溺矣夫子之不援何也注言今天下大亂民遭陷溺亦當從權以援之不可守先王之正道注文以從權則不可守先王之正道乃是以合經反道為權也既與前注稱錘之説不同又非漢儒所論反經合道之本意兩無可取夫嫂溺援之以手乃從權也外雖暫反授受不親之經內則主於救人一身之死孰謂從權則不可以守正道哉淳于髠亦欲孟子內以守正為本外以從權應變不可膠之於一表裏專執古道而已其意不過如此先王之正道豈敢直以為不可守邪説者但云今天下大亂民遭陷溺亦當如援嫂之溺從權以援之今夫子不援何也只如此説義自足矣刪去不可守先王之正道一句則為無病又與權與經亦當有辨之意可以相應人不足與適也政不足間也惟大人為能格君心之非注言人君用人之非不足過謫行政之失不足非間惟有大人之德則能格其君心之不正以歸於正而國無不治矣注於章首人字之下創添君用人之非五字與本經之義全差所言誤事不淺人君之用人行政乃國家大得失所關天下大利害所繫豈可置而不問哉為人臣者明知其君用人既非行政既失而曰此不足過謫此不足非間使大姦巨猾日前日進暴官汚吏日盛日繁庶政顛墮生民塗炭由由然坐視而已大人之道不如是也繼此再解下句云惟有大人之德則能格其君心之不正前後兩節意自相窒既不過謫用人之非又不非間行政之失於其君心如此不正處不格不知有大人之德者復欲格其君心中何者之不正也人君之職惟在慎擇宰相宰相擇用百官百官分行庶政由此觀之天下之治與不治繫在人君一心之正與不正之間耳人君之心天下之本也其本亂而末治者否矣故大人如伊傅周召之為相未嘗不以格君心之非為其所先之切務也格正也格君心正其君心之不正也大人格君心之非其格之之道不在一一親身自為自其君為太子以至登極舉道德可尊者以為師賔擇梗正可嚴者使任諌諍左右前後皆置正人平居無事則經筵師臣講眀道義考論古今資益其見聞輔養其德性不使非心有可萌之隙及其行有差失則臺諫諸官同心協力隨事規戒期於一舉一言必出於正而後已此古制正君之眀法也經言人不足與謫非謂人君用人之非不足謫也言其不可専以過謫受官已用之人也政不足間非謂人君行政之失不足間也言其不可専以非間諸人已行之政也謂當端本清源務先正其君心之不正君正則朝廷正朝廷正則內外百官皆得其人天下無有不治也近代以來往往不先於本而齊其末內雖有憲臺察院外雖設廉訪採訪觀察按察之類專務彈劾姦惡糾按非違謫去一人十人復至間去一事十事復來捨其源而清其流不亦難乎孟子言一正君而國定誠為萬世之格言也政不足間也注愚謂間字上亦當有與字中原古注本間字上未嘗無與字蓋南本傳寫之差耳人之易其言也無責耳矣注人之所以輕易其言者以其未遭失言之責故耳蓋常人之情無所懲於前則無以警於後非以為君子之學必俟有責而後不敢易其言也語言易發而不堪取信者歷歷見之蓋亦習性既成不知有耻雖經纍責而終身不改者多矣有責而後不敢百無一二然其不敢之情亦止是於責已者有畏於他人不敢者又鮮矣無與毋同責責望也蓋言輕易其言者所言必妄不可責望其實也論語言之不怍為之也難兩經意同四書辨疑卷十一
